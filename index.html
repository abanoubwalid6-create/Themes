<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Xiaomi Royale | أسرع تجربة لهواتف شاومي</title>
<!-- تحميل Font Awesome بشكل غير متزامن -->
<link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></noscript>
<style>
/* استخدم خطوط النظام السريعة */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}
html { scroll-behavior: smooth; overflow-x: hidden; }
body {
  font-family: 'Segoe UI', 'Tahoma', 'Tajawal', system-ui, -apple-system, sans-serif;
  background: #0a0a14;
  color: #fff;
  overflow-x: hidden;
  min-height: 100vh;
}
/* تحسين سرعة الريندر */
.progress-bar {
  position: fixed;
  top: 0;
  left: 0;
  width: 0%;
  height: 3px;
  background: linear-gradient(90deg, #d4af37, #ffdd88);
  z-index: 10000;
  transition: width 0.1s linear;
}
.bg-royal {
  position: fixed;
  inset: 0;
  z-index: -3;
  background: radial-gradient(circle at 10% 20%, #0c0c1a, #020208);
}
.bg-royal::before {
  content: '';
  position: absolute;
  width: 150%;
  height: 150%;
  top: -25%;
  left: -25%;
  background: radial-gradient(ellipse at 30% 40%, rgba(212, 175, 55, 0.1), transparent 70%);
  animation: royalBreath 8s infinite alternate;
}
@keyframes royalBreath {
  0% { opacity: 0.3; transform: scale(1);}
  100% { opacity: 0.7; transform: scale(1.05);}
}
/* أورب خفيفة */
.orb-lux {
  position: fixed;
  border-radius: 50%;
  filter: blur(100px);
  opacity: 0.3;
  will-change: transform;
  pointer-events: none;
  z-index: -2;
}
.orb1-lux { width: 400px; height: 400px; background: #d4af37; top: -150px; left: -150px; }
.orb2-lux { width: 350px; height: 350px; background: #ff3366; bottom: -100px; right: -80px; }
@media (min-width: 768px) {
  .orb1-lux { width: 600px; height: 600px; }
  .orb2-lux { width: 500px; height: 500px; }
}
.grid-prestige {
  position: fixed;
  inset: 0;
  z-index: -2;
  background-image: linear-gradient(rgba(212,175,55,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(212,175,55,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}
/* حاوية رئيسية */
.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0.8rem;
  position: relative;
  z-index: 5;
}
@media (min-width: 768px) { .container { padding: 1.2rem; } }
/* توب بار */
.topbar-royal {
  backdrop-filter: blur(12px);
  background: rgba(0, 0, 0, 0.35);
  border: 1px solid rgba(212, 175, 55, 0.3);
  border-radius: 60px;
  padding: 0.5rem 1rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 0.5rem;
}
.logo-icon {
  font-size: 1.2rem;
  background: linear-gradient(135deg, #fff, #d4af37);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  font-weight: 900;
}
@media (min-width: 480px) { .logo-icon { font-size: 1.6rem; } }
.topbar-right { display: flex; gap: 0.5rem; align-items: center; }
.fps-badge {
  background: rgba(212,175,55,0.2);
  border-radius: 40px;
  padding: 0.2rem 0.7rem;
  font-family: monospace;
  font-size: 0.7rem;
  border: 1px solid rgba(212,175,55,0.5);
  color: #f5e7a3;
}
.royal-btn {
  background: rgba(212,175,55,0.15);
  border: 1px solid rgba(212,175,55,0.5);
  border-radius: 50%;
  width: 38px;
  height: 38px;
  color: #ffdf8c;
  transition: 0.2s;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
@media (min-width: 480px) { .royal-btn { width: 46px; height: 46px; } }
.hero-lux {
  margin-top: 1rem;
  background: linear-gradient(135deg, rgba(10,10,25,0.7), rgba(30,20,40,0.6));
  backdrop-filter: blur(12px);
  border-radius: 40px;
  border: 1px solid rgba(212,175,55,0.4);
  padding: 1.5rem 1rem;
  text-align: center;
}
@media (min-width: 768px) { .hero-lux { padding: 2rem; margin-top: 1.5rem; } }
.custom-logo-img {
  width: 70px;
  height: auto;
  filter: drop-shadow(0 0 15px rgba(212,175,55,0.6));
  transition: 0.2s;
}
@media (min-width: 480px) { .custom-logo-img { width: 90px; } }
.change-logo-btn {
  position: absolute;
  bottom: -8px;
  right: -12px;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(8px);
  border-radius: 30px;
  padding: 3px 8px;
  font-size: 0.6rem;
  border: 1px solid #d4af37;
  color: #d4af37;
  cursor: pointer;
  display: none;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
}
.change-logo-btn.admin-visible { display: flex; }
.hero-title {
  font-size: 2rem;
  font-weight: 900;
  background: linear-gradient(135deg, #fff 20%, #f5e7a3 60%, #d4af37);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin-top: 0.6rem;
}
@media (min-width: 480px) { .hero-title { font-size: 2.5rem; } }
@media (min-width: 768px) { .hero-title { font-size: 3.5rem; } }
.welcome-message {
  background: linear-gradient(135deg, rgba(212,175,55,0.15), rgba(212,175,55,0.05));
  border: 1px solid rgba(212,175,55,0.4);
  border-radius: 50px;
  padding: 0.5rem 1rem;
  margin: 0.8rem auto;
  display: inline-block;
  backdrop-filter: blur(8px);
  font-size: 0.9rem;
  font-weight: 600;
  color: #f5e7a3;
}
@media (min-width: 480px) { .welcome-message { font-size: 1.1rem; padding: 0.6rem 1.8rem; } }
@media (min-width: 768px) { .welcome-message { font-size: 1.3rem; padding: 0.7rem 2.2rem; } }
.hero-sub { font-size: 0.8rem; opacity: 0.8; margin-top: 0.3rem; }
@media (min-width: 480px) { .hero-sub { font-size: 0.95rem; } }
.prestige-badges {
  display: flex;
  gap: 0.5rem;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 0.8rem;
}
.p-badge {
  background: rgba(212,175,55,0.12);
  border-radius: 40px;
  padding: 0.3rem 0.8rem;
  font-size: 0.7rem;
  border: 1px solid rgba(212,175,55,0.3);
}
@media (min-width: 480px) { .p-badge { padding: 0.4rem 1.2rem; font-size: 0.8rem; } }
/* روابط - قوالب أكبر */
.links-section {
  margin-top: 1.2rem;
  background: rgba(0,0,0,0.2);
  backdrop-filter: blur(12px);
  border-radius: 32px;
  border: 1px solid rgba(212,175,55,0.3);
  padding: 1rem;
}
@media (min-width: 768px) { .links-section { padding: 1.5rem; } }
.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 1rem;
}
.header-icon {
  background: linear-gradient(135deg, #d4af37, #aa7c11);
  width: 36px;
  height: 36px;
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
}
@media (min-width: 480px) { .header-icon { width: 44px; height: 44px; font-size: 1.2rem; } }
.section-header h2 { font-size: 1.1rem; }
@media (min-width: 480px) { .section-header h2 { font-size: 1.4rem; } }
.links-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 1rem;
}
@media (min-width: 480px) { .links-grid { grid-template-columns: repeat(2, 1fr); } }
@media (min-width: 900px) { .links-grid { grid-template-columns: repeat(3, 1fr); } }
.link-card-lux {
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(12px);
  border-radius: 32px;
  padding: 0.9rem 1rem;
  display: flex;
  align-items: center;
  gap: 0.8rem;
  border: 1px solid rgba(212,175,55,0.25);
  transition: transform 0.2s, border-color 0.2s;
  text-decoration: none;
  color: white;
  cursor: pointer;
}
@media (min-width: 480px) {
  .link-card-lux { padding: 1rem 1.3rem; gap: 1rem; border-radius: 40px; }
}
.link-card-lux:hover {
  transform: translateY(-4px);
  border-color: #d4af37;
  background: rgba(212,175,55,0.1);
}
.link-icon-lux {
  width: 48px;
  height: 48px;
  border-radius: 24px;
  background: linear-gradient(145deg, #d4af37, #9e740e);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  flex-shrink: 0;
}
@media (min-width: 480px) { .link-icon-lux { width: 60px; height: 60px; font-size: 1.6rem; } }
.link-text strong { font-size: 0.95rem; }
@media (min-width: 480px) { .link-text strong { font-size: 1.1rem; } }
.scroll-gold {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 42px;
  height: 42px;
  background: radial-gradient(circle, #d4af37, #a57c1c);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  opacity: 0;
  visibility: hidden;
  transition: 0.2s;
  z-index: 200;
}
@media (min-width: 480px) { .scroll-gold { width: 50px; height: 50px; } }
.scroll-gold.show { opacity: 1; visibility: visible; }
/* Admin panel */
.admin-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(20px);
  z-index: 9998;
  display: none;
}
.admin-panel-lux {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.97);
  width: 92%;
  max-width: 500px;
  max-height: 85vh;
  overflow-y: auto;
  background: #0f0f1fdd;
  border: 1px solid #d4af37;
  border-radius: 40px;
  padding: 1rem;
  z-index: 9999;
  display: none;
  backdrop-filter: blur(20px);
}
@media (min-width: 768px) { .admin-panel-lux { width: min(900px, 94%); max-width: none; padding: 1.5rem; } }
.admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
.close-btn-gold {
  background: #d4af37;
  border: none;
  border-radius: 50%;
  width: 32px;
  height: 32px;
  cursor: pointer;
}
.copy-gold {
  background: linear-gradient(135deg, #d4af37, #aa7c11);
  border: none;
  padding: 0.5rem;
  border-radius: 40px;
  font-weight: bold;
  cursor: pointer;
  width: 100%;
}
input, select {
  background: #1e1e2e;
  border: 1px solid #d4af37;
  border-radius: 30px;
  padding: 8px;
  width: 100%;
  margin-bottom: 8px;
  color: white;
}
.ripple {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, #d4af37, transparent);
  transform: scale(0);
  animation: rippleAnim 0.5s linear;
  pointer-events: none;
}
@keyframes rippleAnim { to { transform: scale(6); opacity: 0; } }
@keyframes flashFade { 0% { opacity: 0.6; } 100% { opacity: 0; visibility: hidden; } }
</style>
</head>
<body>
<div class="progress-bar" id="progressBar"></div>
<div class="bg-royal"></div>
<div class="orb-lux orb1-lux" id="orb1"></div>
<div class="orb-lux orb2-lux" id="orb2"></div>
<div class="grid-prestige"></div>

<div class="container">
  <div class="topbar-royal">
    <div class="logo-icon"><i class="fas fa-crown"></i> XIAOMI ROYALE</div>
    <div class="topbar-right">
      <span class="fps-badge" id="fpsMeter">0 FPS</span>
      <button class="royal-btn" id="royalThemeBtn"><i class="fas fa-moon"></i></button>
      <button class="royal-btn" id="adminAccessBtn"><i class="fas fa-key"></i></button>
    </div>
  </div>

  <div class="hero-lux">
    <div style="position: relative; display: inline-block;">
      <img id="customLogoImg" class="custom-logo-img" src="https://upload.wikimedia.org/wikipedia/commons/a/ae/Xiaomi_logo_%282021-%29.svg" alt="شعار" width="90" height="90" loading="eager">
      <div id="changeLogoBtn" class="change-logo-btn"><i class="fas fa-camera"></i> تبديل</div>
      <input type="file" id="logoFileInput" accept="image/*" style="display: none;">
    </div>
    <h1 class="hero-title" id="dynamicTitle">Xiaomi Royale</h1>
    <div class="welcome-message">
      <i class="fas fa-heart" style="color:#d4af37;"></i> أهلاً بكم يا محبي شاومي <i class="fas fa-heart" style="color:#d4af37;"></i>
    </div>
    <p class="hero-sub">أفخم منصة لهواتف شاومي | روابط النخبة</p>
    <div class="prestige-badges">
      <span class="p-badge"><i class="fas fa-gem"></i> VIP</span>
      <span class="p-badge"><i class="fas fa-bolt"></i> أسطوري</span>
      <span class="p-badge"><i class="fas fa-link"></i> روابط</span>
    </div>
  </div>

  <div class="links-section">
    <div class="section-header">
      <div class="header-icon"><i class="fas fa-link"></i></div>
      <h2>روابط النخبة <span style="color:#d4af37;">GOLDEN</span></h2>
    </div>
    <div class="links-grid" id="premiumLinksGrid"></div>
  </div>
</div>

<button class="scroll-gold" id="goTopGold"><i class="fas fa-arrow-up"></i></button>

<div class="admin-overlay" id="adminOverlayLux"></div>
<div class="admin-panel-lux" id="adminPanelLux">
  <div class="admin-header">
    <h2><i class="fas fa-crown"></i> لوحة التحكم</h2>
    <button id="closeAdminLux" class="close-btn-gold">✕</button>
  </div>
  <div style="display:flex; flex-direction:column; gap:1rem;">
    <div>
      <h3>إضافة رابط</h3>
      <input type="text" id="adminLinkName" placeholder="الاسم">
      <input type="text" id="adminLinkUrl" placeholder="الرابط">
      <select id="adminLinkIcon">
        <option value="telegram">تيليجرام</option>
        <option value="whatsapp">واتساب</option>
        <option value="global">موقع</option>
      </select>
      <button id="addLinkAdminBtn" class="copy-gold">إضافة</button>
      <h3 style="margin-top:1rem;">الروابط الحالية</h3>
      <div id="adminLinksList"></div>
    </div>
    <div>
      <h3>إحصائيات</h3>
      <p>عدد الروابط: <span id="statLinksCount">0</span></p>
      <p>نقرات اليوم: <span id="statClicksToday">0</span></p>
      <button id="resetStatsBtnGold" style="background:#333; border:none; padding:8px; border-radius:30px; width:100%;">إعادة ضبط</button>
    </div>
  </div>
</div>

<script>
// تحسين سرعة التحميل: تأجيل بعض التأثيرات
(function() {
  // FPS counter خفيف
  let frameCount = 0;
  function countFPS(){ frameCount++; requestAnimationFrame(countFPS); }
  countFPS();
  setInterval(() => {
    const fpsEl = document.getElementById('fpsMeter');
    if(fpsEl) fpsEl.innerText = frameCount + ' FPS';
    frameCount = 0;
  }, 1000);

  // Progress bar
  window.addEventListener('scroll', () => {
    const winScroll = document.documentElement.scrollTop;
    const height = document.documentElement.scrollHeight - window.innerHeight;
    const scrolled = (winScroll / height) * 100;
    const progress = document.getElementById('progressBar');
    if(progress) progress.style.width = scrolled + '%';
  });

  // Parallax خفيف
  window.addEventListener('scroll', () => {
    const y = window.scrollY;
    const orb1 = document.getElementById('orb1');
    const orb2 = document.getElementById('orb2');
    if(orb1) orb1.style.transform = `translateY(${y * 0.03}px)`;
    if(orb2) orb2.style.transform = `translateY(${y * -0.02}px)`;
  });

  // Ripple
  function addRipple(e, el) {
    const rect = el.getBoundingClientRect();
    const ripple = document.createElement('span');
    const size = Math.max(rect.width, rect.height);
    ripple.className = 'ripple';
    ripple.style.width = ripple.style.height = size + 'px';
    ripple.style.left = e.clientX - rect.left - size/2 + 'px';
    ripple.style.top = e.clientY - rect.top - size/2 + 'px';
    el.style.position = 'relative';
    el.style.overflow = 'hidden';
    el.appendChild(ripple);
    setTimeout(() => ripple.remove(), 500);
  }
  document.addEventListener('click', (e) => {
    const target = e.target.closest('.link-card-lux, .royal-btn, .copy-gold, .scroll-gold');
    if(target) addRipple(e, target);
  });

  // Toast
  function toast(msg, icon='👑') {
    let t = document.createElement('div');
    t.innerText = icon + ' ' + msg;
    t.style.cssText = 'position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.85); backdrop-filter:blur(12px); color:#ffdf8c; padding:6px 16px; border-radius:40px; border:1px solid #d4af37; z-index:99999; font-size:0.8rem; white-space:nowrap;';
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),2000);
  }

  // Logo admin only
  const changeBtn = document.getElementById('changeLogoBtn');
  const logoInput = document.getElementById('logoFileInput');
  const logoImg = document.getElementById('customLogoImg');
  function enableAdmin() {
    changeBtn.classList.add('admin-visible');
    sessionStorage.setItem('adminMode', 'true');
  }
  if(sessionStorage.getItem('adminMode') === 'true') enableAdmin();
  if(changeBtn) {
    changeBtn.onclick = () => logoInput.click();
    logoInput.onchange = (e) => {
      const file = e.target.files[0];
      if(file && file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          logoImg.src = ev.target.result;
          localStorage.setItem('royaleCustomLogo', ev.target.result);
          toast('تم تغيير الشعار!', '🖼️');
        };
        reader.readAsDataURL(file);
      }
    };
  }
  const savedLogo = localStorage.getItem('royaleCustomLogo');
  if(savedLogo) logoImg.src = savedLogo;

  // بيانات الروابط
  const defaultLinks = [
    {name:"📡 قناة تليجرام اساسيه", url:"https://t.me/redmi3321", icon:"telegram"},
    {name:"💬 جروب الدردشه", url:"https://t.me/themes345", icon:"telegram"},
    {name:"📱 قناه الواتس", url:"https://whatsapp.com/channel/0029VbC2xVaD8SE4mfwh1H2H", icon:"whatsapp"}
  ];
  let links = JSON.parse(localStorage.getItem('royaleLinks')) || defaultLinks;
  let clickStat = JSON.parse(localStorage.getItem('royaleStats')) || {todayClicks:0, lastDate: new Date().toDateString()};
  function saveData(){
    localStorage.setItem('royaleLinks', JSON.stringify(links));
    localStorage.setItem('royaleStats', JSON.stringify(clickStat));
  }
  function updateStats(){
    document.getElementById('statLinksCount').innerText = links.length;
    document.getElementById('statClicksToday').innerText = clickStat.todayClicks;
  }
  function recordClick(){
    let today = new Date().toDateString();
    if(clickStat.lastDate !== today){ clickStat.todayClicks = 0; clickStat.lastDate = today; }
    clickStat.todayClicks++;
    saveData();
    updateStats();
  }
  const iconMap = {telegram:"fa-brands fa-telegram", whatsapp:"fa-brands fa-whatsapp", global:"fa-solid fa-globe"};
  function renderLinks(){
    const container = document.getElementById('premiumLinksGrid');
    if(container){
      container.innerHTML = links.map((l,idx)=>`
        <a href="${l.url}" target="_blank" class="link-card-lux" data-idx="${idx}">
          <div class="link-icon-lux"><i class="${iconMap[l.icon]||'fa-solid fa-link'}"></i></div>
          <div class="link-text"><strong>${l.name}</strong></div>
          <i class="fas fa-arrow-left"></i>
        </a>
      `).join('');
      document.querySelectorAll('.link-card-lux').forEach(el => {
        el.addEventListener('click', () => recordClick());
      });
    }
  }
  renderLinks();

  // Theme
  const themeBtn = document.getElementById('royalThemeBtn');
  if(themeBtn) {
    themeBtn.onclick = () => {
      document.body.classList.toggle('light-royal');
      if(document.body.classList.contains('light-royal')){
        document.body.style.background = '#faf3e0';
        document.body.style.color = '#1a120b';
        toast('الوضع الفاتح', '✨');
      } else {
        document.body.style.background = '';
        document.body.style.color = '';
        toast('الوضع الليلي', '🌙');
      }
    };
  }

  // Scroll Top
  const scrollTop = document.getElementById('goTopGold');
  window.addEventListener('scroll', () => {
    if(window.scrollY > 200) scrollTop.classList.add('show');
    else scrollTop.classList.remove('show');
  });
  scrollTop.onclick = () => window.scrollTo({top:0, behavior:'smooth'});

  // Admin panel
  const adminOverlay = document.getElementById('adminOverlayLux');
  const adminPanel = document.getElementById('adminPanelLux');
  const adminBtn = document.getElementById('adminAccessBtn');
  if(adminBtn) {
    adminBtn.onclick = () => {
      let p = prompt('كلمة السر:');
      if(p !== '2010'){ toast('كلمة سر خاطئة', '❌'); return; }
      enableAdmin();
      adminOverlay.style.display = 'block';
      adminPanel.style.display = 'block';
      refreshAdminList();
      updateStats();
    };
  }
  function closeAdmin(){ adminOverlay.style.display = 'none'; adminPanel.style.display = 'none'; }
  document.getElementById('closeAdminLux').onclick = closeAdmin;
  adminOverlay.onclick = closeAdmin;
  function refreshAdminList(){
    const listDiv = document.getElementById('adminLinksList');
    if(listDiv){
      listDiv.innerHTML = links.map((l,i)=>`
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; background:rgba(255,255,255,0.05); padding:5px 10px; border-radius:30px;">
          <span style="font-size:0.8rem;">${l.name}</span>
          <button class="delAdminBtn" data-idx="${i}" style="background:#aa2e00; border:none; padding:3px 12px; border-radius:30px; color:white;">حذف</button>
        </div>
      `).join('');
      document.querySelectorAll('.delAdminBtn').forEach(btn => {
        btn.onclick = (e) => {
          let idx = parseInt(btn.getAttribute('data-idx'));
          links.splice(idx,1);
          saveData(); renderLinks(); refreshAdminList(); updateStats(); toast('تم الحذف', '🗑️');
        };
      });
    }
  }
  document.getElementById('addLinkAdminBtn').onclick = () => {
    let name = document.getElementById('adminLinkName').value.trim();
    let url = document.getElementById('adminLinkUrl').value.trim();
    let icon = document.getElementById('adminLinkIcon').value;
    if(!name || !url){ toast('أكمل البيانات', '⚠️'); return; }
    links.push({name,url,icon});
    saveData(); renderLinks(); refreshAdminList(); updateStats(); toast('تمت الإضافة', '👑');
    document.getElementById('adminLinkName').value = '';
    document.getElementById('adminLinkUrl').value = '';
  };
  document.getElementById('resetStatsBtnGold').onclick = () => {
    clickStat = {todayClicks:0, lastDate: new Date().toDateString()};
    saveData(); updateStats(); toast('تمت إعادة الضبط', '🔄');
  };
  updateStats();

  // Typewriter سريع (يبدأ بعد تحميل DOM)
  const titleEl = document.getElementById('dynamicTitle');
  const original = "Xiaomi Royale";
  titleEl.innerHTML = '';
  let i = 0;
  function type(){
    if(i < original.length){
      titleEl.innerHTML += original.charAt(i);
      i++;
      setTimeout(type, 40);
    }
  }
  type();
  // تأثير فلاش خفيف
  const flash = document.createElement('div');
  flash.style.cssText = 'position:fixed; inset:0; background:radial-gradient(circle, #fff6cf, transparent); pointer-events:none; z-index:99999; opacity:0.5; animation:flashFade 0.5s forwards;';
  document.body.appendChild(flash);
  setTimeout(()=>flash.remove(),500);
})();
</script>
</body>
</html>
