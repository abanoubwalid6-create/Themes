<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Xiaomi World | ثيمات وبصمة شاومي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-gradient-1: #0f172a;
            --bg-gradient-2: #020617;
            --glass-bg: rgba(15, 23, 42, 0.4);
            --glass-border: rgba(255, 255, 255, 0.25);
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --accent-color: #ff6900;
            --accent-glow: rgba(255, 105, 0, 0.25);
            --card-hover: rgba(255, 255, 255, 0.1);
            --shadow-color: rgba(0, 0, 0, 0.3);
            --font-arabic: 'Tajawal', sans-serif;
            --font-english: 'Inter', sans-serif;
        }
        body.light {
            --bg-gradient-1: #e2e8f0;
            --bg-gradient-2: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.1);
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --accent-color: #e05a00;
            --accent-glow: rgba(224, 90, 0, 0.15);
            --card-hover: rgba(0, 0, 0, 0.05);
            --shadow-color: rgba(0, 0, 0, 0.1);
        }
        body {
            font-family: var(--font-arabic);
            background: radial-gradient(circle at 20% 30%, var(--bg-gradient-1), var(--bg-gradient-2));
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem 1rem;
            position: relative;
            overflow-x: hidden;
            transition: background 0.3s ease, color 0.2s ease;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: repeating-linear-gradient(transparent, transparent 39px, rgba(255,105,0,0.05) 40px), repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0,150,255,0.05) 40px);
            pointer-events: none;
            z-index: 0;
        }
        .blob {
            position: fixed;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, var(--accent-color), rgba(255,46,0,0.4));
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            z-index: 0;
            animation: floatBlob 25s infinite alternate ease-in-out;
        }
        .blob:nth-child(2) {
            background: radial-gradient(circle, #0066ff, #00aaff);
            bottom: -20vh;
            right: -10vw;
            width: 60vw;
            height: 60vw;
            opacity: 0.2;
            animation: floatBlob2 30s infinite alternate;
        }
        @keyframes floatBlob {
            0% { transform: translate(0, 0) scale(1);}
            100% { transform: translate(8vw, -8vh) scale(1.3);}
        }
        @keyframes floatBlob2 {
            0% { transform: translate(0, 0) scale(1);}
            100% { transform: translate(-10vw, 10vh) scale(1.2);}
        }
        .container {
            max-width: 750px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }
        .controls {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-bottom: 1.8rem;
            flex-wrap: wrap;
        }
        .ctrl-btn {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            font-family: inherit;
        }
        .ctrl-btn:active { transform: scale(0.96); }
        .ctrl-btn:hover { background: var(--card-hover); border-color: var(--accent-color); }
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(18px) saturate(180%);
            border-radius: 3rem;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 45px -12px var(--shadow-color), inset 0 1px 0 rgba(255,255,255,0.1);
            padding: 2.5rem 2rem;
            transition: all 0.3s ease;
        }
        .hero {
            text-align: center;
            margin-bottom: 2rem;
        }
        .xiaomi-logo {
            width: 80px;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 8px var(--accent-color));
            transition: transform 0.2s;
            cursor: pointer;
        }
        .xiaomi-logo:active { transform: scale(0.96); }
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #fff, var(--accent-color));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 0.3rem;
        }
        .sub {
            color: var(--text-secondary);
            font-size: 0.85rem;
            border-bottom: 1px dashed var(--accent-color);
            display: inline-block;
            padding-bottom: 0.3rem;
        }
        .link-block {
            display: block;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 165, 0, 0.3);
            border-radius: 2rem;
            margin-bottom: 1.3rem;
            padding: 1rem 1.5rem;
            text-decoration: none;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        body.light .link-block {
            background: rgba(0,0,0,0.02);
            border-color: rgba(0,0,0,0.1);
        }
        .link-block:hover {
            transform: translateY(-4px);
            border-color: var(--accent-color);
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.4), 0 0 0 1px var(--accent-color);
            background: var(--card-hover);
        }
        .link-title {
            display: flex;
            align-items: center;
            gap: 0.9rem;
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0;
            color: var(--text-primary);
        }
        .link-title i { font-size: 1.7rem; color: var(--accent-color); }
        /* تم إخفاء الوصف والبادج */
        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            opacity: 0.7;
        }
        .visitor-counter {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.75rem;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            width: auto;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }
        /* لوحة تحكم مبسطة */
        .admin-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 450px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(25px);
            border-radius: 2rem;
            border: 1px solid var(--accent-color);
            padding: 1.5rem;
            z-index: 1000;
            color: white;
            direction: rtl;
            box-shadow: 0 25px 40px black;
        }
        .admin-panel h3 { margin-bottom: 1rem; color: var(--accent-color); text-align: center; }
        .admin-panel input, .admin-panel select {
            width: 100%;
            margin-bottom: 0.8rem;
            padding: 0.7rem;
            border-radius: 1.5rem;
            border: none;
            background: rgba(255,255,255,0.15);
            color: white;
            font-family: inherit;
            font-size: 1rem;
        }
        .admin-panel button {
            background: var(--accent-color);
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            margin-left: 0.5rem;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        .admin-panel .close-btn { background: #dc2626; }
        .admin-list-item {
            background: rgba(255,255,255,0.1);
            margin: 0.5rem 0;
            padding: 0.5rem;
            border-radius: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .delete-link-btn { background: #dc2626; border: none; padding: 0.2rem 0.8rem; border-radius: 1rem; cursor: pointer; }
        .overlay {
            position: fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background: rgba(0,0,0,0.6);
            z-index: 999;
        }
        @media (max-width: 550px) {
            .glass-card { padding: 1.5rem; }
            .link-title { font-size: 1rem; gap: 0.7rem; }
            h1 { font-size: 1.5rem; }
            .xiaomi-logo { width: 60px; }
        }
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-color) 10%, transparent 80%);
            transform: scale(0);
            animation: rippleAnim 0.5s linear forwards;
            pointer-events: none;
        }
        @keyframes rippleAnim {
            to { transform: scale(4); opacity: 0; }
        }
    </style>
</head>
<body>
<div class="blob"></div>
<div class="blob"></div>

<div class="container">
    <div class="controls">
        <button class="ctrl-btn" id="themeToggle"><i class="fas fa-moon"></i> <span id="themeText">داكن</span></button>
        <button class="ctrl-btn" id="langToggle"><i class="fas fa-globe"></i> <span id="langText">English</span></button>
    </div>
    <div class="glass-card" id="app">
        <div class="hero">
            <img class="xiaomi-logo" id="xiaomiLogo" src="https://upload.wikimedia.org/wikipedia/commons/a/ae/Xiaomi_logo_%282021-%29.svg" alt="Xiaomi Logo">
            <h1 id="mainTitle">🚀 انضم إلى عالم شاومي الاحترافي</h1>
            <div class="sub" id="subTitle">Xiaomi World | MIUI · HyperOS · ثيمات حصرية</div>
        </div>

        <div id="linksContainer"></div>

        <div style="text-align: center;">
            <div class="visitor-counter" id="visitorCounter">👥 عدد الزوار: --</div>
        </div>
        <footer><span data-key="footer">💎 ثيمات و خبرات شاومي — لا تتردد في الانضمام لكل القنوات</span></footer>
    </div>
</div>

<script>
    // ---------- بيانات الروابط المبسطة (بدون وصف أو بادج) ----------
    const defaultLinks = [
        { icon: "fab fa-telegram-plane", title_ar: "جروب الدردشة تليجرام", title_en: "Telegram Chat Group", url: "https://t.me/themes345" },
        { icon: "fab fa-telegram-plane", title_ar: "القناة الرئيسية تليجرام", title_en: "Main Telegram Channel", url: "https://t.me/redmi3321" },
        { icon: "fas fa-images", title_ar: "قناة الخلفيات (عالم الفخامة)", title_en: "Wallpaper Channel", url: "https://t.me/themesXiaomia" },
        { icon: "fab fa-whatsapp", title_ar: "قناة الواتس (تحديثات سريعة)", title_en: "WhatsApp Channel", url: "https://whatsapp.com/channel/0029VbC2xVaD8SE4mfwh1H2H" }
    ];

    let linksData = [];
    let currentLang = localStorage.getItem('lang') || 'ar';
    let currentTheme = localStorage.getItem('theme') || 'dark';

    function loadLinksData() {
        const stored = localStorage.getItem('xiaomi_links_simple');
        if (stored) {
            linksData = JSON.parse(stored);
        } else {
            linksData = defaultLinks;
            localStorage.setItem('xiaomi_links_simple', JSON.stringify(defaultLinks));
        }
    }
    function saveLinksData() {
        localStorage.setItem('xiaomi_links_simple', JSON.stringify(linksData));
    }

    function renderLinks() {
        const container = document.getElementById('linksContainer');
        if (!container) return;
        container.innerHTML = '';
        linksData.forEach((link, index) => {
            const title = currentLang === 'ar' ? link.title_ar : link.title_en;
            const block = document.createElement('a');
            block.href = link.url;
            block.target = '_blank';
            block.className = 'link-block sound-link';
            block.setAttribute('data-index', index);
            block.innerHTML = `
                <div class="link-title"><i class="${link.icon}"></i> <span>${title}</span></div>
            `;
            container.appendChild(block);
        });
        reattachSoundEffects();
    }

    function reattachSoundEffects() {
        document.querySelectorAll('.link-block').forEach(link => {
            link.addEventListener('mouseenter', (e) => {
                if (window.playUISound) window.playUISound('hover');
            });
            link.addEventListener('click', (e) => {
                if (window.playUISound) window.playUISound('click');
                const ripple = document.createElement('span');
                ripple.classList.add('ripple');
                const rect = e.currentTarget.getBoundingClientRect();
                ripple.style.left = `${e.clientX - rect.left}px`;
                ripple.style.top = `${e.clientY - rect.top}px`;
                e.currentTarget.appendChild(ripple);
                setTimeout(() => ripple.remove(), 500);
            });
        });
    }

    // عداد زوار بسيط
    function updateVisitorCounter() {
        let visits = localStorage.getItem('visitorCount');
        if (visits === null) visits = 0;
        else visits = parseInt(visits);
        if (!sessionStorage.getItem('hasVisited')) {
            visits++;
            localStorage.setItem('visitorCount', visits);
            sessionStorage.setItem('hasVisited', 'true');
        }
        const counterSpan = document.getElementById('visitorCounter');
        if (counterSpan) counterSpan.innerHTML = `👥 عدد الزوار: ${visits}`;
    }

    // ----- لوحة مشرف مبسطة جداً -----
    let adminPanelOpen = false;
    const SECRET_CODE = "13/7/2010";
    let clickCount = 0, clickTimeout = null;

    function showAdminPanel() {
        if (adminPanelOpen) return;
        adminPanelOpen = true;
        const overlay = document.createElement('div');
        overlay.className = 'overlay';
        overlay.id = 'adminOverlay';
        document.body.appendChild(overlay);
        const panel = document.createElement('div');
        panel.className = 'admin-panel';
        panel.id = 'adminPanel';
        panel.innerHTML = `
            <h3>🔧 لوحة التحكم - إدارة الروابط</h3>
            <div id="adminLinksList" style="max-height: 200px; overflow-y: auto; margin-bottom: 1rem;"></div>
            <hr>
            <h4>➕ إضافة رابط جديد</h4>
            <input type="text" id="newTitleAr" placeholder="الاسم بالعربية (مثال: جروب التيليجرام)">
            <input type="text" id="newTitleEn" placeholder="الاسم بالإنجليزية (مثال: Telegram Group)">
            <input type="text" id="newUrl" placeholder="الرابط (URL)">
            <select id="newIcon">
                <option value="fab fa-telegram-plane">تيليجرام</option>
                <option value="fab fa-whatsapp">واتساب</option>
                <option value="fas fa-images">صور / خلفيات</option>
                <option value="fab fa-youtube">يوتيوب</option>
                <option value="fab fa-instagram">انستقرام</option>
                <option value="fas fa-globe">رابط عام</option>
            </select>
            <button id="addLinkBtn" style="background:#ff6900;">➕ إضافة الرابط</button>
            <button id="closeAdminBtn" class="close-btn">إغلاق</button>
        `;
        document.body.appendChild(panel);
        refreshAdminList();

        document.getElementById('addLinkBtn').addEventListener('click', () => {
            const newTitleAr = document.getElementById('newTitleAr').value.trim();
            const newTitleEn = document.getElementById('newTitleEn').value.trim();
            const newUrl = document.getElementById('newUrl').value.trim();
            const icon = document.getElementById('newIcon').value;
            if (!newTitleAr || !newUrl) {
                alert("الرجاء إدخال الاسم بالعربية والرابط");
                return;
            }
            const newLink = {
                icon: icon,
                title_ar: newTitleAr,
                title_en: newTitleEn || newTitleAr, // إذا ترك الإنجليزية نستخدم العربي
                url: newUrl
            };
            linksData.push(newLink);
            saveLinksData();
            renderLinks();
            refreshAdminList();
            // مسح الحقول
            document.getElementById('newTitleAr').value = '';
            document.getElementById('newTitleEn').value = '';
            document.getElementById('newUrl').value = '';
        });
        document.getElementById('closeAdminBtn').addEventListener('click', closeAdminPanel);
    }

    function refreshAdminList() {
        const listDiv = document.getElementById('adminLinksList');
        if (!listDiv) return;
        listDiv.innerHTML = '<strong>الروابط الحالية:</strong>';
        linksData.forEach((link, idx) => {
            const item = document.createElement('div');
            item.className = 'admin-list-item';
            item.innerHTML = `
                <span><i class="${link.icon}"></i> ${link.title_ar} / ${link.title_en}</span>
                <button class="delete-link-btn" data-idx="${idx}">🗑️</button>
            `;
            listDiv.appendChild(item);
        });
        document.querySelectorAll('.delete-link-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.getAttribute('data-idx'));
                if (confirm("احذف هذا الرابط؟")) {
                    linksData.splice(idx, 1);
                    saveLinksData();
                    renderLinks();
                    refreshAdminList();
                }
            });
        });
    }

    function closeAdminPanel() {
        const panel = document.getElementById('adminPanel');
        const overlay = document.getElementById('adminOverlay');
        if (panel) panel.remove();
        if (overlay) overlay.remove();
        adminPanelOpen = false;
    }

    function initDoubleClickOnLogo() {
        const logo = document.getElementById('xiaomiLogo');
        if (!logo) return;
        logo.addEventListener('click', (e) => {
            e.stopPropagation();
            clickCount++;
            if (clickTimeout) clearTimeout(clickTimeout);
            clickTimeout = setTimeout(() => { clickCount = 0; }, 800);
            if (clickCount === 2) {
                const code = prompt("🔐 أدخل رمز المشرف:");
                if (code === SECRET_CODE) {
                    showAdminPanel();
                } else if (code !== null) {
                    alert("❌ رمز غير صحيح");
                }
                clickCount = 0;
                if (clickTimeout) clearTimeout(clickTimeout);
            }
        });
    }

    // ---------- الصوت والثيم واللغة (مبسطة) ----------
    let audioCtx = null;
    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const playSound = (type) => {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            if (type === 'click') {
                osc.frequency.value = 880;
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.15);
                osc.start();
                osc.stop(now + 0.15);
            } else {
                osc.frequency.value = 440;
                gain.gain.setValueAtTime(0.08, now);
                gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.1);
                osc.start();
                osc.stop(now + 0.1);
            }
        };
        window.playUISound = playSound;
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function bindFirstInteraction() {
        const events = ['click', 'touchstart', 'keydown'];
        const handler = () => {
            initAudio();
            events.forEach(ev => document.removeEventListener(ev, handler));
        };
        events.forEach(ev => document.addEventListener(ev, handler));
    }
    bindFirstInteraction();

    const translations = {
        ar: { themeDark: "داكن", themeLight: "فاتح", langBtn: "English", mainTitle: "🚀 انضم إلى عالم شاومي الاحترافي", subTitle: "Xiaomi World | MIUI · HyperOS · ثيمات حصرية", footer: "💎 ثيمات و خبرات شاومي — تابع قنواتنا" },
        en: { themeDark: "Dark", themeLight: "Light", langBtn: "العربية", mainTitle: "🚀 Join the Professional Xiaomi World", subTitle: "Xiaomi World | MIUI · HyperOS · Exclusive Themes", footer: "💎 Xiaomi themes & expertise — follow our channels" }
    };
    function applyLanguage(lang) {
        const t = translations[lang];
        if (t) {
            document.getElementById('mainTitle').innerText = t.mainTitle;
            document.getElementById('subTitle').innerText = t.subTitle;
            document.querySelector('[data-key="footer"]').innerText = t.footer;
            document.getElementById('langText').innerText = t.langBtn;
            document.getElementById('themeText').innerText = (currentTheme === 'dark' ? (lang === 'ar' ? 'داكن' : 'Dark') : (lang === 'ar' ? 'فاتح' : 'Light'));
        }
        document.documentElement.lang = lang === 'ar' ? 'ar' : 'en';
        document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
        localStorage.setItem('lang', lang);
        currentLang = lang;
        renderLinks();
    }
    function applyTheme(theme) {
        if (theme === 'light') {
            document.body.classList.add('light');
            document.getElementById('themeText').innerText = currentLang === 'ar' ? 'فاتح' : 'Light';
        } else {
            document.body.classList.remove('light');
            document.getElementById('themeText').innerText = currentLang === 'ar' ? 'داكن' : 'Dark';
        }
        localStorage.setItem('theme', theme);
        currentTheme = theme;
    }
    function toggleTheme() { const newTheme = currentTheme === 'dark' ? 'light' : 'dark'; applyTheme(newTheme); if(window.playUISound) window.playUISound('click'); }
    function toggleLanguage() { const newLang = currentLang === 'ar' ? 'en' : 'ar'; applyLanguage(newLang); if(window.playUISound) window.playUISound('click'); }

    document.getElementById('themeToggle').addEventListener('click', toggleTheme);
    document.getElementById('langToggle').addEventListener('click', toggleLanguage);

    // بدء التطبيق
    loadLinksData();
    applyTheme(currentTheme);
    applyLanguage(currentLang);
    renderLinks();
    updateVisitorCounter();
    initDoubleClickOnLogo();
</script>
</body>
</html>
