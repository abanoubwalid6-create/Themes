<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Xiaomi World | احترافية مطلقة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-gradient-1: #0f172a;
            --bg-gradient-2: #020617;
            --glass-bg: rgba(15, 23, 42, 0.4);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --accent-color: #ff6900;
            --card-hover: rgba(255, 255, 255, 0.08);
        }
        body.light {
            --bg-gradient-1: #e2e8f0;
            --bg-gradient-2: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(0, 0, 0, 0.1);
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --accent-color: #e05a00;
            --card-hover: rgba(0, 0, 0, 0.05);
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background: radial-gradient(circle at 20% 30%, var(--bg-gradient-1), var(--bg-gradient-2));
            color: var(--text-primary);
            min-height: 100vh;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 0.5rem 1rem;
            border: 1px solid var(--glass-border);
        }
        .controls-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .ctrl-btn, .theme-preset {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 0.3rem 0.9rem;
            font-size: 0.8rem;
            color: var(--text-primary);
            cursor: pointer;
            transition: 0.2s;
        }
        .ctrl-btn:hover, .theme-preset:hover {
            background: var(--accent-color);
            transform: scale(0.96);
        }
        .fps-counter {
            background: rgba(0,0,0,0.6);
            border-radius: 30px;
            padding: 0.2rem 0.8rem;
            font-family: monospace;
            font-size: 0.8rem;
        }
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid var(--glass-border);
            padding: 1.8rem;
        }
        .hero {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .xiaomi-logo {
            width: 70px;
            margin-bottom: 0.8rem;
            cursor: pointer;
            filter: drop-shadow(0 0 6px var(--accent-color));
        }
        h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #fff, var(--accent-color));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 800;
        }
        .sub {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-top: 0.2rem;
        }
        .link-block {
            display: block;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,165,0,0.2);
            border-radius: 1.5rem;
            margin-bottom: 0.9rem;
            padding: 0.8rem 1.2rem;
            text-decoration: none;
            transition: 0.2s;
        }
        .link-block:hover {
            transform: translateY(-2px);
            border-color: var(--accent-color);
            background: var(--card-hover);
        }
        .link-title {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        .link-title i { font-size: 1.4rem; color: var(--accent-color); }
        .subscribe-btn {
            background: var(--accent-color);
            border: none;
            border-radius: 2rem;
            padding: 0.5rem 1.2rem;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 0.8rem;
            width: 100%;
        }
        .visitor-counter {
            display: inline-block;
            background: rgba(0,0,0,0.3);
            border-radius: 2rem;
            padding: 0.2rem 0.8rem;
            font-size: 0.7rem;
            margin-top: 0.5rem;
        }
        footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.7rem;
            opacity: 0.7;
        }
        /* لوحة المشرف (مبسطة) */
        .admin-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 400px;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            border-radius: 1.5rem;
            border: 1px solid var(--accent-color);
            padding: 1.2rem;
            z-index: 1000;
            color: white;
            direction: rtl;
        }
        .admin-panel input, .admin-panel select {
            width: 100%;
            margin-bottom: 0.6rem;
            padding: 0.5rem;
            border-radius: 1rem;
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
        }
        .admin-panel button {
            background: var(--accent-color);
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 1.5rem;
            cursor: pointer;
            margin-left: 0.5rem;
        }
        .close-btn { background: #dc2626 !important; }
        .overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.6);
            z-index: 999;
        }
        @media (max-width: 550px) {
            .glass-card { padding: 1rem; }
            h1 { font-size: 1.4rem; }
            .top-bar { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
<canvas id="particleCanvas"></canvas>
<div class="container">
    <div class="top-bar">
        <div class="controls-group">
            <button class="ctrl-btn" id="themeToggle"><i class="fas fa-moon"></i> <span id="themeText">داكن</span></button>
            <button class="ctrl-btn" id="langToggle"><i class="fas fa-globe"></i> <span id="langText">English</span></button>
            <button class="ctrl-btn" id="subscribeNotificationBtn"><i class="fas fa-bell"></i> اشترك</button>
        </div>
        <div class="controls-group">
            <span class="theme-preset" data-color="#ff6900">برتقالي</span>
            <span class="theme-preset" data-color="#3b82f6">أزرق</span>
            <span class="theme-preset" data-color="#8b5cf6">بنفسجي</span>
        </div>
        <div class="fps-counter" id="fpsCounter">⚡ 0 FPS</div>
    </div>
    <div class="glass-card">
        <div class="hero">
            <img class="xiaomi-logo" id="xiaomiLogo" src="https://upload.wikimedia.org/wikipedia/commons/a/ae/Xiaomi_logo_%282021-%29.svg" alt="Xiaomi">
            <h1 id="mainTitle">Xiaomi World</h1>
            <div class="sub" id="subTitle">ثيمات و خبرات شاومي الاحترافية</div>
        </div>
        <div id="linksContainer"></div>
        <div style="text-align: center;">
            <div class="visitor-counter" id="visitorCounter">👥 زوار: --</div>
        </div>
        <footer><span data-key="footer">💎 جميع الحقوق محفوظة | صانع المحتوى</span></footer>
    </div>
</div>

<script>
    // ------------------------------ 1. أقصى إطارات (FPS Counter) ------------------------------
    let fps = 0, lastTime = performance.now(), frames = 0;
    function updateFPS() {
        const now = performance.now();
        frames++;
        if (now - lastTime >= 1000) {
            fps = frames;
            document.getElementById('fpsCounter').innerHTML = `⚡ ${fps} FPS`;
            frames = 0;
            lastTime = now;
        }
        requestAnimationFrame(updateFPS);
    }
    requestAnimationFrame(updateFPS);

    // ------------------------------ 2. خلفية جسيمات خفيفة ------------------------------
    const canvas = document.getElementById('particleCanvas');
    let ctx = canvas.getContext('2d');
    let particles = [];
    const PARTICLE_COUNT = 35; // أقل من قبل لرفع الفريمات
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    function initParticles() {
        particles = [];
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 2 + 1,
                speedX: (Math.random() - 0.5) * 0.4,
                speedY: (Math.random() - 0.5) * 0.4,
                color: `rgba(255, 105, 0, ${Math.random() * 0.4 + 0.2})`
            });
        }
    }
    function drawParticles() {
        if (!ctx) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let p of particles) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();
            p.x += p.speedX;
            p.y += p.speedY;
            if (p.x < 0) p.x = canvas.width;
            if (p.x > canvas.width) p.x = 0;
            if (p.y < 0) p.y = canvas.height;
            if (p.y > canvas.height) p.y = 0;
        }
        requestAnimationFrame(drawParticles);
    }
    window.addEventListener('resize', () => { resizeCanvas(); initParticles(); });
    resizeCanvas();
    initParticles();
    drawParticles();

    // ------------------------------ 3. الروابط الديناميكية (بدون وصف) ------------------------------
    const defaultLinks = [
        { icon: "fab fa-telegram-plane", title_ar: "جروب الدردشة تليجرام", title_en: "Telegram Chat", url: "https://t.me/themes345" },
        { icon: "fab fa-telegram-plane", title_ar: "القناة الرئيسية", title_en: "Main Channel", url: "https://t.me/redmi3321" },
        { icon: "fas fa-images", title_ar: "قناة الخلفيات", title_en: "Wallpapers", url: "https://t.me/themesXiaomia" },
        { icon: "fab fa-whatsapp", title_ar: "قناة الواتس", title_en: "WhatsApp", url: "https://whatsapp.com/channel/0029VbC2xVaD8SE4mfwh1H2H" }
    ];
    let linksData = [];
    let currentLang = localStorage.getItem('lang') || 'ar';
    let currentTheme = localStorage.getItem('theme') || 'dark';

    function loadLinks() {
        let stored = localStorage.getItem('xiaomi_links_simple');
        linksData = stored ? JSON.parse(stored) : defaultLinks;
        if (!stored) localStorage.setItem('xiaomi_links_simple', JSON.stringify(defaultLinks));
    }
    function saveLinks() { localStorage.setItem('xiaomi_links_simple', JSON.stringify(linksData)); }
    function renderLinks() {
        const container = document.getElementById('linksContainer');
        if (!container) return;
        container.innerHTML = '';
        linksData.forEach(link => {
            const title = currentLang === 'ar' ? link.title_ar : link.title_en;
            const a = document.createElement('a');
            a.href = link.url;
            a.target = '_blank';
            a.className = 'link-block';
            a.innerHTML = `<div class="link-title"><i class="${link.icon}"></i> <span>${title}</span></div>`;
            container.appendChild(a);
        });
    }

    // ------------------------------ 4. عداد الزوار ------------------------------
    let visits = parseInt(localStorage.getItem('visitorCount')||'0');
    if (!sessionStorage.getItem('hasVisited')) {
        visits++;
        localStorage.setItem('visitorCount', visits);
        sessionStorage.setItem('hasVisited', 'true');
    }
    document.getElementById('visitorCounter').innerHTML = `👥 زوار: ${visits}`;

    // ------------------------------ 5. الثيم واللغة ------------------------------
    function applyTheme(theme) {
        if (theme === 'light') document.body.classList.add('light');
        else document.body.classList.remove('light');
        localStorage.setItem('theme', theme);
        currentTheme = theme;
        document.getElementById('themeText').innerText = (theme === 'dark' ? (currentLang === 'ar' ? 'داكن' : 'Dark') : (currentLang === 'ar' ? 'فاتح' : 'Light'));
    }
    function applyLanguage(lang) {
        currentLang = lang;
        document.documentElement.lang = lang === 'ar' ? 'ar' : 'en';
        document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
        const titles = {
            ar: { main: "Xiaomi World", sub: "ثيمات و خبرات شاومي الاحترافية", footer: "💎 جميع الحقوق محفوظة | صانع المحتوى" },
            en: { main: "Xiaomi World", sub: "Xiaomi themes & expertise", footer: "💎 All rights reserved | Content Creator" }
        };
        document.getElementById('mainTitle').innerText = titles[lang].main;
        document.getElementById('subTitle').innerText = titles[lang].sub;
        document.querySelector('[data-key="footer"]').innerText = titles[lang].footer;
        document.getElementById('langText').innerText = lang === 'ar' ? 'English' : 'العربية';
        document.getElementById('themeText').innerText = (currentTheme === 'dark' ? (lang === 'ar' ? 'داكن' : 'Dark') : (lang === 'ar' ? 'فاتح' : 'Light'));
        localStorage.setItem('lang', lang);
        renderLinks();
    }
    document.getElementById('themeToggle').addEventListener('click', () => { applyTheme(currentTheme === 'dark' ? 'light' : 'dark'); });
    document.getElementById('langToggle').addEventListener('click', () => { applyLanguage(currentLang === 'ar' ? 'en' : 'ar'); });
    document.querySelectorAll('.theme-preset').forEach(btn => {
        btn.addEventListener('click', () => {
            let color = btn.getAttribute('data-color');
            document.documentElement.style.setProperty('--accent-color', color);
        });
    });

    // ------------------------------ 6. نظام الإشتراك والإشعارات ------------------------------
    let subscribedUsers = JSON.parse(localStorage.getItem('subscribedUsers') || '[]');
    function notifySubscribers(title, body, url) {
        if (!("Notification" in window) || Notification.permission !== "granted") return;
        subscribedUsers.forEach(user => {
            // في هذا النموذج المبسط، كل مستخدم هو مجرد تسجيل في نفس المتصفح
            // سنقوم بعرض إشعار محلي لكل مشترك في نفس الجهاز
            if (document.visibilityState === 'visible') {
                // نعرض إشعار عادي
                new Notification(title, { body, icon: 'https://upload.wikimedia.org/wikipedia/commons/a/ae/Xiaomi_logo_%282021-%29.svg' });
            }
        });
        // في الواقع الحقيقي، يحتاج الأمر إلى service worker و push subscription، لكن هذا المحاكاة كافية للعرض.
    }
    // زر الاشتراك
    const subscribeBtn = document.getElementById('subscribeNotificationBtn');
    subscribeBtn.addEventListener('click', async () => {
        if (!("Notification" in window)) {
            alert("المتصفح لا يدعم الإشعارات");
            return;
        }
        if (Notification.permission === "granted") {
            // مضاف بالفعل
            if (!subscribedUsers.includes('local')) {
                subscribedUsers.push('local');
                localStorage.setItem('subscribedUsers', JSON.stringify(subscribedUsers));
                alert("أنت مشترك بالفعل! ستصل إليك إشعارات عند إضافة روابط جديدة.");
            } else {
                alert("أنت مشترك بالفعل.");
            }
        } else if (Notification.permission !== "denied") {
            const permission = await Notification.requestPermission();
            if (permission === "granted") {
                if (!subscribedUsers.includes('local')) {
                    subscribedUsers.push('local');
                    localStorage.setItem('subscribedUsers', JSON.stringify(subscribedUsers));
                    alert("تم الاشتراك! ستتلقى إشعارات عند إضافة أي رابط جديد.");
                }
            } else {
                alert("لم يتم منح صلاحية الإشعارات.");
            }
        } else {
            alert("تم رفض الإشعارات مسبقًا. فضلاً قم بتغيير الإعدادات من المتصفح.");
        }
    });

    // ------------------------------ 7. لوحة المشرف (مع إرسال إشعار عند إضافة رابط) ------------------------------
    let adminPanelOpen = false;
    const SECRET_CODE = "13/7/2010";
    let clickCountLogo = 0, logoTimeout;

    function showAdminPanel() {
        if (adminPanelOpen) return;
        adminPanelOpen = true;
        const overlay = document.createElement('div');
        overlay.className = 'overlay';
        overlay.id = 'adminOverlay';
        document.body.appendChild(overlay);
        const panel = document.createElement('div');
        panel.className = 'admin-panel';
        panel.id = 'adminPanel';
        panel.innerHTML = `
            <h3>🔧 إدارة الروابط</h3>
            <div id="adminLinksList" style="max-height: 180px; overflow-y: auto; margin-bottom: 1rem;"></div>
            <hr>
            <h4>➕ إضافة رابط</h4>
            <input type="text" id="newTitleAr" placeholder="الاسم بالعربية">
            <input type="text" id="newTitleEn" placeholder="الاسم بالإنجليزية">
            <input type="text" id="newUrl" placeholder="الرابط URL">
            <select id="newIcon">
                <option value="fab fa-telegram-plane">تيليجرام</option>
                <option value="fab fa-whatsapp">واتساب</option>
                <option value="fas fa-images">صور</option>
                <option value="fab fa-youtube">يوتيوب</option>
                <option value="fas fa-globe">رابط عام</option>
            </select>
            <button id="addLinkBtn">➕ إضافة</button>
            <button id="closeAdminBtn" class="close-btn">إغلاق</button>
        `;
        document.body.appendChild(panel);
        refreshAdminList();

        document.getElementById('addLinkBtn').addEventListener('click', () => {
            const newTitleAr = document.getElementById('newTitleAr').value.trim();
            const newTitleEn = document.getElementById('newTitleEn').value.trim() || newTitleAr;
            const newUrl = document.getElementById('newUrl').value.trim();
            const icon = document.getElementById('newIcon').value;
            if (!newTitleAr || !newUrl) { alert("الرجاء إدخال الاسم والرابط"); return; }
            const newLink = { icon, title_ar: newTitleAr, title_en: newTitleEn, url: newUrl };
            linksData.push(newLink);
            saveLinks();
            renderLinks();
            refreshAdminList();
            // إرسال إشعار للمشتركين
             if (subscribedUsers.length > 0 && Notification.permission === "granted") {
                const titleAr = "✨ رابط جديد تمت إضافته بواسطة المشرف";
                const bodyAr = `تم إضافة: ${newTitleAr}`;
                notifySubscribers(titleAr, bodyAr, newUrl);
                // يمكن إظهار رسالة للمشرف
                alert("تم إضافة الرابط وإرسال إشعار للمشتركين.");
            } else {
                alert("تم إضافة الرابط (لا يوجد مشتركين للإشعار).");
            }
            document.getElementById('newTitleAr').value = '';
            document.getElementById('newTitleEn').value = '';
            document.getElementById('newUrl').value = '';
        });
        document.getElementById('closeAdminBtn').addEventListener('click', closeAdminPanel);
    }

    function refreshAdminList() {
        const listDiv = document.getElementById('adminLinksList');
        if (!listDiv) return;
        listDiv.innerHTML = '<strong>الروابط الحالية:</strong>';
        linksData.forEach((link, idx) => {
            const item = document.createElement('div');
            item.style.background = 'rgba(255,255,255,0.1)';
            item.style.margin = '0.3rem 0';
            item.style.padding = '0.3rem';
            item.style.borderRadius = '1rem';
            item.innerHTML = `
                <span>${link.title_ar}</span>
                <button class="delete-link-btn" data-idx="${idx}" style="background:#dc2626; border:none; border-radius:1rem; padding:0.1rem 0.6rem; margin-right:0.5rem;">حذف</button>
            `;
            listDiv.appendChild(item);
        });
        document.querySelectorAll('.delete-link-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.getAttribute('data-idx'));
                if (confirm("احذف هذا الرابط؟")) {
                    linksData.splice(idx, 1);
                    saveLinks();
                    renderLinks();
                    refreshAdminList();
                }
            });
        });
    }
    function closeAdminPanel() {
        const panel = document.getElementById('adminPanel');
        const overlay = document.getElementById('adminOverlay');
        if (panel) panel.remove();
        if (overlay) overlay.remove();
        adminPanelOpen = false;
    }
    // الضغط المزدوج على الشعار
    document.getElementById('xiaomiLogo').addEventListener('click', () => {
        clickCountLogo++;
        if (logoTimeout) clearTimeout(logoTimeout);
        logoTimeout = setTimeout(() => { clickCountLogo = 0; }, 800);
        if (clickCountLogo === 2) {
            let code = prompt("🔐 رمز المشرف:");
            if (code === SECRET_CODE) showAdminPanel();
            else if (code) alert("رمز خاطئ");
            clickCountLogo = 0;
        }
    });

    // بدء التشغيل
    loadLinks();
    applyTheme(currentTheme);
    applyLanguage(currentLang);
    renderLinks();
</script>
</body>
</html>
