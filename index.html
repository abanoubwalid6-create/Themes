<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Xiaomi World Ultra</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{font-family:'Tajawal',sans-serif;background:#06060f;color:white;overflow-x:hidden;min-height:100vh;}
.bg-wrap{position:fixed;inset:0;z-index:-3;background:#06060f;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(120px);animation:orbFloat 12s ease-in-out infinite;}
.orb1{width:700px;height:700px;background:rgba(255,90,0,.18);top:-200px;left:-200px;animation-delay:0s;}
.orb2{width:500px;height:500px;background:rgba(255,60,0,.1);bottom:-150px;right:-100px;animation-delay:4s;}
.orb3{width:400px;height:400px;background:rgba(180,40,255,.08);top:40%;left:30%;animation-delay:8s;}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(40px,-30px) scale(1.05);}66%{transform:translate(-20px,40px) scale(.97);}}
.grid-bg{position:fixed;inset:0;z-index:-2;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:50px 50px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 20%,transparent 100%);}
.glass{background:linear-gradient(135deg,rgba(255,255,255,.12) 0%,rgba(255,255,255,.04) 100%);backdrop-filter:blur(32px) saturate(200%) brightness(1.1);-webkit-backdrop-filter:blur(32px) saturate(200%) brightness(1.1);border:1px solid rgba(255,255,255,.15);box-shadow:0 8px 40px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.2);}
.glass-deep{background:linear-gradient(135deg,rgba(255,255,255,.08) 0%,rgba(255,255,255,.02) 100%);backdrop-filter:blur(48px) saturate(180%);-webkit-backdrop-filter:blur(48px) saturate(180%);border:1px solid rgba(255,255,255,.1);box-shadow:0 20px 60px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.15);}
#ptc{position:fixed;inset:0;z-index:-1;overflow:hidden;pointer-events:none;}
.pt{position:absolute;border-radius:50%;background:radial-gradient(circle,#ff6900,#ff2200);animation:rise linear infinite;opacity:0;}
@keyframes rise{0%{transform:translateY(100vh) scale(0);opacity:0;}10%{opacity:.4;}90%{opacity:.2;}100%{transform:translateY(-10vh) scale(1.5);opacity:0;}}
.wrap{width:min(1200px,95%);margin:auto;padding:1rem;}
.topbar{margin-top:1rem;padding:.9rem 1.4rem;border-radius:60px;display:flex;justify-content:space-between;align-items:center;animation:slideDown .6s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes slideDown{from{transform:translateY(-40px);opacity:0;}to{transform:none;opacity:1;}}
.logo-text{font-weight:900;font-size:1.1rem;letter-spacing:-.5px;background:linear-gradient(135deg,#fff 30%,#ff6900);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.topbar-right{display:flex;align-items:center;gap:.7rem;}
.fps{font-family:monospace;font-size:.75rem;background:rgba(0,255,120,.12);border:1px solid rgba(0,255,120,.25);color:#00ff88;padding:.3rem .7rem;border-radius:20px;}
.ctrl-btn{width:46px;height:46px;border:none;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:white;font-size:.95rem;cursor:pointer;transition:all .25s cubic-bezier(.34,1.56,.64,1);backdrop-filter:blur(10px);}
.ctrl-btn:hover{background:#ff6900;transform:scale(1.12);border-color:#ff6900;}
.ctrl-btn:active{transform:scale(.95);}
.hero{margin-top:1.2rem;padding:3rem 2rem;border-radius:40px;text-align:center;position:relative;overflow:hidden;animation:fadeUp .8s cubic-bezier(.34,1.56,.64,1) .1s both;}
@keyframes fadeUp{from{transform:translateY(30px);opacity:0;}to{transform:none;opacity:1;}}
.hero-shine{position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(from 0deg at 50% 50%,transparent 0deg,rgba(255,105,0,.06) 60deg,transparent 120deg);animation:spin 20s linear infinite;pointer-events:none;}
@keyframes spin{to{transform:rotate(360deg);}}
.xiaomi-logo{width:90px;position:relative;z-index:2;filter:drop-shadow(0 0 20px rgba(255,105,0,.8));animation:logoPulse 3s ease-in-out infinite;}
@keyframes logoPulse{0%,100%{filter:drop-shadow(0 0 20px rgba(255,105,0,.8));transform:scale(1);}50%{filter:drop-shadow(0 0 40px rgba(255,105,0,1));transform:scale(1.06);}}
.hero h1{margin-top:1rem;font-size:3.2rem;font-weight:900;line-height:1.1;background:linear-gradient(135deg,#fff 20%,#ffb37a 60%,#ff6900);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero-sub{margin-top:.6rem;opacity:.65;font-size:1rem;font-weight:300;letter-spacing:.3px;}
.hero-badges{display:flex;justify-content:center;gap:.6rem;flex-wrap:wrap;margin-top:1.2rem;}
.badge{padding:.4rem 1rem;border-radius:30px;font-size:.78rem;font-weight:500;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(10px);}
.section{margin-top:1.2rem;padding:1.5rem;border-radius:32px;animation:fadeUp .6s ease both;}
.sec-title{display:flex;align-items:center;gap:.6rem;font-size:1.1rem;font-weight:700;margin-bottom:1.2rem;}
.sec-icon{width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,#ff6900,#ff2200);display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;}
.links-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:.9rem;}
.link-card{padding:1.1rem 1.2rem;border-radius:24px;text-decoration:none;color:white;display:flex;align-items:center;gap:1rem;transition:all .3s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);}
.link-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,105,0,.15),transparent);opacity:0;transition:.3s;}
.link-card:hover{transform:translateY(-6px) scale(1.02);border-color:rgba(255,105,0,.5);box-shadow:0 20px 50px rgba(255,105,0,.2);}
.link-card:hover::before{opacity:1;}
.link-card:active{transform:scale(.97);}
.l-icon{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;box-shadow:0 4px 16px rgba(0,0,0,.3);}
.telegram{background:linear-gradient(135deg,#229ED9,#1a7fc1);}
.whatsapp{background:linear-gradient(135deg,#25D366,#1da851);}
.wallpaper{background:linear-gradient(135deg,#9333ea,#7c3aed);}
.youtube{background:linear-gradient(135deg,#ff0000,#cc0000);}
.global{background:linear-gradient(135deg,#ff6900,#ff4400);}
.l-text h3{font-size:.95rem;font-weight:600;margin-bottom:.25rem;}
.l-text p{opacity:.55;font-size:.78rem;word-break:break-all;line-height:1.3;}
.l-arrow{margin-right:auto;opacity:.3;font-size:.8rem;flex-shrink:0;}
.link-card:hover .l-arrow{opacity:.8;transform:translateX(-4px);}
.l-arrow{transition:.3s;}
.codes-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:.3rem;border-radius:16px;transition:.2s;margin:-1rem;margin-bottom:.5rem;padding:1rem;}
.codes-toggle:hover{background:rgba(255,255,255,.04);}
.chevron{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:all .4s cubic-bezier(.34,1.56,.64,1);}
.chevron.open{transform:rotate(180deg);background:rgba(255,105,0,.2);border-color:rgba(255,105,0,.4);}
.codes-body{max-height:0;overflow:hidden;transition:max-height .5s ease;}
.codes-body.open{max-height:4000px;}
.search-input{width:100%;padding:.9rem 1rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:18px;outline:none;color:white;font-family:'Tajawal',sans-serif;font-size:.95rem;margin-bottom:1rem;margin-top:.8rem;transition:.25s;}
.search-input::placeholder{opacity:.45;}
.search-input:focus{border-color:rgba(255,105,0,.5);background:rgba(255,105,0,.06);}
.code-item{padding:1rem 1.2rem;border-radius:22px;display:flex;justify-content:space-between;align-items:center;gap:1rem;margin-bottom:.8rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);transition:all .25s;}
.code-item:hover{transform:translateX(-4px);border-color:rgba(255,105,0,.3);background:rgba(255,105,0,.05);}
.code-val{font-size:1rem;font-weight:700;letter-spacing:.5px;color:#ffa060;}
.code-desc{font-size:.8rem;opacity:.6;margin-top:.2rem;}
.copy-btn{padding:.75rem 1.2rem;border:none;border-radius:16px;background:linear-gradient(135deg,#ff6900,#ff4400);color:white;font-family:'Tajawal',sans-serif;font-weight:700;font-size:.85rem;cursor:pointer;transition:all .2s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;flex-shrink:0;box-shadow:0 4px 15px rgba(255,105,0,.3);}
.copy-btn:hover{transform:scale(1.07);box-shadow:0 6px 20px rgba(255,105,0,.5);}
.copy-btn:active{transform:scale(.95);}
.bot-section{margin-top:1.2rem;padding:1.5rem;border-radius:32px;position:relative;overflow:hidden;}
.bot-section::before{content:'';position:absolute;top:-2px;left:-2px;right:-2px;bottom:-2px;border-radius:33px;z-index:-1;background:linear-gradient(135deg,rgba(255,105,0,.4),rgba(150,0,255,.2),rgba(255,0,60,.3));animation:borderGlow 4s linear infinite;}
@keyframes borderGlow{0%,100%{opacity:.5;}50%{opacity:1;}}
.bot-header{display:flex;align-items:center;gap:.8rem;margin-bottom:1.2rem;}
.bot-avatar{width:48px;height:48px;border-radius:18px;background:linear-gradient(135deg,#ff6900,#8b00ff);display:flex;align-items:center;justify-content:center;font-size:1.3rem;box-shadow:0 8px 24px rgba(255,105,0,.4);animation:avatarPulse 2s ease-in-out infinite;}
@keyframes avatarPulse{0%,100%{box-shadow:0 8px 24px rgba(255,105,0,.4);}50%{box-shadow:0 8px 35px rgba(255,105,0,.7);}}
.bot-title{font-weight:800;font-size:1.1rem;}
.bot-sub{font-size:.8rem;opacity:.55;font-weight:300;}
.bot-input-row{display:flex;gap:.7rem;}
.bot-input{flex:1;padding:1rem 1.2rem;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:22px;outline:none;color:white;font-family:'Tajawal',sans-serif;font-size:1rem;transition:.3s;}
.bot-input::placeholder{opacity:.45;}
.bot-input:focus{border-color:rgba(255,105,0,.6);background:rgba(255,105,0,.07);box-shadow:0 0 0 4px rgba(255,105,0,.1);}
.bot-btn{padding:1rem 1.5rem;border:none;border-radius:22px;background:linear-gradient(135deg,#ff6900,#ff2200);color:white;font-family:'Tajawal',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;white-space:nowrap;box-shadow:0 6px 24px rgba(255,105,0,.35);transition:all .25s cubic-bezier(.34,1.56,.64,1);}
.bot-btn:hover{transform:translateY(-3px) scale(1.04);box-shadow:0 10px 32px rgba(255,105,0,.5);}
.bot-btn:active{transform:scale(.96);}
.bot-btn:disabled{opacity:.5;pointer-events:none;}
.bot-result{margin-top:1rem;border-radius:24px;overflow:hidden;animation:resultIn .5s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes resultIn{from{transform:translateY(20px) scale(.97);opacity:0;}to{transform:none;opacity:1;}}
.result-header{padding:1rem 1.2rem;background:linear-gradient(135deg,rgba(255,105,0,.15),rgba(255,105,0,.05));border:1px solid rgba(255,105,0,.2);border-radius:24px 24px 0 0;border-bottom:none;display:flex;align-items:center;gap:.8rem;}
.result-phone-name{font-size:1.1rem;font-weight:800;}
.result-chip{padding:.25rem .8rem;border-radius:20px;font-size:.75rem;font-weight:600;background:rgba(255,105,0,.2);border:1px solid rgba(255,105,0,.35);color:#ffa060;}
.result-body{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-top:none;border-radius:0 0 24px 24px;padding:1.2rem;}
.update-item{display:flex;align-items:flex-start;gap:.9rem;padding:.9rem;border-radius:18px;margin-bottom:.7rem;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);transition:.2s;}
.update-item:hover{background:rgba(255,105,0,.06);border-color:rgba(255,105,0,.15);}
.update-item:last-child{margin-bottom:0;}
.upd-icon{width:40px;height:40px;border-radius:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1rem;}
.upd-icon.green{background:rgba(0,220,100,.15);color:#00dc64;}
.upd-icon.blue{background:rgba(0,180,255,.15);color:#00b4ff;}
.upd-icon.orange{background:rgba(255,150,0,.15);color:#ff9600;}
.upd-icon.purple{background:rgba(160,0,255,.15);color:#a000ff;}
.upd-text h4{font-size:.9rem;font-weight:600;margin-bottom:.2rem;}
.upd-text p{font-size:.8rem;opacity:.6;line-height:1.5;}
.loading-dots{display:flex;align-items:center;justify-content:center;gap:.4rem;padding:1.5rem;}
.dot{width:8px;height:8px;border-radius:50%;background:#ff6900;animation:bounce .8s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:.15s;}
.dot:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,100%{transform:scale(1);opacity:.5;}50%{transform:scale(1.5);opacity:1;}}
.error-msg{padding:1.2rem;border-radius:18px;background:rgba(255,50,50,.08);border:1px solid rgba(255,50,50,.2);color:#ff6b6b;font-size:.9rem;text-align:center;}
.admin-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(20px);z-index:9998;display:none;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.admin-panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(1100px,96%);max-height:90vh;overflow-y:auto;padding:1.8rem;border-radius:36px;background:linear-gradient(135deg,rgba(12,12,22,.97),rgba(4,4,10,.97));border:1px solid rgba(255,255,255,.1);box-shadow:0 40px 100px rgba(0,0,0,.7);z-index:9999;display:none;animation:panelIn .4s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes panelIn{from{transform:translate(-50%,-40%);opacity:0;}to{transform:translate(-50%,-50%);opacity:1;}}
.admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid rgba(255,255,255,.08);}
.admin-header h2{font-size:1.3rem;font-weight:800;}
.close-btn{width:44px;height:44px;border:none;border-radius:50%;background:rgba(255,60,60,.2);border:1px solid rgba(255,60,60,.3);color:#ff3b30;font-size:1rem;cursor:pointer;transition:.25s;}
.close-btn:hover{background:#ff3b30;color:white;transform:scale(1.1);}
.admin-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1rem;}
.admin-card{padding:1.2rem;border-radius:24px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);}
.admin-card h3{font-size:1rem;font-weight:700;margin-bottom:1rem;color:#ffa060;}
.a-input{width:100%;padding:.9rem 1rem;border:none;outline:none;border-radius:16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);color:white;font-family:'Tajawal',sans-serif;font-size:.9rem;margin-bottom:.8rem;transition:.2s;}
.a-input:focus{border-color:rgba(255,105,0,.4);}
.a-input option{background:#111;}
.a-btn{width:100%;padding:.95rem;border:none;border-radius:16px;background:linear-gradient(135deg,#ff6900,#ff3300);color:white;font-family:'Tajawal',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;transition:.2s;box-shadow:0 4px 16px rgba(255,105,0,.3);}
.a-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,105,0,.4);}
.a-list{margin-top:1rem;display:flex;flex-direction:column;gap:.6rem;}
.a-item{padding:.9rem;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;align-items:center;gap:.7rem;font-size:.88rem;}
.del-btn{padding:.5rem .9rem;border:none;border-radius:12px;background:rgba(255,60,60,.15);border:1px solid rgba(255,60,60,.25);color:#ff6b6b;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:.8rem;transition:.2s;flex-shrink:0;}
.del-btn:hover{background:#ff3b30;color:white;}
#toasts{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:999999;display:flex;flex-direction:column;align-items:center;gap:.5rem;}
.toast{padding:.9rem 1.4rem;border-radius:24px;font-size:.9rem;font-weight:500;background:rgba(255,255,255,.12);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.18);box-shadow:0 8px 32px rgba(0,0,0,.4);animation:toastIn .35s cubic-bezier(.34,1.56,.64,1) both;white-space:nowrap;}
@keyframes toastIn{from{transform:translateY(20px) scale(.9);opacity:0;}to{transform:none;opacity:1;}}
.toast.out{animation:toastOut .25s ease forwards;}
@keyframes toastOut{to{transform:translateY(10px) scale(.9);opacity:0;}}
@media(max-width:650px){.hero h1{font-size:2.1rem;}.hero{padding:2rem 1rem;}.bot-input-row{flex-direction:column;}.code-item{flex-direction:column;align-items:flex-start;}.copy-btn{width:100%;}}
</style>
</head>
<body>
<div class="bg-wrap">
  <div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>
</div>
<div class="grid-bg"></div>
<div id="ptc"></div>

<div class="wrap">
  <div class="topbar glass">
    <div class="logo-text"><i class="fa-solid fa-circle-bolt"></i> Xiaomi World</div>
    <div class="topbar-right">
      <span class="fps" id="fps">0 FPS</span>
      <button class="ctrl-btn" id="themeBtn" title="ثيم"><i class="fa-solid fa-moon"></i></button>
      <button class="ctrl-btn" id="adminBtn" title="لوحة التحكم"><i class="fa-solid fa-user-shield"></i></button>
    </div>
  </div>

  <section class="hero glass">
    <div class="hero-shine"></div>
    <img class="xiaomi-logo" src="https://upload.wikimedia.org/wikipedia/commons/a/ae/Xiaomi_logo_%282021-%29.svg" alt="Xiaomi">
    <h1>Xiaomi World Ultra</h1>
    <p class="hero-sub">ثيمات · أكواد بريفينت · تحسين الأداء · آخر التحديثات</p>
    <div class="hero-badges">
      <span class="badge">🔥 ثيمات حصرية</span>
      <span class="badge">⚡ أكواد بريفينت</span>
      <span class="badge">🤖 بوت التحديثات</span>
    </div>
  </section>

  <section class="section glass-deep" style="animation-delay:.1s">
    <div class="sec-title">
      <div class="sec-icon"><i class="fa-solid fa-link"></i></div>
      الروابط المميزة
    </div>
    <div class="links-grid" id="linksGrid"></div>
  </section>

  <section class="bot-section glass-deep">
    <div class="bot-header">
      <div class="bot-avatar">🤖</div>
      <div>
        <div class="bot-title">بوت التحديثات الذكي</div>
        <div class="bot-sub">اكتب اسم هاتفك واعرف آخر تحديث MIUI / HyperOS</div>
      </div>
    </div>
    <div class="bot-input-row">
      <input class="bot-input" id="phoneInput" placeholder="مثال: Redmi Note 13 أو Xiaomi 14 Pro..." autocomplete="off">
      <button class="bot-btn" id="searchBtn"><i class="fa-solid fa-magnifying-glass"></i> بحث</button>
    </div>
    <div id="botResult"></div>
  </section>

  <section class="section glass-deep" style="animation-delay:.2s">
    <div class="codes-toggle" id="codesToggle">
      <div class="sec-title" style="margin-bottom:0">
        <div class="sec-icon"><i class="fa-solid fa-bolt"></i></div>
        أكواد بريفينت
      </div>
      <div class="chevron" id="chevron"><i class="fa-solid fa-chevron-down"></i></div>
    </div>
    <div class="codes-body" id="codesBody">
      <input type="text" class="search-input" id="codeSearch" placeholder="ابحث عن كود...">
      <div id="codesContainer"></div>
    </div>
  </section>
</div>

<div id="toasts"></div>
<div class="admin-overlay" id="adminOverlay"></div>
<div class="admin-panel" id="adminPanel">
  <div class="admin-header">
    <h2><i class="fa-solid fa-screwdriver-wrench"></i> لوحة تحكم المشرف</h2>
    <button class="close-btn" id="closeAdmin">✕</button>
  </div>
  <div class="admin-grid">
    <div class="admin-card">
      <h3>إضافة رابط</h3>
      <input type="text" class="a-input" id="lName" placeholder="اسم الرابط">
      <input type="text" class="a-input" id="lUrl" placeholder="الرابط">
      <select class="a-input" id="lIcon">
        <option value="telegram">Telegram</option>
        <option value="whatsapp">WhatsApp</option>
        <option value="wallpaper">Wallpaper</option>
        <option value="youtube">YouTube</option>
        <option value="global">Global</option>
      </select>
      <button class="a-btn" id="addLinkBtn">إضافة الرابط</button>
      <div class="a-list" id="aLinks"></div>
    </div>
    <div class="admin-card">
      <h3>إضافة كود</h3>
      <input type="text" class="a-input" id="cVal" placeholder="الكود">
      <input type="text" class="a-input" id="cDesc" placeholder="الوصف">
      <button class="a-btn" id="addCodeBtn">إضافة الكود</button>
      <div class="a-list" id="aCodes"></div>
    </div>
  </div>
</div>

<script>
/* PARTICLES */
const ptcWrap=document.getElementById('ptc');
for(let i=0;i<25;i++){const p=document.createElement('div');p.className='pt';const s=Math.random()*4+2;p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${Math.random()*10+6}s;animation-delay:${Math.random()*8}s;`;ptcWrap.appendChild(p);}

/* FPS */
let fc=0;(function tick(){fc++;requestAnimationFrame(tick);})();
setInterval(()=>{document.getElementById('fps').textContent=fc+' FPS';fc=0;},1000);

/* TOAST */
function toast(msg,icon='✅'){const t=document.createElement('div');t.className='toast';t.textContent=icon+' '+msg;document.getElementById('toasts').appendChild(t);setTimeout(()=>{t.classList.add('out');setTimeout(()=>t.remove(),300);},2800);}

/* DEFAULTS */
const DEF_LINKS=[
  {name:'القناة الرئيسية',url:'https://t.me/redmi3321',icon:'telegram'},
  {name:'جروب الدردشة',url:'https://t.me/themes345',icon:'telegram'},
  {name:'قناة الواتس',url:'https://whatsapp.com/channel/0029VbC2xVaD8SE4mfwh1H2H',icon:'whatsapp'},
  {name:'خلفيات 4K',url:'https://t.me/themesXiaomia',icon:'wallpaper'},
];
const DEF_CODES=[
  {code:'*#*#4636#*#*',desc:'معلومات الهاتف والبطارية'},
  {code:'*#*#64663#*#*',desc:'اختبار الهاردوير الشامل'},
  {code:'*#*#76937#*#*',desc:'وضع الأداء العالي'},
  {code:'*#06#',desc:'عرض IMEI الهاتف'},
  {code:'*#*#2886#*#*',desc:'قائمة الصيانة Xiaomi'},
];
let links=JSON.parse(localStorage.getItem('xLinks')||'null')||DEF_LINKS;
let codes=JSON.parse(localStorage.getItem('xCodes')||'null')||DEF_CODES;
function saveLinks(){localStorage.setItem('xLinks',JSON.stringify(links));}
function saveCodes(){localStorage.setItem('xCodes',JSON.stringify(codes));}

const ICONS={telegram:'fa-brands fa-telegram',whatsapp:'fa-brands fa-whatsapp',wallpaper:'fa-solid fa-image',youtube:'fa-brands fa-youtube',global:'fa-solid fa-globe'};

function renderLinks(){
  const g=document.getElementById('linksGrid');
  g.innerHTML=links.map((l,i)=>`<a class="link-card" href="${l.url}" target="_blank" style="animation:fadeUp .5s ease ${i*.07}s both"><div class="l-icon ${l.icon}"><i class="${ICONS[l.icon]||'fa-solid fa-link'}"></i></div><div class="l-text"><h3>${l.name}</h3><p>${l.url}</p></div><div class="l-arrow"><i class="fa-solid fa-arrow-left"></i></div></a>`).join('');
}
renderLinks();

function renderCodes(filter=''){
  const c=document.getElementById('codesContainer');
  const filtered=codes.filter(x=>x.code.includes(filter)||x.desc.includes(filter));
  c.innerHTML=filtered.length?filtered.map(x=>`<div class="code-item"><div><div class="code-val">${x.code}</div><div class="code-desc">${x.desc}</div></div><button class="copy-btn" onclick="copyCode('${x.code}')"><i class="fa-solid fa-copy"></i> نسخ</button></div>`).join(''):'<p style="opacity:.4;text-align:center;padding:1rem">لا نتائج</p>';
}
renderCodes();

function copyCode(c){navigator.clipboard.writeText(c).catch(()=>{});toast('تم نسخ الكود','📋');}

const cToggle=document.getElementById('codesToggle');
const cBody=document.getElementById('codesBody');
const chevron=document.getElementById('chevron');
cToggle.onclick=()=>{cBody.classList.toggle('open');chevron.classList.toggle('open');};
document.getElementById('codeSearch').addEventListener('input',e=>renderCodes(e.target.value));

document.getElementById('themeBtn').onclick=()=>{document.body.classList.toggle('light');toast('تم تغيير الثيم','🎨');};

/* ── AI BOT - FIXED ── */
const phoneInput=document.getElementById('phoneInput');
const searchBtn=document.getElementById('searchBtn');
const botResult=document.getElementById('botResult');

function showLoading(){botResult.innerHTML=`<div class="bot-result glass"><div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;}
function showError(msg){botResult.innerHTML=`<div class="bot-result"><div class="error-msg"><i class="fa-solid fa-circle-exclamation"></i> ${msg}</div></div>`;}

async function searchPhoneUpdate(){
  const phone=phoneInput.value.trim();
  if(!phone){toast('اكتب اسم الهاتف أولاً','⚠️');return;}
  searchBtn.disabled=true;
  showLoading();

  const systemPrompt=`أنت بوت متخصص في هواتف Xiaomi / MIUI / HyperOS. عندما يسأل المستخدم عن هاتف معين:
1. اذكر آخر إصدار MIUI أو HyperOS المتوفر له بناءً على معرفتك
2. اذكر الأندرويد الأساسي المتوقع
3. اذكر أبرز المميزات في التحديث
4. اذكر حالة الدعم (مستمر / انتهى)
5. اذكر تقريب موعد التحديث القادم إن كان معروفاً

أجب بـ JSON فقط بالصيغة التالية بدون أي كلام آخر أو backticks:
{"phone":"اسم الهاتف الصحيح","latest_version":"رقم الإصدار","android_version":"رقم الأندرويد","release_date":"تاريخ تقريبي","status":"مستمر أو انتهى الدعم","next_update":"موعد أو توقع التحديث القادم","features":["ميزة 1","ميزة 2","ميزة 3"],"note":"ملاحظة مهمة للمستخدم"}`;

  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:systemPrompt,
        messages:[{role:'user',content:`هاتف: ${phone}`}]
      })
    });

    if(!resp.ok){
      const errData=await resp.json().catch(()=>({}));
      throw new Error(errData.error?.message||`HTTP ${resp.status}`);
    }

    const data=await resp.json();
    if(!data.content||!data.content.length){throw new Error('لا يوجد رد من الخادم');}

    const raw=data.content.map(x=>x.text||'').join('');
    const clean=raw.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();

    let parsed;
    try{parsed=JSON.parse(clean);}
    catch{
      // محاولة استخراج JSON من النص
      const match=clean.match(/\{[\s\S]*\}/);
      if(match){parsed=JSON.parse(match[0]);}
      else{throw new Error('تعذّر تحليل الرد');}
    }

    const statusColor=parsed.status&&parsed.status.includes('مستمر')?'green':'orange';
    const featuresHtml=(parsed.features||[]).map(f=>`
      <div class="update-item">
        <div class="upd-icon blue"><i class="fa-solid fa-check"></i></div>
        <div class="upd-text"><p>${f}</p></div>
      </div>`).join('');

    botResult.innerHTML=`
      <div class="bot-result">
        <div class="result-header">
          <i class="fa-solid fa-mobile-screen" style="font-size:1.3rem;color:#ff9060"></i>
          <div>
            <div class="result-phone-name">${parsed.phone||phone}</div>
            <div style="font-size:.8rem;opacity:.6;margin-top:.1rem">${parsed.android_version?'Android '+parsed.android_version:''}</div>
          </div>
          <div class="result-chip">${parsed.status||''}</div>
        </div>
        <div class="result-body">
          <div class="update-item">
            <div class="upd-icon ${statusColor}"><i class="fa-solid fa-download"></i></div>
            <div class="upd-text">
              <h4>آخر إصدار: ${parsed.latest_version||'غير محدد'}</h4>
              <p>صدر تقريباً: ${parsed.release_date||'غير معروف'}</p>
            </div>
          </div>
          <div class="update-item">
            <div class="upd-icon purple"><i class="fa-solid fa-calendar-days"></i></div>
            <div class="upd-text">
              <h4>التحديث القادم</h4>
              <p>${parsed.next_update||'لا توجد معلومات متاحة'}</p>
            </div>
          </div>
          ${featuresHtml}
          ${parsed.note?`<div class="update-item"><div class="upd-icon orange"><i class="fa-solid fa-circle-info"></i></div><div class="upd-text"><h4>ملاحظة</h4><p>${parsed.note}</p></div></div>`:''}
        </div>
      </div>`;
    toast('تم جلب معلومات التحديث','🤖');
  }catch(e){
    console.error('Bot error:',e);
    let errMsg='حدث خطأ أثناء البحث.';
    if(e.message&&e.message.includes('401')){errMsg='خطأ في المصادقة - تأكد من إعداد الموقع بشكل صحيح.';}
    else if(e.message&&e.message.includes('429')){errMsg='تجاوزت الحد المسموح - انتظر قليلاً وحاول مجدداً.';}
    else if(e.message&&(e.message.includes('fetch')||e.message.includes('network')||e.message.toLowerCase().includes('failed'))){errMsg='تعذر الاتصال بالخادم - تأكد من اتصال الإنترنت.';}
    else if(e.message){errMsg=e.message;}
    showError(errMsg);
  }finally{
    searchBtn.disabled=false;
  }
}

searchBtn.onclick=searchPhoneUpdate;
phoneInput.addEventListener('keydown',e=>{if(e.key==='Enter')searchPhoneUpdate();});

/* ADMIN */
document.getElementById('adminBtn').onclick=()=>{
  const p=prompt('كلمة المرور:');
  if(p!=='2010'){toast('كلمة المرور خاطئة','❌');return;}
  document.getElementById('adminOverlay').style.display='block';
  document.getElementById('adminPanel').style.display='block';
  renderAdmin();
};
function closeAdmin(){document.getElementById('adminOverlay').style.display='none';document.getElementById('adminPanel').style.display='none';}
document.getElementById('closeAdmin').onclick=closeAdmin;
document.getElementById('adminOverlay').onclick=closeAdmin;

function renderAdmin(){
  document.getElementById('aLinks').innerHTML=links.map((l,i)=>`<div class="a-item"><span>${l.name}</span><button class="del-btn" onclick="delLink(${i})">حذف</button></div>`).join('');
  document.getElementById('aCodes').innerHTML=codes.map((c,i)=>`<div class="a-item"><span>${c.code}</span><button class="del-btn" onclick="delCode(${i})">حذف</button></div>`).join('');
}

document.getElementById('addLinkBtn').onclick=()=>{
  const n=document.getElementById('lName').value;const u=document.getElementById('lUrl').value;const ic=document.getElementById('lIcon').value;
  if(!n||!u){toast('أكمل البيانات','⚠️');return;}
  links.push({name:n,url:u,icon:ic});saveLinks();renderLinks();renderAdmin();toast('تم إضافة الرابط','✅');
};
document.getElementById('addCodeBtn').onclick=()=>{
  const v=document.getElementById('cVal').value;const d=document.getElementById('cDesc').value;
  if(!v||!d){toast('أكمل البيانات','⚠️');return;}
  codes.push({code:v,desc:d});saveCodes();renderCodes();renderAdmin();toast('تم إضافة الكود','✅');
};
function delLink(i){links.splice(i,1);saveLinks();renderLinks();renderAdmin();toast('تم الحذف','🗑️');}
function delCode(i){codes.splice(i,1);saveCodes();renderCodes();renderAdmin();toast('تم الحذف','🗑️');}
</script>
</body>
</html>
