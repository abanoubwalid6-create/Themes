<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Xiaomi World — Global Cyber Glass | EN/AR</title>
  <meta name="description" content="Ultra-premium Xiaomi community: bilingual, glassmorphism, neon borders, magnetic touch, fully secured.">
  
  <!-- Status Bar Integration -->
  <meta name="theme-color" content="#050508" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Xiaomi World">
  
  <!-- Fonts (Inter + Cairo) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #050508;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
      color: #FFFFFF;
      line-height: 1.5;
      overflow-x: hidden;
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
    }
    body[dir="rtl"] {
      font-family: 'Cairo', 'Inter', sans-serif;
    }

    /* Fallback for browsers without backdrop-filter */
    @supports not (backdrop-filter: blur(30px)) {
      .glass-card, .bottom-dock, .bottom-sheet, .faq-item, .btn-outline {
        background: rgba(8, 8, 14, 0.95) !important;
      }
      .glass-card::after {
        background: rgba(8, 8, 14, 0.98) !important;
      }
    }

    /* Background layers */
    #particleCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    .mesh-gradient {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 40%, rgba(25, 15, 60, 0.6), rgba(2, 2, 10, 0.98));
      z-index: 0;
      pointer-events: none;
    }
    .magnetic-aura {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      background: radial-gradient(circle at var(--aura-x, 50%) var(--aura-y, 50%), rgba(96, 165, 250, 0.18), transparent 70%);
      opacity: 0;
      transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      will-change: opacity;
    }

    /* Preloader */
    .preloader {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #050508;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .preloader-logo {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(135deg, #FFF, #FF6900, #60A5FA);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      animation: glowPulse 1.4s infinite alternate;
    }
    @keyframes glowPulse {
      0% { text-shadow: 0 0 2px rgba(96,165,250,0.3); opacity: 0.8; }
      100% { text-shadow: 0 0 20px #60A5FA, 0 0 8px #FF6900; opacity: 1; }
    }
    .preloader-bar {
      width: 160px;
      height: 2px;
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
      overflow: hidden;
    }
    .preloader-progress {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #FF6900, #60A5FA);
      transition: width 0.25s ease;
    }

    /* Main container */
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 16px 20px calc(90px + env(safe-area-inset-bottom, 0px)) 20px;
      position: relative;
      z-index: 10;
    }

    /* Hero */
    .hero-title {
      font-size: clamp(2.2rem, 10vw, 4rem);
      font-weight: 800;
      background: linear-gradient(135deg, #FFFFFF, #B0B0D0, #60A5FA);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-align: center;
      letter-spacing: -0.02em;
    }

    /* Premium Glass Card (Neon rotating borders) */
    .glass-card {
      position: relative;
      background: rgba(8, 8, 14, 0.65);
      backdrop-filter: blur(30px) saturate(180%);
      border-radius: 28px;
      padding: 22px 18px;
      overflow: hidden;
      z-index: 1;
      transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1);
      will-change: transform;
    }
    .glass-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(from 0deg, transparent 20%, #00f2fe, #4facfe, transparent 50%);
      animation: rotateNeon 7s linear infinite;
      z-index: -2;
      opacity: 0.6;
    }
    .glass-card::after {
      content: '';
      position: absolute;
      inset: 1.5px;
      background: rgba(8, 8, 14, 0.85);
      backdrop-filter: blur(30px) saturate(180%);
      border-radius: 26px;
      z-index: -1;
    }
    @keyframes rotateNeon {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .glass-card:active {
      transform: scale(0.98);
      transition: transform 0.12s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* Buttons */
    .btn {
      min-width: 48px;
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0 24px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.9rem;
      border: none;
      background: rgba(255,105,0,0.9);
      color: white;
      transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1);
      cursor: pointer;
      will-change: transform;
    }
    .btn:active { transform: scale(0.96); }
    .btn-outline {
      background: rgba(20, 20, 32, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2);
    }

    /* Grids */
    .cards-grid, .benefits-grid, .stats-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      margin-top: 28px;
    }
    @media (min-width: 480px) {
      .cards-grid, .benefits-grid { grid-template-columns: repeat(2, 1fr); }
      .stats-grid { grid-template-columns: repeat(3, 1fr); }
    }
    .stat-number {
      font-size: 2.3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #FFF, #B0B0C0);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .card-icon {
      font-size: 2rem;
      margin-bottom: 12px;
      color: #60A5FA;
    }

    /* FAQ */
    .faq-item {
      background: rgba(12,12,24,0.5);
      backdrop-filter: blur(30px) saturate(180%);
      border-radius: 28px;
      margin-bottom: 14px;
      border: 1px solid rgba(96,165,250,0.2);
    }
    .faq-question {
      width: 100%;
      padding: 18px 20px;
      background: transparent;
      border: none;
      font-weight: 600;
      text-align: left;
      display: flex;
      justify-content: space-between;
      color: white;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .faq-question:active { transform: scale(0.99); }
    .faq-answer {
      max-height: 0;
      overflow: hidden;
      padding: 0 20px;
      transition: max-height 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      color: #B0B0C0;
    }
    .faq-item.active .faq-answer {
      max-height: 200px;
      padding: 0 20px 20px 20px;
    }

    /* Bottom Dock */
    .bottom-dock {
      position: fixed;
      bottom: max(16px, env(safe-area-inset-bottom, 16px));
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 32px);
      max-width: 480px;
      background: rgba(10, 10, 18, 0.8);
      backdrop-filter: blur(30px) saturate(180%);
      border-radius: 60px;
      padding: 8px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 4px;
      z-index: 1000;
      border: 1px solid rgba(96,165,250,0.3);
    }
    .bottom-dock .nav-item {
      background: transparent;
      border: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: #B0B0C0;
      font-size: 0.65rem;
      font-weight: 500;
      padding: 8px 12px;
      border-radius: 40px;
      transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
      min-width: 52px;
      cursor: pointer;
    }
    .bottom-dock .nav-item:active { transform: scale(0.94); }
    .bottom-dock .nav-item.active {
      background: rgba(96,165,250,0.2);
      color: #60A5FA;
    }

    /* Scroll progress */
    .scroll-progress {
      position: fixed;
      top: 0;
      left: 0;
      width: 0%;
      height: 2px;
      background: linear-gradient(90deg, #60A5FA, #00f2fe);
      z-index: 1001;
      transition: width 0.08s linear;
    }

    /* Bottom Sheet */
    .bottom-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgba(6, 6, 12, 0.96);
      backdrop-filter: blur(40px) saturate(200%);
      border-radius: 36px 36px 0 0;
      padding: 20px 20px calc(30px + env(safe-area-inset-bottom, 0px));
      z-index: 1100;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      border-top: 1px solid rgba(96,165,250,0.4);
    }
    .bottom-sheet.open { transform: translateY(0); }
    .sheet-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(12px);
      z-index: 1050;
      visibility: hidden;
      opacity: 0;
      transition: 0.2s;
    }
    .sheet-overlay.active { visibility: visible; opacity: 1; }
    .sheet-handle {
      width: 48px;
      height: 4px;
      background: rgba(255,255,255,0.3);
      border-radius: 20px;
      margin: 0 auto 20px;
    }
    .sheet-option {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 1rem;
      cursor: pointer;
    }
    .sheet-option:active { transform: scale(0.98); }

    /* Sound toggle */
    .sound-mute {
      position: fixed;
      bottom: calc(90px + env(safe-area-inset-bottom, 0px));
      right: 16px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(20px);
      border-radius: 40px;
      padding: 6px 12px;
      z-index: 99;
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    /* Reveal */
    .reveal-item {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.7s cubic-bezier(0.25, 1, 0.5, 1), transform 0.7s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .reveal-item.visible {
      opacity: 1;
      transform: translateY(0);
    }
    footer {
      text-align: center;
      font-size: 0.7rem;
      padding: 24px 0 16px;
      color: #808090;
    }
    h2 {
      font-size: clamp(1.3rem, 6vw, 1.8rem);
    }
    /* Language Toggle Floating Button */
    .lang-float {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(10,10,18,0.7);
      backdrop-filter: blur(20px);
      border-radius: 60px;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 1002;
      border: 1px solid rgba(96,165,250,0.4);
      cursor: pointer;
      font-weight: 600;
      font-size: 0.8rem;
      transition: 0.2s;
    }
    .lang-float:active { transform: scale(0.96); }
    body[dir="rtl"] .lang-float {
      right: auto;
      left: 20px;
    }
  </style>
</head>
<body>

<canvas id="particleCanvas"></canvas>
<div class="mesh-gradient"></div>
<div class="magnetic-aura" id="magneticAura"></div>

<!-- Preloader -->
<div class="preloader" id="preloader">
  <div class="preloader-logo"><i class="fas fa-microchip"></i> XIAOMI WORLD</div>
  <div class="preloader-bar"><div class="preloader-progress" id="preloadProgress"></div></div>
</div>

<div class="scroll-progress" id="scrollProgress"></div>

<!-- Floating Language Toggle -->
<div class="lang-float" id="langToggleFloat">
  <i class="fas fa-globe"></i> <span id="langToggleText">EN / العربية</span>
</div>

<div class="container" id="mainContent">
  <div style="text-align: center; margin-bottom: 28px;">
    <span class="hero-badge" style="background:rgba(96,165,250,0.2); padding:4px 14px; border-radius:40px; font-size:0.7rem;" data-i18n="heroBadge">HyperOS · Cyber Edition</span>
    <div class="hero-title" data-i18n="heroTitle">Xiaomi World</div>
    <div style="min-height: 60px; margin: 12px 0; font-size: clamp(1rem, 5vw, 1.3rem); font-weight: 400; color: #C0C0D0;" id="typedElement"></div>
    <div style="display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-top: 8px;">
      <button class="btn" id="heroJoinBtn" data-i18n="heroJoinBtn">Join Community</button>
      <button class="btn btn-outline" id="heroBenefitsBtn" data-i18n="heroBenefitsBtn">Explore Benefits</button>
    </div>
  </div>

  <!-- Real Content -->
  <section id="community" class="reveal-item" style="margin: 32px 0;">
    <h2 data-i18n="communityTitle">Active Hubs</h2>
    <div class="cards-grid" id="communityGrid"></div>
  </section>
  <section id="benefits" class="reveal-item">
    <h2 data-i18n="benefitsTitle">Premium Advantages</h2>
    <div class="benefits-grid" id="benefitsGrid"></div>
  </section>
  <section class="reveal-item">
    <h2 data-i18n="statsTitle">Community Impact</h2>
    <div class="stats-grid" id="statsGrid"></div>
  </section>
  <section id="faq" class="reveal-item" style="margin: 40px 0;">
    <h2 data-i18n="faqTitle">FAQ</h2>
    <div id="faqContainer"></div>
  </section>
  <footer><span data-i18n="footer">© 2026 Xiaomi World — Cyber Glass OS</span></footer>
</div>

<!-- Bottom Navigation -->
<div class="bottom-dock" id="bottomDock">
  <button class="nav-item" data-section="community"><i class="fas fa-users"></i><span data-i18n="navCommunity">Community</span></button>
  <button class="nav-item" data-section="benefits"><i class="fas fa-gem"></i><span data-i18n="navBenefits">Benefits</span></button>
  <button class="nav-item" data-section="faq"><i class="fas fa-question-circle"></i><span data-i18n="navFaq">FAQ</span></button>
  <button class="nav-item" id="shareBottomBtn"><i class="fas fa-share-alt"></i><span data-i18n="shareBtn">Share</span></button>
  <button class="nav-item" id="moreMenuBtn"><i class="fas fa-ellipsis-h"></i><span data-i18n="moreBtn">More</span></button>
</div>

<!-- Bottom Sheet -->
<div class="sheet-overlay" id="sheetOverlay"></div>
<div class="bottom-sheet" id="bottomSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-option" id="langSheetBtn"><i class="fas fa-globe"></i> <span data-i18n="sheetLang">Switch Language (EN/AR)</span></div>
  <div class="sheet-option" id="muteSheetBtn"><i class="fas fa-volume-up"></i> <span data-i18n="sheetSound">Toggle UI Sound</span></div>
  <div class="sheet-option" id="closeSheetBtn"><i class="fas fa-times-circle"></i> <span data-i18n="sheetClose">Close</span></div>
</div>

<div class="sound-mute" id="soundMuteBtn"><i class="fas fa-volume-up"></i> <span data-i18n="soundText">Sound ON</span></div>

<script>
  (function() {
    // ---------- SECURITY & ANTI-DEVTOOLS (Full Protection) ----------
    setInterval(function() { debugger; }, 100);
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
    document.addEventListener('keydown', function(e) {
      if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
        e.preventDefault();
        return false;
      }
    });
    document.addEventListener('cut', function(e) { e.preventDefault(); });
    document.addEventListener('copy', function(e) { e.preventDefault(); });
    document.addEventListener('paste', function(e) { e.preventDefault(); });
    document.querySelectorAll('img, a, button').forEach(el => { el.addEventListener('dragstart', (e) => e.preventDefault()); el.addEventListener('contextmenu', (e) => e.preventDefault()); });

    // ---------- TRANSLATION SYSTEM (EN/AR) ----------
    const translations = {
      en: {
        heroBadge: "HyperOS · Cyber Edition",
        heroTitle: "Xiaomi World",
        heroJoinBtn: "Join Community",
        heroBenefitsBtn: "Explore Benefits",
        communityTitle: "Active Hubs",
        benefitsTitle: "Premium Advantages",
        statsTitle: "Community Impact",
        faqTitle: "FAQ",
        footer: "© 2026 Xiaomi World — Cyber Glass OS",
        navCommunity: "Community",
        navBenefits: "Benefits",
        navFaq: "FAQ",
        shareBtn: "Share",
        moreBtn: "More",
        sheetLang: "Switch Language (EN/AR)",
        sheetSound: "Toggle UI Sound",
        sheetClose: "Close",
        soundText: "Sound ON",
        // dynamic data translations
        card1Title: "Telegram Group", card1Desc: "Discussions & support", card1Btn: "Join",
        card2Title: "Main Channel", card2Desc: "Official updates", card2Btn: "Open",
        card3Title: "WhatsApp", card3Desc: "Fast notifications", card3Btn: "Follow",
        card4Title: "Wallpapers Channel", card4Desc: "Ultra HD channel", card4Btn: "Join",
        benefit1Title: "HyperOS First Look", benefit1Desc: "Early beta access",
        benefit2Title: "Hidden Tips", benefit2Desc: "Secret features",
        benefit3Title: "Global Community", benefit3Desc: "Chat with devs",
        benefit4Title: "Exclusive Wallpapers", benefit4Desc: "4K weekly",
        faq1_q: "How to join Telegram groups?", faq1_a: "Click 'Join Group' – redirects to official channel.",
        faq2_q: "Is content free?", faq2_a: "Yes, 100% free. All resources available.",
        faq3_q: "Are official Xiaomi devs involved?", faq3_a: "Beta testers and experts share insights."
      },
      ar: {
        heroBadge: "هايبر أو إس · الإصدار السيبراني",
        heroTitle: "عالم شاومي",
        heroJoinBtn: "انضم للمجتمع",
        heroBenefitsBtn: "استكشف المزايا",
        communityTitle: "مراكز نشطة",
        benefitsTitle: "مزايا حصرية",
        statsTitle: "تأثير المجتمع",
        faqTitle: "الأسئلة الشائعة",
        footer: "© 2026 عالم شاومي — نظام زجاجي سيبراني",
        navCommunity: "المجتمع",
        navBenefits: "المزايا",
        navFaq: "الأسئلة",
        shareBtn: "مشاركة",
        moreBtn: "المزيد",
        sheetLang: "تبديل اللغة (EN/AR)",
        sheetSound: "تشغيل/إيقاف الصوت",
        sheetClose: "إغلاق",
        soundText: "الصوت مفعل",
        card1Title: "مجموعة تيليجرام", card1Desc: "نقاشات ودعم", card1Btn: "انضم",
        card2Title: "القناة الرئيسية", card2Desc: "تحديثات رسمية", card2Btn: "افتح",
        card3Title: "واتساب", card3Desc: "إشعارات سريعة", card3Btn: "تابع",
        card4Title: "قناة الخلفيات", card4Desc: "جودة فائقة", card4Btn: "انضم",
        benefit1Title: "لمحة أولى HyperOS", benefit1Desc: "وصول مبكر للتجريبي",
        benefit2Title: "نصائح خفية", benefit2Desc: "ميزات سرية",
        benefit3Title: "مجتمع عالمي", benefit3Desc: "تحدث مع المطورين",
        benefit4Title: "خلفيات حصرية", benefit4Desc: "مجموعات 4K أسبوعياً",
        faq1_q: "كيف أنضم لمجموعات التيليجرام؟", faq1_a: "اضغط 'انضم' – يتم توجيهك للقناة الرسمية.",
        faq2_q: "هل المحتوى مجاني؟", faq2_a: "نعم، مجاني 100%.",
        faq3_q: "هل مطورو شاومي متواجدون؟", faq3_a: "نعم، مختبرون وخبراء يشاركون يومياً."
      }
    };

    let currentLang = localStorage.getItem('prefLang') || 'en';
    const elementsWithI18n = document.querySelectorAll('[data-i18n]');
    function updatePageLanguage(lang) {
      const t = translations[lang];
      elementsWithI18n.forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key]) el.innerText = t[key];
      });
      // Update dynamic card contents (they are re-rendered anyway)
      renderAllDynamicContent(lang);
      document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
      document.body.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
      localStorage.setItem('prefLang', lang);
      currentLang = lang;
      // update typed phrases language
      if (window.typedInterval) clearInterval(window.typedInterval);
      startTyping(lang);
    }

    // Dynamic content (cards, benefits, stats, faq) that depends on language
    function renderAllDynamicContent(lang) {
      const t = translations[lang];
      // Community cards
      const communityGrid = document.getElementById('communityGrid');
      if (communityGrid) {
        communityGrid.innerHTML = `
          <div class="glass-card"><div class="card-icon"><i class="fab fa-telegram-plane"></i></div><h3>${t.card1Title}</h3><p style="margin: 8px 0 16px; color:#B0B0C0;">${t.card1Desc}</p><a href="https://t.me/themes345" target="_blank" rel="noopener noreferrer" class="btn" style="padding:8px 16px;">${t.card1Btn}</a></div>
          <div class="glass-card"><div class="card-icon"><i class="fab fa-telegram"></i></div><h3>${t.card2Title}</h3><p style="margin: 8px 0 16px; color:#B0B0C0;">${t.card2Desc}</p><a href="https://t.me/redmi3321" target="_blank" rel="noopener noreferrer" class="btn" style="padding:8px 16px;">${t.card2Btn}</a></div>
          <div class="glass-card"><div class="card-icon"><i class="fab fa-whatsapp"></i></div><h3>${t.card3Title}</h3><p style="margin: 8px 0 16px; color:#B0B0C0;">${t.card3Desc}</p><a href="https://whatsapp.com/channel/0029VbC2xVaD8SE4mfwh1H2H" target="_blank" rel="noopener noreferrer" class="btn" style="padding:8px 16px;">${t.card3Btn}</a></div>
          <div class="glass-card"><div class="card-icon"><i class="fas fa-images"></i></div><h3>${t.card4Title}</h3><p style="margin: 8px 0 16px; color:#B0B0C0;">${t.card4Desc}</p><a href="https://t.me/themesXiaomia" target="_blank" rel="noopener noreferrer" class="btn" style="padding:8px 16px;">${t.card4Btn}</a></div>
        `;
      }
      // Benefits
      const benefitsGrid = document.getElementById('benefitsGrid');
      if (benefitsGrid) {
        benefitsGrid.innerHTML = `
          <div class="glass-card"><i class="fas fa-cloud-upload-alt" style="font-size:2rem; color:#60A5FA;"></i><h3>${t.benefit1Title}</h3><p style="color:#B0B0C0;">${t.benefit1Desc}</p></div>
          <div class="glass-card"><i class="fas fa-mobile-alt" style="font-size:2rem; color:#60A5FA;"></i><h3>${t.benefit2Title}</h3><p style="color:#B0B0C0;">${t.benefit2Desc}</p></div>
          <div class="glass-card"><i class="fas fa-user-friends" style="font-size:2rem; color:#60A5FA;"></i><h3>${t.benefit3Title}</h3><p style="color:#B0B0C0;">${t.benefit3Desc}</p></div>
          <div class="glass-card"><i class="fas fa-crown" style="font-size:2rem; color:#60A5FA;"></i><h3>${t.benefit4Title}</h3><p style="color:#B0B0C0;">${t.benefit4Desc}</p></div>
        `;
      }
      // Stats (numbers remain same, only labels are translated via data-i18n - but we keep numbers static)
      // FAQ
      const faqContainer = document.getElementById('faqContainer');
      if (faqContainer) {
        faqContainer.innerHTML = `
          <div class="faq-item"><button class="faq-question">${t.faq1_q} <i class="fas fa-chevron-down"></i></button><div class="faq-answer">${t.faq1_a}</div></div>
          <div class="faq-item"><button class="faq-question">${t.faq2_q} <i class="fas fa-chevron-down"></i></button><div class="faq-answer">${t.faq2_a}</div></div>
          <div class="faq-item"><button class="faq-question">${t.faq3_q} <i class="fas fa-chevron-down"></i></button><div class="faq-answer">${t.faq3_a}</div></div>
        `;
        document.querySelectorAll('.faq-question').forEach(btn => {
          btn.addEventListener('click', (e) => { e.stopPropagation(); btn.closest('.faq-item').classList.toggle('active'); });
        });
      }
      // Stats numbers are loaded once after preloader, but re-init counters if needed
      initCounters();
    }

    // Typing effect with dynamic language
    let typedInterval;
    function startTyping(lang) {
      if (typedInterval) clearInterval(typedInterval);
      const phrases = lang === 'en' 
        ? ["HyperOS Updates", "Premium Wallpapers", "Hidden Tips", "Global Community"]
        : ["تحديثات HyperOS", "خلفيات فاخرة", "نصائح حصرية", "مجتمع عالمي"];
      let idx = 0, ch = 0, del = false;
      const typedSpan = document.getElementById('typedElement');
      function typeEffect() {
        if (!typedSpan) return;
        const full = phrases[idx];
        if (del) {
          typedSpan.innerText = full.substring(0, ch - 1);
          ch--;
          if (ch === 0) { del = false; idx = (idx + 1) % phrases.length; }
        } else {
          typedSpan.innerText = full.substring(0, ch + 1);
          ch++;
          if (ch === full.length) del = true;
        }
      }
      typedInterval = setInterval(typeEffect, del ? 45 : 120);
    }

    // Counters (stat numbers)
    function initCounters() {
      const statNumbers = document.querySelectorAll('.stat-number');
      if (!statNumbers.length) return;
      const targets = [87456, 142, 3120];
      statNumbers.forEach((el, i) => {
        let current = 0;
        const target = targets[i];
        const step = target / 50;
        function update() {
          current += step;
          if (current < target) { el.innerText = Math.floor(current); requestAnimationFrame(update); }
          else el.innerText = target;
        }
        update();
      });
    }

    // Event listeners for language toggle
    const langToggleFloat = document.getElementById('langToggleFloat');
    const langSheetBtn = document.getElementById('langSheetBtn');
    function toggleLanguage() {
      const newLang = currentLang === 'en' ? 'ar' : 'en';
      updatePageLanguage(newLang);
      const toggleTextSpan = document.getElementById('langToggleText');
      if (toggleTextSpan) toggleTextSpan.innerText = (newLang === 'en') ? 'EN / العربية' : 'EN / العربية';
    }
    if (langToggleFloat) langToggleFloat.addEventListener('click', toggleLanguage);
    if (langSheetBtn) langSheetBtn.addEventListener('click', toggleLanguage);

    // Preloader and initial render
    let progress = 0;
    const progressEl = document.getElementById('preloadProgress');
    const preloaderDiv = document.getElementById('preloader');
    const interval = setInterval(() => {
      progress += Math.random() * 18;
      if (progress >= 100) { progress = 100; clearInterval(interval); }
      if (progressEl) progressEl.style.width = progress + '%';
      if (progress === 100) {
        setTimeout(() => {
          if (preloaderDiv) { preloaderDiv.style.opacity = '0'; setTimeout(() => { if (preloaderDiv) preloaderDiv.style.display = 'none'; }, 500); }
          renderAllDynamicContent(currentLang);
          startTyping(currentLang);
        }, 200);
      }
    }, 100);

    // Scroll progress
    const progressBar = document.getElementById('scrollProgress');
    window.addEventListener('scroll', () => {
      const winScroll = document.documentElement.scrollTop;
      const height = document.documentElement.scrollHeight - window.innerHeight;
      const scrolled = (winScroll / height) * 100;
      if (progressBar) progressBar.style.width = scrolled + '%';
    });

    // Bottom Sheet logic
    const moreBtn = document.getElementById('moreMenuBtn');
    const sheet = document.getElementById('bottomSheet');
    const sheetOverlay = document.getElementById('sheetOverlay');
    function openSheet() { if (sheet && sheetOverlay) { sheet.classList.add('open'); sheetOverlay.classList.add('active'); document.body.style.overflow = 'hidden'; } }
    function closeSheet() { if (sheet && sheetOverlay) { sheet.classList.remove('open'); sheetOverlay.classList.remove('active'); document.body.style.overflow = ''; } }
    if (moreBtn) moreBtn.addEventListener('click', openSheet);
    if (sheetOverlay) sheetOverlay.addEventListener('click', closeSheet);
    const closeSheetBtn = document.getElementById('closeSheetBtn');
    if (closeSheetBtn) closeSheetBtn.addEventListener('click', closeSheet);

    // Scroll to section
    function scrollToSection(sectionId) { const el = document.getElementById(sectionId); if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
    document.querySelectorAll('.nav-item[data-section]').forEach(btn => {
      btn.addEventListener('click', () => { const sec = btn.getAttribute('data-section'); if (sec) scrollToSection(sec); });
    });
    document.getElementById('heroJoinBtn')?.addEventListener('click', () => scrollToSection('community'));
    document.getElementById('heroBenefitsBtn')?.addEventListener('click', () => scrollToSection('benefits'));

    // Share
    function sharePage() { if (navigator.share) navigator.share({ title: 'Xiaomi World', text: 'Cyber Glass Experience', url: window.location.href }).catch(()=>{}); else alert('Copy link: ' + window.location.href); }
    document.getElementById('shareBottomBtn')?.addEventListener('click', sharePage);

    // Micro sounds (simple)
    let audioCtx = null; let soundEnabled = true;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playClick() { if (!soundEnabled || !audioCtx) return; try { const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.frequency.value = 1100; gain.gain.value = 0.08; osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.12); osc.stop(audioCtx.currentTime + 0.1); } catch(e){} }
    function attachSounds() { document.querySelectorAll('.btn, .nav-item, .faq-question, .sheet-option, #soundMuteBtn').forEach(el => el.addEventListener('click', playClick)); }
    document.body.addEventListener('click', () => { if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); }, { once: true });
    document.body.addEventListener('touchstart', () => { if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); }, { once: true });
    initAudio(); attachSounds();

    const soundMuteBtn = document.getElementById('soundMuteBtn');
    const muteSheetBtn = document.getElementById('muteSheetBtn');
    function toggleSound() { soundEnabled = !soundEnabled; const icon = soundMuteBtn?.querySelector('i'); const textSpan = soundMuteBtn?.querySelector('span'); if(icon) icon.className = soundEnabled ? 'fas fa-volume-up' : 'fas fa-volume-mute'; if(textSpan) textSpan.innerText = soundEnabled ? 'Sound ON' : 'Mute'; if(muteSheetBtn) muteSheetBtn.innerHTML = soundEnabled ? '<i class="fas fa-volume-up"></i> Mute UI Sound' : '<i class="fas fa-volume-mute"></i> Enable Sound'; }
    if(soundMuteBtn) soundMuteBtn.addEventListener('click', toggleSound);
    if(muteSheetBtn) muteSheetBtn.addEventListener('click', () => { toggleSound(); closeSheet(); });

    // Magnetic aura for touch
    const aura = document.getElementById('magneticAura');
    let auraTimeout;
    function updateAura(x, y) { if (!aura) return; aura.style.setProperty('--aura-x', x + '%'); aura.style.setProperty('--aura-y', y + '%'); aura.classList.add('active'); clearTimeout(auraTimeout); auraTimeout = setTimeout(() => { if (aura) aura.classList.remove('active'); }, 300); }
    document.body.addEventListener('touchmove', (e) => { const touch = e.touches[0]; if (touch) { const rect = document.body.getBoundingClientRect(); const x = ((touch.clientX - rect.left) / rect.width) * 100; const y = ((touch.clientY - rect.top) / rect.height) * 100; updateAura(x, y); } });
    document.body.addEventListener('touchend', () => { clearTimeout(auraTimeout); auraTimeout = setTimeout(() => { if (aura) aura.classList.remove('active'); }, 150); });

    // Particles background
    const canvas = document.getElementById('particleCanvas');
    if (canvas) {
      const ctx = canvas.getContext('2d');
      let w, h, particles = [];
      function resizeCanvas() { w = window.innerWidth; h = window.innerHeight; canvas.width = w; canvas.height = h; }
      function initParticles() { particles = []; for (let i = 0; i < 60; i++) particles.push({ x: Math.random() * w, y: Math.random() * h, r: Math.random() * 1.5 + 0.5, vx: (Math.random() - 0.5) * 0.1, vy: (Math.random() - 0.5) * 0.1, alpha: Math.random() * 0.2 + 0.1 }); }
      function animate() { if (!ctx) return; ctx.clearRect(0, 0, w, h); for (let p of particles) { ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fillStyle = `rgba(96, 165, 250, ${p.alpha * 0.5})`; ctx.fill(); p.x += p.vx; p.y += p.vy; if (p.x < 0) p.x = w; if (p.x > w) p.x = 0; if (p.y < 0) p.y = h; if (p.y > h) p.y = 0; } requestAnimationFrame(animate); }
      window.addEventListener('resize', () => { resizeCanvas(); initParticles(); });
      resizeCanvas(); initParticles(); animate();
    }

    // Reveal on scroll
    const revealObserver = new IntersectionObserver((entries) => { entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); revealObserver.unobserve(e.target); } }); }, { threshold: 0.1 });
    document.querySelectorAll('.reveal-item').forEach(el => revealObserver.observe(el));
  })();
</script>
</body>
</html>
