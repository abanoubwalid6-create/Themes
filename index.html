<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>

<title>Xiaomi World Ultra</title>

<link
href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap"
rel="stylesheet"
/>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>

<style>

/* =========================
RESET
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html{
scroll-behavior:smooth;
}

body{
font-family:'Tajawal',sans-serif;
background:#050510;
color:white;
overflow-x:hidden;
min-height:100vh;
position:relative;
transition:.3s;
}

/* =========================
LIGHT THEME
========================= */

body.light{

background:#edf1ff;
color:#111;

}

body.light .glass{
background:
linear-gradient(
135deg,
rgba(255,255,255,.65),
rgba(255,255,255,.28)
);

border:1px solid rgba(255,255,255,.35);

color:#111;
}

body.light .subtitle,
body.light .link-text p{
color:#333;
}

body.light .search,
body.light .admin-input{
color:#111;
}

/* =========================
BACKGROUND
========================= */

.bg{
position:fixed;
inset:0;
z-index:-3;

background:

radial-gradient(
circle at top left,
rgba(255,105,0,.25),
transparent 30%
),

radial-gradient(
circle at bottom right,
rgba(255,105,0,.15),
transparent 30%
),

linear-gradient(
180deg,
#090914,
#020204
);
}

.grid{
position:fixed;
inset:0;
z-index:-2;

background-image:

linear-gradient(
rgba(255,255,255,.03) 1px,
transparent 1px
),

linear-gradient(
90deg,
rgba(255,255,255,.03) 1px,
transparent 1px
);

background-size:40px 40px;

mask-image:
radial-gradient(circle,black,transparent);
}

/* =========================
PARTICLES
========================= */

#particles{
position:fixed;
inset:0;
overflow:hidden;
z-index:-1;
pointer-events:none;
}

.particle{
position:absolute;
background:#ff6900;
border-radius:50%;
opacity:.14;
animation:float linear infinite;
will-change:transform;
}

@keyframes float{

from{
transform:translateY(100vh);
}

to{
transform:translateY(-10vh);
}

}

/* =========================
GLASS
========================= */

.glass{

background:
linear-gradient(
135deg,
rgba(255,255,255,.13),
rgba(255,255,255,.04)
);

backdrop-filter:
blur(22px)
saturate(180%);

-webkit-backdrop-filter:
blur(22px)
saturate(180%);

border:
1px solid rgba(255,255,255,.12);

box-shadow:
0 8px 32px rgba(0,0,0,.35),
inset 0 1px 1px rgba(255,255,255,.08);

}

/* =========================
CONTAINER
========================= */

.container{
width:min(1200px,94%);
margin:auto;
padding:1rem;
}

/* =========================
TOPBAR
========================= */

.topbar{
margin-top:1rem;
padding:1rem 1.2rem;
border-radius:30px;

display:flex;
justify-content:space-between;
align-items:center;

gap:1rem;
}

.controls{
display:flex;
gap:.7rem;
flex-wrap:wrap;
}

.ctrl-btn{

width:48px;
height:48px;

border:none;
border-radius:50%;

background:rgba(255,255,255,.08);

color:white;

font-size:1rem;

cursor:pointer;

transition:.25s;
}

.ctrl-btn:hover{
transform:translateY(-4px);
background:#ff6900;
}

.fps{
font-family:monospace;
color:#00ff88;
font-size:.95rem;
}

/* =========================
HERO
========================= */

.hero{
margin-top:1.5rem;
padding:3rem 2rem;
border-radius:40px;
text-align:center;
position:relative;
overflow:hidden;
}

.hero::before{

content:'';

position:absolute;

width:420px;
height:420px;

background:#ff690022;

filter:blur(100px);

top:-150px;
left:-150px;

border-radius:50%;
}

.logo{
width:110px;
position:relative;
z-index:2;
animation:pulse 3s infinite ease-in-out;
}

@keyframes pulse{

0%,100%{
transform:scale(1);
filter:drop-shadow(0 0 18px #ff6900);
}

50%{
transform:scale(1.08);
filter:drop-shadow(0 0 35px #ff6900);
}

}

.hero h1{

margin-top:1rem;

font-size:3rem;
font-weight:900;

background:
linear-gradient(to right,#fff,#ff6900);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
margin-top:.7rem;
opacity:.8;
font-size:1rem;
}

/* =========================
SECTION
========================= */

.section{
margin-top:1.5rem;
padding:1.5rem;
border-radius:35px;
}

.section-title{
display:flex;
align-items:center;
gap:.6rem;
font-size:1.2rem;
font-weight:900;
}

/* =========================
LINKS
========================= */

.links-grid{

margin-top:1.2rem;

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(270px,1fr));

gap:1rem;
}

.link-card{

padding:1.2rem;

border-radius:28px;

text-decoration:none;
color:white;

transition:.3s;

position:relative;
overflow:hidden;
}

.link-card:hover{

transform:translateY(-6px);

border-color:#ff6900;

box-shadow:
0 0 25px rgba(255,105,0,.25);
}

.link-card::before{

content:'';

position:absolute;

top:0;
left:-100%;

width:100%;
height:100%;

background:
linear-gradient(
90deg,
transparent,
rgba(255,255,255,.12),
transparent
);

transition:.6s;
}

.link-card:hover::before{
left:100%;
}

.link-content{
display:flex;
align-items:center;
gap:1rem;
}

.link-icon{

width:60px;
height:60px;

border-radius:20px;

display:flex;
justify-content:center;
align-items:center;

font-size:1.5rem;

flex-shrink:0;
}

.telegram{
background:#229ED9;
}

.whatsapp{
background:#25D366;
}

.wallpaper{
background:#9333ea;
}

.youtube{
background:#ff0000;
}

.global{
background:#ff6900;
}

.link-text{
overflow:hidden;
}

.link-text h3{
font-size:1rem;
margin-bottom:.3rem;
word-break:break-word;
}

.link-text p{
opacity:.7;
font-size:.8rem;
overflow:hidden;
text-overflow:ellipsis;
}

/* =========================
CODES
========================= */

.codes-header{
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
}

.codes-content{
max-height:0;
overflow:hidden;
transition:max-height .5s ease;
}

.codes-content.active{
max-height:4000px;
margin-top:1rem;
}

#arrowIcon{
transition:.3s;
}

#arrowIcon.rotate{
transform:rotate(180deg);
}

.search{

width:100%;

padding:1rem;

border:none;
outline:none;

border-radius:20px;

background:rgba(255,255,255,.06);

color:white;

margin-bottom:1rem;
}

.code-item{

padding:1rem;

border-radius:25px;

display:flex;
justify-content:space-between;
align-items:center;

gap:1rem;

margin-bottom:1rem;

transition:.25s;
}

.code-item:hover{

transform:translateY(-4px);

box-shadow:
0 0 20px rgba(255,105,0,.2);
}

.code-left{
overflow:hidden;
}

.code-left strong{
word-break:break-all;
}

.code-left p{
opacity:.7;
font-size:.82rem;
margin-top:.3rem;
}

.copy-btn{

padding:.9rem 1rem;

border:none;

border-radius:18px;

background:#ff6900;

color:white;

font-weight:bold;

cursor:pointer;

transition:.25s;

flex-shrink:0;
}

.copy-btn:hover{
transform:scale(1.06);
}

/* =========================
ADMIN
========================= */

.admin-overlay{

position:fixed;
inset:0;

background:rgba(0,0,0,.75);

backdrop-filter:blur(10px);

z-index:9998;

display:none;
}

.admin-panel{

position:fixed;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:min(1100px,96%);
height:90vh;

overflow-y:auto;

padding:1.5rem;

border-radius:35px;

background:
linear-gradient(
135deg,
rgba(15,15,25,.97),
rgba(5,5,12,.97)
);

border:1px solid rgba(255,255,255,.08);

box-shadow:
0 0 50px rgba(0,0,0,.6);

z-index:9999;

display:none;
}

.admin-header{

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:1.5rem;
}

.close-admin{

width:50px;
height:50px;

border:none;
border-radius:50%;

background:#ff3b30;

color:white;

font-size:1rem;

cursor:pointer;
}

.admin-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(320px,1fr));

gap:1rem;
}

.admin-card{

padding:1.2rem;

border-radius:25px;

background:rgba(255,255,255,.04);

border:1px solid rgba(255,255,255,.06);
}

.admin-card h3{
margin-bottom:1rem;
}

.admin-input{

width:100%;

padding:1rem;

border:none;
outline:none;

border-radius:18px;

background:rgba(255,255,255,.06);

color:white;

margin-bottom:1rem;
}

.admin-btn{

width:100%;

padding:1rem;

border:none;

border-radius:18px;

background:#ff6900;

color:white;

font-weight:bold;

cursor:pointer;
}

.admin-list{

margin-top:1rem;

display:flex;
flex-direction:column;
gap:.7rem;
}

.admin-item{

padding:1rem;

border-radius:18px;

background:rgba(255,255,255,.05);

display:flex;
justify-content:space-between;
align-items:center;

gap:1rem;
}

.delete-btn{

padding:.6rem 1rem;

border:none;

border-radius:14px;

background:#ff3b30;

color:white;

cursor:pointer;
}

/* =========================
TOAST
========================= */

#toastContainer{

position:fixed;

bottom:20px;
right:20px;

z-index:999999;
}

.toast{

padding:1rem 1.2rem;

background:#111827;

border-radius:18px;

margin-top:.7rem;

animation:toast .3s ease;
}

@keyframes toast{

from{
transform:translateY(30px);
opacity:0;
}

to{
transform:translateY(0);
opacity:1;
}

}

/* =========================
RESPONSIVE
========================= */

@media(max-width:700px){

.hero{
padding:2rem 1rem;
}

.hero h1{
font-size:2rem;
}

.link-content{
gap:.8rem;
}

.link-icon{
width:50px;
height:50px;
}

.code-item{
flex-direction:column;
align-items:flex-start;
}

.copy-btn{
width:100%;
}

.admin-panel{
padding:1rem;
height:92vh;
}

}

</style>
</head>

<body>

<div class="bg"></div>
<div class="grid"></div>
<div id="particles"></div>

<div class="container">

<!-- TOPBAR -->

<div class="topbar glass">

<div class="controls">

<button
class="ctrl-btn"
id="themeBtn">

<i class="fa-solid fa-moon"></i>

</button>

<button
class="ctrl-btn"
id="adminBtn">

<i class="fa-solid fa-user-shield"></i>

</button>

</div>

<div
class="fps"
id="fpsCounter">

0 FPS

</div>

</div>

<!-- HERO -->

<section class="hero glass">

<img
class="logo"
src="https://upload.wikimedia.org/wikipedia/commons/a/ae/Xiaomi_logo_%282021-%29.svg"
/>

<h1>
Xiaomi World
</h1>

<p class="subtitle">
ثيمات - أكواد بريفينت - تحسين الأداء
</p>

</section>

<!-- LINKS -->

<section class="section glass">

<div class="section-title">

<i class="fa-solid fa-link"></i>

<span>
الروابط
</span>

</div>

<div
class="links-grid"
id="linksGrid">

</div>

</section>

<!-- CODES -->

<section class="section glass">

<div
class="codes-header"
id="toggleCodes">

<div class="section-title">

<i class="fa-solid fa-bolt"></i>

<span>
أكواد بريفينت
</span>

</div>

<i
class="fa-solid fa-chevron-down"
id="arrowIcon"></i>

</div>

<div
class="codes-content"
id="codesContent">

<input
type="text"
class="search"
id="searchInput"
placeholder="ابحث عن كود..."
/>

<div id="codesContainer"></div>

</div>

</section>

</div>

<!-- TOAST -->

<div id="toastContainer"></div>

<!-- ADMIN -->

<div
class="admin-overlay"
id="adminOverlay">

</div>

<div
class="admin-panel"
id="adminPanel">

<div class="admin-header">

<h2>
لوحة تحكم المشرف
</h2>

<button
class="close-admin"
id="closeAdmin">

✕

</button>

</div>

<div class="admin-grid">

<!-- ADD LINK -->

<div class="admin-card">

<h3>
إضافة رابط
</h3>

<input
type="text"
class="admin-input"
id="linkName"
placeholder="اسم الرابط"
/>

<input
type="text"
class="admin-input"
id="linkUrl"
placeholder="الرابط"
/>

<select
class="admin-input"
id="linkIcon">

<option value="telegram">
Telegram
</option>

<option value="whatsapp">
WhatsApp
</option>

<option value="wallpaper">
Wallpaper
</option>

<option value="youtube">
YouTube
</option>

<option value="global">
Global
</option>

</select>

<button
class="admin-btn"
id="addLinkBtn">

إضافة الرابط

</button>

<div
class="admin-list"
id="adminLinksList">

</div>

</div>

<!-- ADD CODE -->

<div class="admin-card">

<h3>
إضافة كود
</h3>

<input
type="text"
class="admin-input"
id="codeValue"
placeholder="الكود"
/>

<input
type="text"
class="admin-input"
id="codeDesc"
placeholder="الوصف"
/>

<button
class="admin-btn"
id="addCodeBtn">

إضافة الكود

</button>

<div
class="admin-list"
id="adminCodesList">

</div>

</div>

</div>

</div>

<script>

/* =========================
PARTICLES
========================= */

const particles =
document.getElementById('particles');

const mobile =
window.innerWidth < 768;

const particlesCount =
mobile ? 14 : 30;

for(let i=0;i<particlesCount;i++){

const p =
document.createElement('div');

p.className = 'particle';

const size =
Math.random()*5+2;

p.style.width = size+'px';
p.style.height = size+'px';

p.style.left =
Math.random()*100+'%';

p.style.top =
Math.random()*100+'%';

p.style.animationDuration =
Math.random()*10+5+'s';

particles.appendChild(p);

}

/* =========================
FPS
========================= */

let fps = 0;

function loop(){
fps++;
requestAnimationFrame(loop);
}

loop();

setInterval(()=>{

document
.getElementById('fpsCounter')
.innerText =
fps+' FPS';

fps = 0;

},1000);

/* =========================
THEME
========================= */

document
.getElementById('themeBtn')
.onclick = ()=>{

document.body.classList.toggle(
'light'
);

showToast(
'تم تغيير الثيم'
);

};

/* =========================
TOAST
========================= */

function showToast(msg){

const toast =
document.createElement('div');

toast.className = 'toast';

toast.innerText = msg;

document
.getElementById('toastContainer')
.appendChild(toast);

setTimeout(()=>{
toast.remove();
},3000);

}

/* =========================
LINKS
========================= */

let links = JSON.parse(
localStorage.getItem('links')
) || [

{
name:"القناة الرئيسية",
url:"https://t.me/redmi3321",
icon:"telegram"
},

{
name:"جروب الدردشة",
url:"https://t.me/themes345",
icon:"telegram"
},

{
name:"قناة الواتس",
url:"https://whatsapp.com/channel/0029VbC2xVaD8SE4mfwh1H2H",
icon:"whatsapp"
},

{
name:"خلفيات 4K",
url:"https://t.me/themesXiaomia",
icon:"wallpaper"
},

{
name:"يوتيوب",
url:"https://youtube.com",
icon:"youtube"
}

];

function renderLinks(){

const grid =
document.getElementById(
'linksGrid'
);

grid.innerHTML = '';

links.forEach((link,index)=>{

let iconClass =
'fa-solid fa-link';

if(link.icon === 'telegram')
iconClass =
'fa-brands fa-telegram';

if(link.icon === 'whatsapp')
iconClass =
'fa-brands fa-whatsapp';

if(link.icon === 'wallpaper')
iconClass =
'fa-solid fa-image';

if(link.icon === 'youtube')
iconClass =
'fa-brands fa-youtube';

grid.innerHTML += `

<a
class="link-card glass"
href="${link.url}"
target="_blank">

<div class="link-content">

<div class="link-icon ${link.icon}">

<i class="${iconClass}"></i>

</div>

<div class="link-text">

<h3>
${link.name}
</h3>

<p>
${link.url}
</p>

</div>

</div>

</a>

`;

});

}

renderLinks();

/* =========================
CODES
========================= */

let codes = JSON.parse(
localStorage.getItem('codes')
) || [

{
code:"*#*#4636#*#*",
desc:"معلومات الهاتف"
},

{
code:"*#*#64663#*#*",
desc:"اختبار الهاردوير"
},

{
code:"*#*#76937#*#*",
desc:"وضع الأداء"
},

{
code:"*#06#",
desc:"عرض IMEI"
},

{
code:"*#*#6484#*#*",
desc:"اختبار الشاشة"
}

];

function renderCodes(){

const container =
document.getElementById(
'codesContainer'
);

container.innerHTML = '';

codes.forEach((item,index)=>{

container.innerHTML += `

<div class="code-item glass">

<div class="code-left">

<strong>
${item.code}
</strong>

<p>
${item.desc}
</p>

</div>

<button
class="copy-btn"
onclick="copyCode('${item.code}')">

نسخ

</button>

</div>

`;

});

}

renderCodes();

function copyCode(code){

navigator.clipboard.writeText(
code
);

showToast(
'تم نسخ الكود'
);

}

/* SEARCH */

document
.getElementById('searchInput')
.addEventListener('input',e=>{

const value =
e.target.value.toLowerCase();

document
.querySelectorAll('.code-item')
.forEach(item=>{

item.style.display =
item.innerText
.toLowerCase()
.includes(value)

? 'flex'
: 'none';

});

});

/* ACCORDION */

const toggleCodes =
document.getElementById(
'toggleCodes'
);

const codesContent =
document.getElementById(
'codesContent'
);

const arrowIcon =
document.getElementById(
'arrowIcon'
);

toggleCodes.onclick = ()=>{

codesContent.classList.toggle(
'active'
);

arrowIcon.classList.toggle(
'rotate'
);

};

/* =========================
ADMIN
========================= */

const ADMIN_PASSWORD =
"2010";

document
.getElementById('adminBtn')
.onclick = ()=>{

const pass =
prompt(
'ادخل كلمة المرور'
);

if(pass !== ADMIN_PASSWORD){

showToast(
'كلمة المرور خاطئة'
);

return;

}

document
.getElementById('adminOverlay')
.style.display = 'block';

document
.getElementById('adminPanel')
.style.display = 'block';

renderAdmin();

};

function closeAdmin(){

document
.getElementById('adminOverlay')
.style.display = 'none';

document
.getElementById('adminPanel')
.style.display = 'none';

}

document
.getElementById('closeAdmin')
.onclick = closeAdmin;

document
.getElementById('adminOverlay')
.onclick = closeAdmin;

/* ADD LINK */

document
.getElementById('addLinkBtn')
.onclick = ()=>{

const name =
document
.getElementById('linkName')
.value;

const url =
document
.getElementById('linkUrl')
.value;

const icon =
document
.getElementById('linkIcon')
.value;

if(!name || !url){

showToast(
'املأ البيانات'
);

return;

}

links.push({
name,
url,
icon
});

localStorage.setItem(
'links',
JSON.stringify(links)
);

renderLinks();
renderAdmin();

showToast(
'تم إضافة الرابط'
);

};

/* ADD CODE */

document
.getElementById('addCodeBtn')
.onclick = ()=>{

const code =
document
.getElementById('codeValue')
.value;

const desc =
document
.getElementById('codeDesc')
.value;

if(!code || !desc){

showToast(
'املأ البيانات'
);

return;

}

codes.push({
code,
desc
});

localStorage.setItem(
'codes',
JSON.stringify(codes)
);

renderCodes();
renderAdmin();

showToast(
'تم إضافة الكود'
);

};

/* ADMIN RENDER */

function renderAdmin(){

const linksList =
document.getElementById(
'adminLinksList'
);

linksList.innerHTML = '';

links.forEach((link,index)=>{

linksList.innerHTML += `

<div class="admin-item">

<div>
${link.name}
</div>

<button
class="delete-btn"
onclick="deleteLink(${index})">

حذف

</button>

</div>

`;

});

const codesList =
document.getElementById(
'adminCodesList'
);

codesList.innerHTML = '';

codes.forEach((item,index)=>{

codesList.innerHTML += `

<div class="admin-item">

<div>
${item.code}
</div>

<button
class="delete-btn"
onclick="deleteCode(${index})">

حذف

</button>

</div>

`;

});

}

/* DELETE */

function deleteLink(index){

links.splice(index,1);

localStorage.setItem(
'links',
JSON.stringify(links)
);

renderLinks();
renderAdmin();

showToast(
'تم حذف الرابط'
);

}

function deleteCode(index){

codes.splice(index,1);

localStorage.setItem(
'codes',
JSON.stringify(codes)
);
