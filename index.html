<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Xiaomi Royale | أفخم تجربة لهواتف شاومي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html {
  scroll-behavior: smooth;
  overflow-x: hidden;
}

body {
  font-family: 'Tajawal', sans-serif;
  background: #0a0a14;
  color: #ffffff;
  overflow-x: hidden;
  position: relative;
  min-height: 100vh;
  width: 100%;
}

/* ===== PROGRESS BAR ===== */
.progress-bar {
  position: fixed;
  top: 0;
  left: 0;
  width: 0%;
  height: 3px;
  background: linear-gradient(90deg, #d4af37, #ffdd88, #d4af37);
  z-index: 10000;
  transition: width 0.1s ease;
  box-shadow: 0 0 6px #ffd966;
}

/* ===== GOLD ACCENTS ===== */
:root {
  --gold: #d4af37;
  --gold-light: #f5e7a3;
  --gold-dark: #aa7c11;
}

/* ===== LUXURY BACKGROUND ===== */
.bg-royal {
  position: fixed;
  inset: 0;
  z-index: -3;
  background: radial-gradient(circle at 10% 20%, #0c0c1a, #020208);
}
.bg-royal::before {
  content: '';
  position: absolute;
  width: 150%;
  height: 150%;
  top: -25%;
  left: -25%;
  background: radial-gradient(ellipse at 30% 40%, rgba(212, 175, 55, 0.12), transparent 70%);
  animation: royalBreath 8s ease-in-out infinite;
}
@keyframes royalBreath {
  0% { opacity: 0.4; transform: scale(1);}
  50% { opacity: 0.8; transform: scale(1.05);}
  100% { opacity: 0.4; transform: scale(1);}
}

/* === ORB EFFECTS === */
.orb-lux {
  position: fixed;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.45;
  will-change: transform;
  pointer-events: none;
  z-index: -2;
}
.orb1-lux { width: 500px; height: 500px; background: #d4af37; top: -200px; left: -200px; }
.orb2-lux { width: 400px; height: 400px; background: #ff3366; bottom: -150px; right: -100px; }
.orb3-lux { width: 550px; height: 550px; background: #7a2be0; top: 30%; left: 10%; }

@media (min-width: 768px) {
  .orb1-lux { width: 700px; height: 700px; }
  .orb2-lux { width: 550px; height: 550px; }
  .orb3-lux { width: 750px; height: 750px; }
}

.grid-prestige {
  position: fixed;
  inset: 0;
  z-index: -2;
  background-image: 
    linear-gradient(rgba(212, 175, 55, 0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(212, 175, 55, 0.05) 1px, transparent 1px);
  background-size: 40px 40px;
  mask-image: radial-gradient(circle at 50% 50%, black 30%, transparent 90%);
  pointer-events: none;
}
@media (min-width: 768px) {
  .grid-prestige { background-size: 60px 60px; }
}

/* ===== PARTICLES CANVAS ===== */
#sparklesCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1;
}

/* ===== MAIN CONTAINER ===== */
.container {
  width: 100%;
  max-width: 1400px;
  margin: 0 auto;
  padding: 0.8rem;
  position: relative;
  z-index: 5;
}
@media (min-width: 768px) {
  .container { padding: 1.2rem; }
}

/* ===== TOP BAR ===== */
.topbar-royal {
  backdrop-filter: blur(20px);
  background: rgba(0, 0, 0, 0.35);
  border: 1px solid rgba(212, 175, 55, 0.3);
  border-radius: 60px;
  padding: 0.5rem 1rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 0.8rem;
  flex-wrap: wrap;
  box-shadow: 0 15px 35px rgba(0,0,0,0.3);
}
.logo-icon {
  font-size: 1.2rem;
  background: linear-gradient(135deg, #fff, #d4af37);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  font-weight: 900;
  white-space: nowrap;
}
@media (min-width: 480px) {
  .logo-icon { font-size: 1.6rem; }
}
.topbar-right {
  display: flex;
  gap: 0.5rem;
  align-items: center;
}
.fps-badge {
  background: rgba(212,175,55,0.2);
  border-radius: 40px;
  padding: 0.2rem 0.7rem;
  font-family: monospace;
  font-size: 0.7rem;
  border: 1px solid rgba(212,175,55,0.5);
  color: #f5e7a3;
}
.royal-btn {
  background: rgba(212,175,55,0.15);
  border: 1px solid rgba(212,175,55,0.5);
  border-radius: 50%;
  width: 38px;
  height: 38px;
  color: #ffdf8c;
  transition: all 0.25s cubic-bezier(0.2, 1.2, 0.4, 1);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
@media (min-width: 480px) {
  .royal-btn { width: 46px; height: 46px; }
}

/* ===== HERO SECTION ===== */
.hero-lux {
  margin-top: 1.2rem;
  background: linear-gradient(135deg, rgba(10,10,25,0.7), rgba(30,20,40,0.6));
  backdrop-filter: blur(20px);
  border-radius: 40px;
  border: 1px solid rgba(212,175,55,0.4);
  padding: 1.8rem 1rem;
  text-align: center;
  box-shadow: 0 30px 50px rgba(0,0,0,0.5);
  position: relative;
  overflow: hidden;
}
@media (min-width: 768px) {
  .hero-lux { padding: 3rem 2rem; border-radius: 60px; margin-top: 2rem; }
}
.custom-logo-img {
  width: 70px;
  height: auto;
  filter: drop-shadow(0 0 15px rgba(212,175,55,0.8));
  animation: emblemGlow 3s ease-in-out infinite;
  transition: 0.3s;
}
@media (min-width: 480px) {
  .custom-logo-img { width: 90px; }
}
@media (min-width: 768px) {
  .custom-logo-img { width: 110px; }
}
.change-logo-btn {
  position: absolute;
  bottom: -8px;
  right: -12px;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(12px);
  border-radius: 30px;
  padding: 4px 8px;
  font-size: 0.6rem;
  border: 1px solid #d4af37;
  color: #d4af37;
  cursor: pointer;
  display: none;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
}
.change-logo-btn.admin-visible { display: flex; }
.hero-title {
  font-size: 2rem;
  font-weight: 900;
  background: linear-gradient(135deg, #ffffff 20%, #f5e7a3 60%, #d4af37);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin-top: 0.8rem;
  letter-spacing: -0.5px;
}
@media (min-width: 480px) {
  .hero-title { font-size: 2.5rem; }
}
@media (min-width: 768px) {
  .hero-title { font-size: 3.8rem; margin-top: 1rem; }
}

/* ===== رسالة ترحيبية جديدة ===== */
.welcome-message {
  background: linear-gradient(135deg, rgba(212,175,55,0.15), rgba(212,175,55,0.05));
  border: 1px solid rgba(212,175,55,0.4);
  border-radius: 50px;
  padding: 0.6rem 1.2rem;
  margin: 1rem auto 0.5rem auto;
  display: inline-block;
  backdrop-filter: blur(12px);
  font-size: 1rem;
  font-weight: 600;
  color: #f5e7a3;
  text-shadow: 0 0 5px rgba(212,175,55,0.5);
  animation: welcomePulse 2s infinite alternate;
}
@keyframes welcomePulse {
  0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(212,175,55,0.4);}
  100% { transform: scale(1.02); box-shadow: 0 0 12px 2px rgba(212,175,55,0.3);}
}
@media (min-width: 480px) {
  .welcome-message { font-size: 1.2rem; padding: 0.8rem 2rem; }
}
@media (min-width: 768px) {
  .welcome-message { font-size: 1.4rem; padding: 0.8rem 2.5rem; margin: 1.2rem auto 0.8rem auto; }
}

.hero-sub {
  font-size: 0.85rem;
  opacity: 0.8;
  margin-top: 0.5rem;
  padding: 0 0.5rem;
}
@media (min-width: 480px) {
  .hero-sub { font-size: 1rem; }
}
.prestige-badges {
  display: flex;
  gap: 0.6rem;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 1rem;
}
.p-badge {
  background: rgba(212,175,55,0.12);
  border-radius: 40px;
  padding: 0.3rem 0.9rem;
  font-size: 0.7rem;
  font-weight: 500;
  border: 1px solid rgba(212,175,55,0.4);
  backdrop-filter: blur(5px);
}
@media (min-width: 480px) {
  .p-badge { padding: 0.5rem 1.3rem; font-size: 0.8rem; }
}

/* ===== LINKS SECTION ===== */
.links-section {
  margin-top: 1.2rem;
  border-radius: 32px;
  background: rgba(0,0,0,0.25);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(212,175,55,0.3);
  padding: 1.2rem;
}
@media (min-width: 768px) {
  .links-section { margin-top: 2rem; border-radius: 48px; padding: 1.8rem; }
}
.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 1rem;
  flex-wrap: wrap;
}
.header-icon {
  background: linear-gradient(135deg, #d4af37, #aa7c11);
  width: 40px;
  height: 40px;
  border-radius: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  flex-shrink: 0;
}
@media (min-width: 480px) {
  .header-icon { width: 48px; height: 48px; font-size: 1.4rem; }
}
.section-header h2 {
  font-size: 1.2rem;
  margin: 0;
}
@media (min-width: 480px) {
  .section-header h2 { font-size: 1.5rem; }
}
@media (min-width: 768px) {
  .section-header h2 { font-size: 1.7rem; }
}
.links-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 1.2rem;
}
@media (min-width: 480px) {
  .links-grid { grid-template-columns: repeat(2, 1fr); gap: 1.3rem; }
}
@media (min-width: 900px) {
  .links-grid { grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
}
/* تكبير القوالب */
.link-card-lux {
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(18px);
  border-radius: 32px;
  padding: 1rem 1.2rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  border: 1px solid rgba(212,175,55,0.25);
  transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.2);
  text-decoration: none;
  color: white;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
@media (min-width: 480px) {
  .link-card-lux { padding: 1.2rem 1.5rem; gap: 1.3rem; border-radius: 40px; }
}
.link-icon-lux {
  width: 52px;
  height: 52px;
  border-radius: 26px;
  background: linear-gradient(145deg, #d4af37, #9e740e);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  flex-shrink: 0;
}
@media (min-width: 480px) {
  .link-icon-lux { width: 64px; height: 64px; font-size: 1.8rem; border-radius: 32px; }
}
.link-text {
  flex: 1;
}
.link-text strong {
  font-size: 1rem;
  display: block;
  font-weight: 800;
}
@media (min-width: 480px) {
  .link-text strong { font-size: 1.2rem; }
}
.link-card-lux i.fa-arrow-left {
  font-size: 1rem;
  opacity: 0.7;
  transition: 0.2s;
}
@media (min-width: 480px) {
  .link-card-lux i.fa-arrow-left { font-size: 1.2rem; }
}

/* ===== SCROLL TOP ===== */
.scroll-gold {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 45px;
  height: 45px;
  background: radial-gradient(circle, #d4af37, #a57c1c);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.2);
  z-index: 200;
  box-shadow: 0 0 15px rgba(212,175,55,0.5);
}
@media (min-width: 480px) {
  .scroll-gold { width: 55px; height: 55px; bottom: 30px; right: 30px; }
}
.scroll-gold.show {
  opacity: 1;
  visibility: visible;
}

/* ===== ADMIN PANEL ===== */
.admin-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(30px);
  z-index: 9998;
  display: none;
}
.admin-panel-lux {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.95);
  width: 92%;
  max-width: 500px;
  max-height: 85vh;
  overflow-y: auto;
  background: linear-gradient(145deg, #0f0f1fcc, #03030cee);
  border: 1px solid #d4af37;
  border-radius: 40px;
  padding: 1.2rem;
  z-index: 9999;
  display: none;
  backdrop-filter: blur(20px);
}
@media (min-width: 768px) {
  .admin-panel-lux { width: min(1000px, 94%); max-width: none; padding: 2rem; border-radius: 56px; }
}
.admin-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid rgba(212,175,55,0.4);
  margin-bottom: 1rem;
  padding-bottom: 0.8rem;
  flex-wrap: wrap;
}
.admin-header h2 { font-size: 1.2rem; }
@media (min-width: 480px) {
  .admin-header h2 { font-size: 1.5rem; }
}
.close-btn-gold {
  background: #d4af37;
  border: none;
  border-radius: 50%;
  width: 34px;
  height: 34px;
  cursor: pointer;
  font-weight: bold;
}
.copy-gold {
  background: linear-gradient(135deg, #d4af37, #aa7c11);
  border: none;
  padding: 0.6rem 1rem;
  border-radius: 40px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
  color: #0a0a14;
  width: 100%;
}
.admin-panel-lux input, .admin-panel-lux select {
  background: #1e1e2e;
  border: 1px solid #d4af37;
  border-radius: 30px;
  padding: 10px;
  width: 100%;
  margin-bottom: 10px;
  color: white;
}
.admin-grid {
  display: flex;
  flex-direction: column;
  gap: 1.2rem;
}
@media (min-width: 768px) {
  .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
}
.ripple {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, #d4af37, transparent);
  transform: scale(0);
  animation: rippleAnim 0.6s linear;
  pointer-events: none;
  z-index: 10;
}
@keyframes rippleAnim {
  to { transform: scale(6); opacity: 0; }
}
@keyframes flashFade {
  0% { opacity: 0.8; }
  100% { opacity: 0; visibility: hidden; }
}
@keyframes emblemGlow {
  0%,100% { filter: drop-shadow(0 0 10px #d4af37); transform: scale(1);}
  50% { filter: drop-shadow(0 0 25px #ffcd4a); transform: scale(1.02);}
}
</style>
</head>
<body>
<div class="progress-bar" id="progressBar"></div>
<div class="bg-royal"></div>
<div class="orb-lux orb1-lux" id="orb1"></div>
<div class="orb-lux orb2-lux" id="orb2"></div>
<div class="orb-lux orb3-lux" id="orb3"></div>
<div class="grid-prestige"></div>
<canvas id="sparklesCanvas"></canvas>

<div class="container">
  <div class="topbar-royal">
    <div class="logo-icon"><i class="fas fa-crown"></i> XIAOMI ROYALE</div>
    <div class="topbar-right">
      <span class="fps-badge" id="fpsMeter">0 FPS</span>
      <button class="royal-btn" id="royalThemeBtn"><i class="fas fa-moon"></i></button>
      <button class="royal-btn" id="adminAccessBtn"><i class="fas fa-key"></i></button>
    </div>
  </div>

  <div class="hero-lux">
    <div class="logo-upload-area" style="position: relative; display: inline-block;">
      <img id="customLogoImg" class="custom-logo-img" src="https://upload.wikimedia.org/wikipedia/commons/a/ae/Xiaomi_logo_%282021-%29.svg" alt="شعار الموقع">
      <div id="changeLogoBtn" class="change-logo-btn"><i class="fas fa-camera"></i> تبديل</div>
      <input type="file" id="logoFileInput" accept="image/*" style="display: none;">
    </div>
    <h1 class="hero-title" id="dynamicTitle">Xiaomi Royale</h1>
    <!-- رسالة ترحيبية جديدة -->
    <div class="welcome-message">
      <i class="fas fa-heart" style="color: #d4af37; margin-left: 8px;"></i>
      أهلاً بكم يا محبي شاومي
      <i class="fas fa-heart" style="color: #d4af37; margin-right: 8px;"></i>
    </div>
    <p class="hero-sub">أفخم منصة لهواتف شاومي | روابط النخبة وثيمات حصرية</p>
    <div class="prestige-badges">
      <span class="p-badge"><i class="fas fa-gem"></i> حصري VIP</span>
      <span class="p-badge"><i class="fas fa-bolt"></i> أداء أسطوري</span>
      <span class="p-badge"><i class="fas fa-shield-alt"></i> روابط مميزة</span>
    </div>
  </div>

  <div class="links-section">
    <div class="section-header">
      <div class="header-icon"><i class="fas fa-link"></i></div>
      <h2>روابط النخبة <span style="color:#d4af37;">| GOLDEN LINKS</span></h2>
    </div>
    <div class="links-grid" id="premiumLinksGrid"></div>
  </div>
</div>

<button class="scroll-gold" id="goTopGold"><i class="fas fa-arrow-up"></i></button>

<div class="admin-overlay" id="adminOverlayLux"></div>
<div class="admin-panel-lux" id="adminPanelLux">
  <div class="admin-header">
    <h2><i class="fas fa-crown"></i> لوحة التحكم الملكية</h2>
    <button id="closeAdminLux" class="close-btn-gold">✕</button>
  </div>
  <div class="admin-grid">
    <div>
      <h3>➕ إضافة رابط</h3>
      <input type="text" id="adminLinkName" placeholder="الاسم">
      <input type="text" id="adminLinkUrl" placeholder="الرابط (سيتم إخفاؤه)">
      <select id="adminLinkIcon">
        <option value="telegram">تيليجرام</option>
        <option value="whatsapp">واتساب</option>
        <option value="global">موقع عالمي</option>
      </select>
      <button id="addLinkAdminBtn" class="copy-gold">إضافة الرابط</button>
      <h3 style="margin-top: 1rem;">📋 الروابط الحالية</h3>
      <div id="adminLinksList"></div>
    </div>
    <div>
      <h3>📊 إحصائيات</h3>
      <p>إجمالي الروابط: <span id="statLinksCount">0</span></p>
      <p>نقرات اليوم: <span id="statClicksToday">0</span></p>
      <button id="resetStatsBtnGold" style="background:#333; border:none; padding:10px; border-radius:30px; width:100%; cursor:pointer;">إعادة ضبط الإحصائيات</button>
    </div>
  </div>
</div>

<script>
// ------------------------------------------------------------
// 1. جسيمات Canvas (مُحسّنة للهواتف)
// ------------------------------------------------------------
const canvas = document.getElementById('sparklesCanvas');
const ctx = canvas.getContext('2d');
let particles = [];
let animationId = null;
let canvasWidth = window.innerWidth;
let canvasHeight = window.innerHeight;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  canvasWidth = canvas.width;
  canvasHeight = canvas.height;
  initParticles();
}
window.addEventListener('resize', () => {
  resizeCanvas();
});

class Spark {
  constructor() {
    this.x = Math.random() * canvasWidth;
    this.y = Math.random() * canvasHeight;
    this.size = Math.random() * 2 + 1;
    this.speedY = Math.random() * 0.5 + 0.2;
    this.speedX = (Math.random() - 0.5) * 0.3;
    this.opacity = Math.random() * 0.4 + 0.2;
    this.color = `rgba(212, 175, 55, ${this.opacity})`;
  }
  update() {
    this.y -= this.speedY;
    this.x += this.speedX;
    if (this.y < -10) {
      this.y = canvasHeight + 10;
      this.x = Math.random() * canvasWidth;
    }
    if (this.x < -10) this.x = canvasWidth + 10;
    if (this.x > canvasWidth + 10) this.x = -10;
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.fill();
  }
}

function initParticles() {
  const count = Math.min(40, Math.floor(window.innerWidth / 20));
  particles = [];
  for (let i = 0; i < count; i++) {
    particles.push(new Spark());
  }
}
function animateParticles() {
  if (!ctx) return;
  ctx.clearRect(0, 0, canvasWidth, canvasHeight);
  for (let p of particles) {
    p.update();
    p.draw();
  }
  animationId = requestAnimationFrame(animateParticles);
}
resizeCanvas();
animateParticles();

// ------------------------------------------------------------
// 2. FPS + Parallax + Progress
// ------------------------------------------------------------
let frameCount = 0;
function countFPS(){ frameCount++; requestAnimationFrame(countFPS); }
countFPS();
setInterval(() => {
  document.getElementById('fpsMeter').innerText = frameCount + ' FPS';
  frameCount = 0;
}, 1000);

window.addEventListener('scroll', () => {
  const scrollY = window.scrollY;
  const orb1 = document.getElementById('orb1');
  const orb2 = document.getElementById('orb2');
  const orb3 = document.getElementById('orb3');
  if(orb1) orb1.style.transform = `translateY(${scrollY * 0.04}px)`;
  if(orb2) orb2.style.transform = `translateY(${scrollY * -0.03}px)`;
  if(orb3) orb3.style.transform = `translateY(${scrollY * 0.02}px)`;
  
  const winScroll = document.documentElement.scrollTop;
  const height = document.documentElement.scrollHeight - window.innerHeight;
  const scrolled = (winScroll / height) * 100;
  document.getElementById('progressBar').style.width = scrolled + '%';
});

// Ripple effect
function addRipple(e, element) {
  const rect = element.getBoundingClientRect();
  const ripple = document.createElement('span');
  const size = Math.max(rect.width, rect.height);
  ripple.className = 'ripple';
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = e.clientX - rect.left - size/2 + 'px';
  ripple.style.top = e.clientY - rect.top - size/2 + 'px';
  element.style.position = 'relative';
  element.style.overflow = 'hidden';
  element.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);
}
document.addEventListener('click', (e) => {
  const target = e.target.closest('.link-card-lux, .royal-btn, .copy-gold, .scroll-gold');
  if(target) addRipple(e, target);
});

// Toast
function showToast(msg, icon='👑') {
  let t = document.createElement('div');
  t.innerText = icon + ' ' + msg;
  t.style.cssText = 'position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.85); backdrop-filter:blur(20px); color:#ffdf8c; padding:8px 18px; border-radius:40px; border:1px solid #d4af37; z-index:99999; font-weight:bold; white-space:nowrap; font-family:Tajawal; font-size:0.85rem;';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2500);
}

// Logo upload (admin only)
const changeLogoBtn = document.getElementById('changeLogoBtn');
const logoFileInput = document.getElementById('logoFileInput');
const logoImg = document.getElementById('customLogoImg');
function enableAdminMode() {
  changeLogoBtn.classList.add('admin-visible');
  sessionStorage.setItem('adminMode', 'true');
}
if(sessionStorage.getItem('adminMode') === 'true') enableAdminMode();
changeLogoBtn.addEventListener('click', () => logoFileInput.click());
logoFileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if(file && file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      logoImg.src = ev.target.result;
      localStorage.setItem('royaleCustomLogo', ev.target.result);
      showToast('تم تغيير الشعار!', '🖼️');
    };
    reader.readAsDataURL(file);
  }
});
const savedLogo = localStorage.getItem('royaleCustomLogo');
if(savedLogo) logoImg.src = savedLogo;

// Links & Stats
const defaultLinks = [
  {name:"📡 قناة تليجرام اساسيه", url:"https://t.me/redmi3321", icon:"telegram"},
  {name:"💬 جروب الدردشه", url:"https://t.me/themes345", icon:"telegram"},
  {name:"📱 قناه الواتس", url:"https://whatsapp.com/channel/0029VbC2xVaD8SE4mfwh1H2H", icon:"whatsapp"}
];
let links = JSON.parse(localStorage.getItem('royaleLinks')) || defaultLinks;
let clickStat = JSON.parse(localStorage.getItem('royaleStats')) || {todayClicks:0, lastDate: new Date().toDateString()};
function saveData(){
  localStorage.setItem('royaleLinks', JSON.stringify(links));
  localStorage.setItem('royaleStats', JSON.stringify(clickStat));
}
function updateStatsUI(){
  document.getElementById('statLinksCount').innerText = links.length;
  document.getElementById('statClicksToday').innerText = clickStat.todayClicks;
}
function recordLinkClick(){
  let today = new Date().toDateString();
  if(clickStat.lastDate !== today){ clickStat.todayClicks = 0; clickStat.lastDate = today; }
  clickStat.todayClicks++;
  saveData();
  updateStatsUI();
}
const iconMap = {telegram:"fa-brands fa-telegram", whatsapp:"fa-brands fa-whatsapp", global:"fa-solid fa-globe"};
function renderLinks(){
  const container = document.getElementById('premiumLinksGrid');
  if(!container) return;
  container.innerHTML = links.map((l,idx)=>`
    <a href="${l.url}" target="_blank" class="link-card-lux" data-linkidx="${idx}">
      <div class="link-icon-lux"><i class="${iconMap[l.icon]||'fa-solid fa-link'}"></i></div>
      <div class="link-text"><strong>${l.name}</strong></div>
      <i class="fas fa-arrow-left"></i>
    </a>
  `).join('');
  document.querySelectorAll('.link-card-lux').forEach(el=>{
    el.addEventListener('click',()=>recordLinkClick());
  });
}
renderLinks();

// Theme Toggle
document.getElementById('royalThemeBtn').onclick = () => {
  document.body.classList.toggle('light-royal');
  if(document.body.classList.contains('light-royal')){
    document.body.style.background = '#faf3e0';
    document.body.style.color = '#1a120b';
    showToast('الوضع الذهبي الفاتح', '✨');
  } else {
    document.body.style.background = '';
    document.body.style.color = '';
    showToast('الوضع الليلي', '🌙');
  }
};

// Scroll Top
const scrollBtn = document.getElementById('goTopGold');
window.addEventListener('scroll',()=>{
  if(window.scrollY>250) scrollBtn.classList.add('show');
  else scrollBtn.classList.remove('show');
});
scrollBtn.onclick = () => window.scrollTo({top:0,behavior:'smooth'});

// Admin Panel
const adminOverlay = document.getElementById('adminOverlayLux');
const adminPanel = document.getElementById('adminPanelLux');
document.getElementById('adminAccessBtn').onclick = () => {
  let p = prompt('👑 كلمة السر الملكية:');
  if(p !== '2010'){ showToast('كلمة السر خاطئة', '❌'); return; }
  enableAdminMode();
  adminOverlay.style.display = 'block';
  adminPanel.style.display = 'block';
  refreshAdminLists();
  updateStatsUI();
};
function closeAdmin(){
  adminOverlay.style.display = 'none';
  adminPanel.style.display = 'none';
}
document.getElementById('closeAdminLux').onclick = closeAdmin;
adminOverlay.onclick = closeAdmin;
function refreshAdminLists(){
  const linksContainer = document.getElementById('adminLinksList');
  if(linksContainer){
    linksContainer.innerHTML = links.map((l,i)=>`
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; background:rgba(255,255,255,0.05); padding:6px 10px; border-radius:30px;">
        <span style="font-size:0.85rem;">${l.name}</span>
        <button class="delAdminBtn" data-linkidx="${i}" style="background:#aa2e00; border:none; padding:4px 12px; border-radius:30px; color:white; cursor:pointer;">حذف</button>
      </div>
    `).join('');
    document.querySelectorAll('.delAdminBtn').forEach(btn=>{
      btn.addEventListener('click',(e)=>{
        let idx = btn.getAttribute('data-linkidx');
        if(idx!==null) links.splice(parseInt(idx),1);
        saveData(); renderLinks(); refreshAdminLists(); updateStatsUI(); showToast('تم حذف الرابط', '🗑️');
      });
    });
  }
}
document.getElementById('addLinkAdminBtn').onclick = ()=>{
  let name = document.getElementById('adminLinkName').value.trim();
  let url = document.getElementById('adminLinkUrl').value.trim();
  let icon = document.getElementById('adminLinkIcon').value;
  if(!name || !url){ showToast('أدخل الاسم والرابط', '⚠️'); return; }
  links.push({name,url,icon});
  saveData(); renderLinks(); refreshAdminLists(); updateStatsUI(); showToast('تمت إضافة رابط', '👑');
  document.getElementById('adminLinkName').value = '';
  document.getElementById('adminLinkUrl').value = '';
};
document.getElementById('resetStatsBtnGold').onclick = ()=>{
  clickStat = {todayClicks:0, lastDate: new Date().toDateString()};
  saveData(); updateStatsUI(); showToast('تمت إعادة ضبط الإحصائيات', '🔄');
};
updateStatsUI();

// Typewriter effect
const titleEl = document.getElementById('dynamicTitle');
const originalTitle = "Xiaomi Royale";
titleEl.innerHTML = '';
let idx = 0;
function typeWriter(){
  if(idx < originalTitle.length){
    titleEl.innerHTML += originalTitle.charAt(idx);
    idx++;
    setTimeout(typeWriter, 60);
  }
}
typeWriter();

// Flash effect

flash.style.cssText = 'position:fixed; inset:0; background:radial-gradient(circle, #fff6cf, transparent); pointer-events:none; z-index:99999; opacity:0.6; animation:flashFade 0.7s forwards;';
document.body.appendChild(flash);
setTimeout(()=>flash.remove(),700);
