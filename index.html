<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Xiaomi World — Light | Fast | Global</title>
  <meta name="description" content="Ultra-fast, premium Xiaomi community: bilingual, glass, low-end optimized.">
  
  <!-- Status Bar & PWA -->
  <meta name="theme-color" content="#050508" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <!-- Fonts with font-display: swap -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ---------- RESET & BASE (Optimized) ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #050508;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: #FFFFFF;
      line-height: 1.5;
      overflow-x: hidden;
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
    }
    body[dir="rtl"] {
      font-family: 'Cairo', 'Inter', sans-serif;
    }

    /* ---------- LIGHTWEIGHT BACKGROUND (NO particles, just gradient) ---------- */
    .bg-gradient {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 40%, #0f0f1a, #020208);
      z-index: 0;
      pointer-events: none;
    }

    /* ---------- OPTIMIZED GLASS (light blur + fallback) ---------- */
    .glass-card {
      background: rgba(12, 12, 22, 0.7);
      backdrop-filter: blur(10px);
      border-radius: 28px;
      padding: 22px 18px;
      transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      will-change: transform;
      border: 1px solid rgba(255,255,255,0.08);
    }
    /* Fallback for old devices or reduced motion */
    @media (prefers-reduced-motion: reduce) or (max-width: 400px) {
      .glass-card {
        backdrop-filter: none !important;
        background: rgba(8, 8, 14, 0.9) !important;
      }
    }
    .glass-card:active {
      transform: scale(0.98);
    }

    /* Buttons (GPU accelerated) */
    .btn {
      min-width: 48px;
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 22px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.9rem;
      border: none;
      background: rgba(255,105,0,0.9);
      color: white;
      transition: transform 0.15s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      will-change: transform;
      cursor: pointer;
    }
    .btn:active {
      transform: scale(0.96);
    }
    .btn-outline {
      background: rgba(20, 20, 32, 0.7);
      border: 1px solid rgba(255,255,255,0.2);
    }

    /* Grids (simple) */
    .cards-grid, .benefits-grid, .stats-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin-top: 24px;
    }
    @media (min-width: 480px) {
      .cards-grid, .benefits-grid { grid-template-columns: repeat(2, 1fr); }
      .stats-grid { grid-template-columns: repeat(3, 1fr); }
    }
    .stat-number {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #FFF, #B0B0C0);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .card-icon {
      font-size: 2rem;
      margin-bottom: 12px;
      color: #60A5FA;
    }

    /* FAQ (light) */
    .faq-item {
      background: rgba(12,12,24,0.6);
      border-radius: 28px;
      margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .faq-question {
      width: 100%;
      padding: 16px 20px;
      background: transparent;
      border: none;
      font-weight: 600;
      text-align: left;
      display: flex;
      justify-content: space-between;
      color: white;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .faq-answer {
      max-height: 0;
      overflow: hidden;
      padding: 0 20px;
      transition: max-height 0.2s ease;
      color: #B0B0C0;
      font-size: 0.85rem;
    }
    .faq-item.active .faq-answer {
      max-height: 150px;
      padding: 0 20px 16px 20px;
    }

    /* Bottom Dock (glass light) */
    .bottom-dock {
      position: fixed;
      bottom: max(12px, env(safe-area-inset-bottom, 12px));
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 24px);
      max-width: 460px;
      background: rgba(10, 10, 18, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 50px;
      padding: 6px 14px;
      display: flex;
      justify-content: space-between;
      z-index: 1000;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .bottom-dock .nav-item {
      background: transparent;
      border: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      color: #B0B0C0;
      font-size: 0.6rem;
      font-weight: 500;
      padding: 6px 8px;
      border-radius: 40px;
      min-width: 50px;
      cursor: pointer;
      transition: 0.1s;
    }
    .bottom-dock .nav-item:active {
      transform: scale(0.94);
    }

    /* Scroll progress (thin) */
    .scroll-progress {
      position: fixed;
      top: 0;
      left: 0;
      width: 0%;
      height: 2px;
      background: linear-gradient(90deg, #FF6900, #60A5FA);
      z-index: 1001;
      transition: width 0.05s linear;
    }

    /* Language toggle floating */
    .lang-float {
      position: fixed;
      top: 16px;
      right: 16px;
      background: rgba(10,10,18,0.7);
      backdrop-filter: blur(8px);
      border-radius: 40px;
      padding: 6px 14px;
      z-index: 1002;
      border: 1px solid rgba(96,165,250,0.4);
      cursor: pointer;
      font-weight: 600;
      font-size: 0.75rem;
    }
    body[dir="rtl"] .lang-float {
      right: auto;
      left: 16px;
    }

    /* Main container */
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 12px 16px calc(80px + env(safe-area-inset-bottom, 0px)) 16px;
      position: relative;
      z-index: 2;
    }
    .hero-title {
      font-size: clamp(2rem, 8vw, 3.5rem);
      font-weight: 800;
      background: linear-gradient(135deg, #FFFFFF, #B0B0D0);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-align: center;
    }
    .hero-badge {
      background: rgba(96,165,250,0.2);
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.7rem;
      display: inline-block;
    }
    .reveal-item {
      opacity: 0;
      transform: translateY(15px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .reveal-item.visible {
      opacity: 1;
      transform: translateY(0);
    }
    footer {
      text-align: center;
      font-size: 0.7rem;
      padding: 24px 0 12px;
      color: #6c6c7a;
    }
    h2 {
      font-size: clamp(1.2rem, 5vw, 1.6rem);
    }
    /* Lazy images */
    img {
      display: block;
      max-width: 100%;
      height: auto;
    }
    /* Prevent overflow */
    body, .container {
      overflow-x: hidden;
    }
  </style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="scroll-progress" id="scrollProgress"></div>
<div class="lang-float" id="langToggleFloat">
  <i class="fas fa-globe"></i> <span id="langToggleText">EN / العربية</span>
</div>

<div class="container" id="mainContent">
  <div style="text-align: center; margin-bottom: 20px;">
    <span class="hero-badge" data-i18n="heroBadge">HyperOS · Cyber Edition</span>
    <div class="hero-title" data-i18n="heroTitle">Xiaomi World</div>
    <div style="min-height: 50px; margin: 12px 0; font-size: 1rem; font-weight: 400; color: #C0C0D0;" id="typedElement"></div>
    <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
      <button class="btn" id="heroJoinBtn" data-i18n="heroJoinBtn">Join Community</button>
      <button class="btn btn-outline" id="heroBenefitsBtn" data-i18n="heroBenefitsBtn">Explore Benefits</button>
    </div>
  </div>

  <!-- Dynamic sections (filled by JS) -->
  <section id="community" class="reveal-item" style="margin: 28px 0;"><h2 data-i18n="communityTitle">Active Hubs</h2><div class="cards-grid" id="communityGrid"></div></section>
  <section id="benefits" class="reveal-item"><h2 data-i18n="benefitsTitle">Premium Advantages</h2><div class="benefits-grid" id="benefitsGrid"></div></section>
  <section class="reveal-item"><h2 data-i18n="statsTitle">Community Impact</h2><div class="stats-grid" id="statsGrid"></div></section>
  <section id="faq" class="reveal-item" style="margin: 32px 0;"><h2 data-i18n="faqTitle">FAQ</h2><div id="faqContainer"></div></section>
  <footer><span data-i18n="footer">© 2026 Xiaomi World — Light Edition</span></footer>
</div>

<!-- Bottom Navigation -->
<div class="bottom-dock" id="bottomDock">
  <button class="nav-item" data-section="community"><i class="fas fa-users"></i><span data-i18n="navCommunity">Community</span></button>
  <button class="nav-item" data-section="benefits"><i class="fas fa-gem"></i><span data-i18n="navBenefits">Benefits</span></button>
  <button class="nav-item" data-section="faq"><i class="fas fa-question-circle"></i><span data-i18n="navFaq">FAQ</span></button>
  <button class="nav-item" id="shareBottomBtn"><i class="fas fa-share-alt"></i><span data-i18n="shareBtn">Share</span></button>
</div>

<script>
  (function() {
    // ---------- BASIC PROTECTION (light, no performance hit) ----------
    document.addEventListener('contextmenu', (e) => e.preventDefault());
    document.addEventListener('keydown', (e) => {
      if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
        e.preventDefault();
      }
    });
    document.addEventListener('copy', (e) => e.preventDefault());
    document.addEventListener('cut', (e) => e.preventDefault());

    // ---------- TRANSLATIONS (EN/AR) ----------
    const translations = {
      en: {
        heroBadge: "HyperOS · Cyber Edition", heroTitle: "Xiaomi World", heroJoinBtn: "Join Community", heroBenefitsBtn: "Explore Benefits",
        communityTitle: "Active Hubs", benefitsTitle: "Premium Advantages", statsTitle: "Community Impact", faqTitle: "FAQ",
        footer: "© 2026 Xiaomi World — Light Edition", navCommunity: "Community", navBenefits: "Benefits", navFaq: "FAQ", shareBtn: "Share",
        card1Title: "Telegram Group", card1Desc: "Discussions & support", card1Btn: "Join",
        card2Title: "Main Channel", card2Desc: "Official updates", card2Btn: "Open",
        card3Title: "WhatsApp", card3Desc: "Fast notifications", card3Btn: "Follow",
        card4Title: "Wallpapers", card4Desc: "Ultra HD channel", card4Btn: "Join",
        benefit1Title: "HyperOS First Look", benefit1Desc: "Early beta access",
        benefit2Title: "Hidden Tips", benefit2Desc: "Secret features",
        benefit3Title: "Global Community", benefit3Desc: "Chat with devs",
        benefit4Title: "Exclusive Wallpapers", benefit4Desc: "4K weekly",
        faq1_q: "How to join groups?", faq1_a: "Click 'Join' – redirects to official channel.",
        faq2_q: "Is content free?", faq2_a: "Yes, 100% free.",
        faq3_q: "Official Xiaomi devs?", faq3_a: "Beta testers share insights."
      },
      ar: {
        heroBadge: "هايبر أو إس · الإصدار السيبراني", heroTitle: "عالم شاومي", heroJoinBtn: "انضم للمجتمع", heroBenefitsBtn: "استكشف المزايا",
        communityTitle: "مراكز نشطة", benefitsTitle: "مزايا حصرية", statsTitle: "تأثير المجتمع", faqTitle: "الأسئلة الشائعة",
        footer: "© 2026 عالم شاومي — النسخة الخفيفة", navCommunity: "المجتمع", navBenefits: "المزايا", navFaq: "الأسئلة", shareBtn: "مشاركة",
        card1Title: "مجموعة تيليجرام", card1Desc: "نقاشات ودعم", card1Btn: "انضم",
        card2Title: "القناة الرئيسية", card2Desc: "تحديثات رسمية", card2Btn: "افتح",
        card3Title: "واتساب", card3Desc: "إشعارات سريعة", card3Btn: "تابع",
        card4Title: "الخلفيات", card4Desc: "جودة فائقة", card4Btn: "انضم",
        benefit1Title: "لمحة أولى HyperOS", benefit1Desc: "وصول مبكر للتجريبي",
        benefit2Title: "نصائح خفية", benefit2Desc: "ميزات سرية",
        benefit3Title: "مجتمع عالمي", benefit3Desc: "تحدث مع المطورين",
        benefit4Title: "خلفيات حصرية", benefit4Desc: "مجموعات 4K أسبوعياً",
        faq1_q: "كيف أنضم للمجموعات؟", faq1_a: "اضغط 'انضم' – يتم توجيهك للقناة الرسمية.",
        faq2_q: "هل المحتوى مجاني؟", faq2_a: "نعم، مجاني 100%.",
        faq3_q: "مطورو شاومي الرسميون؟", faq3_a: "مختبرون يشاركون يومياً."
      }
    };

    let currentLang = localStorage.getItem('prefLang') || 'en';
    function updateLanguage(lang) {
      const t = translations[lang];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key]) el.innerText = t[key];
      });
      renderDynamicContent(lang);
      document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
      document.body.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
      localStorage.setItem('prefLang', lang);
      currentLang = lang;
      startTyping(lang);
    }

    function renderDynamicContent(lang) {
      const t = translations[lang];
      // Community Cards
      document.getElementById('communityGrid').innerHTML = `
        <div class="glass-card"><div class="card-icon"><i class="fab fa-telegram-plane"></i></div><h3>${t.card1Title}</h3><p style="margin:8px 0 16px;">${t.card1Desc}</p><a href="https://t.me/themes345" target="_blank" rel="noopener noreferrer" class="btn" style="padding:6px 16px;">${t.card1Btn}</a></div>
        <div class="glass-card"><div class="card-icon"><i class="fab fa-telegram"></i></div><h3>${t.card2Title}</h3><p style="margin:8px 0 16px;">${t.card2Desc}</p><a href="https://t.me/redmi3321" target="_blank" rel="noopener noreferrer" class="btn" style="padding:6px 16px;">${t.card2Btn}</a></div>
        <div class="glass-card"><div class="card-icon"><i class="fab fa-whatsapp"></i></div><h3>${t.card3Title}</h3><p style="margin:8px 0 16px;">${t.card3Desc}</p><a href="https://whatsapp.com/channel/0029VbC2xVaD8SE4mfwh1H2H" target="_blank" rel="noopener noreferrer" class="btn" style="padding:6px 16px;">${t.card3Btn}</a></div>
        <div class="glass-card"><div class="card-icon"><i class="fas fa-images"></i></div><h3>${t.card4Title}</h3><p style="margin:8px 0 16px;">${t.card4Desc}</p><a href="https://t.me/themesXiaomia" target="_blank" rel="noopener noreferrer" class="btn" style="padding:6px 16px;">${t.card4Btn}</a></div>
      `;
      // Benefits
      document.getElementById('benefitsGrid').innerHTML = `
        <div class="glass-card"><i class="fas fa-cloud-upload-alt" style="font-size:1.8rem; color:#60A5FA;"></i><h3>${t.benefit1Title}</h3><p>${t.benefit1Desc}</p></div>
        <div class="glass-card"><i class="fas fa-mobile-alt" style="font-size:1.8rem; color:#60A5FA;"></i><h3>${t.benefit2Title}</h3><p>${t.benefit2Desc}</p></div>
        <div class="glass-card"><i class="fas fa-user-friends" style="font-size:1.8rem; color:#60A5FA;"></i><h3>${t.benefit3Title}</h3><p>${t.benefit3Desc}</p></div>
        <div class="glass-card"><i class="fas fa-crown" style="font-size:1.8rem; color:#60A5FA;"></i><h3>${t.benefit4Title}</h3><p>${t.benefit4Desc}</p></div>
      `;
      // Stats (numbers static, labels from data-i18n)
      document.getElementById('statsGrid').innerHTML = `
        <div class="glass-card"><i class="fas fa-users"></i><div class="stat-number" data-target="87456">0</div><p data-i18n="stat1">Active Members</p></div>
        <div class="glass-card"><i class="fas fa-globe"></i><div class="stat-number" data-target="142">0</div><p data-i18n="stat2">Countries</p></div>
        <div class="glass-card"><i class="fas fa-image"></i><div class="stat-number" data-target="3120">0</div><p data-i18n="stat3">Wallpapers</p></div>
      `;
      // Re-apply i18n to stats labels
      document.querySelectorAll('[data-i18n]').forEach(el => { const key = el.getAttribute('data-i18n'); if (t[key]) el.innerText = t[key]; });
      // FAQ
      document.getElementById('faqContainer').innerHTML = `
        <div class="faq-item"><button class="faq-question">${t.faq1_q} <i class="fas fa-chevron-down"></i></button><div class="faq-answer">${t.faq1_a}</div></div>
        <div class="faq-item"><button class="faq-question">${t.faq2_q} <i class="fas fa-chevron-down"></i></button><div class="faq-answer">${t.faq2_a}</div></div>
        <div class="faq-item"><button class="faq-question">${t.faq3_q} <i class="fas fa-chevron-down"></i></button><div class="faq-answer">${t.faq3_a}</div></div>
      `;
      document.querySelectorAll('.faq-question').forEach(btn => {
        btn.addEventListener('click', (e) => { btn.closest('.faq-item').classList.toggle('active'); });
      });
      initCounters();
    }

    function initCounters() {
      const stats = document.querySelectorAll('.stat-number');
      if (!stats.length) return;
      const targets = [87456, 142, 3120];
      stats.forEach((el, i) => {
        let current = 0;
        const target = targets[i];
        const step = target / 40; // faster counting
        function update() {
          current += step;
          if (current < target) { el.innerText = Math.floor(current); requestAnimationFrame(update); }
          else el.innerText = target;
        }
        update();
      });
    }

    // Typing effect (lightweight)
    let typingInterval;
    function startTyping(lang) {
      if (typingInterval) clearInterval(typingInterval);
      const phrases = lang === 'en' 
        ? ["HyperOS Updates", "Premium Wallpapers", "Hidden Tips", "Global Community"]
        : ["تحديثات HyperOS", "خلفيات فاخرة", "نصائح حصرية", "مجتمع عالمي"];
      let idx = 0, ch = 0, del = false;
      const typedSpan = document.getElementById('typedElement');
      function typeLoop() {
        if (!typedSpan) return;
        const full = phrases[idx];
        if (del) {
          typedSpan.innerText = full.substring(0, ch - 1);
          ch--;
          if (ch === 0) { del = false; idx = (idx + 1) % phrases.length; }
        } else {
          typedSpan.innerText = full.substring(0, ch + 1);
          ch++;
          if (ch === full.length) del = true;
        }
      }
      typingInterval = setInterval(typeLoop, del ? 40 : 100);
    }

    // Language toggle event
    document.getElementById('langToggleFloat').addEventListener('click', () => {
      const newLang = currentLang === 'en' ? 'ar' : 'en';
      updateLanguage(newLang);
      document.getElementById('langToggleText').innerText = (newLang === 'en') ? 'EN / العربية' : 'EN / العربية';
    });

    // Smooth scroll to section (with passive)
    function scrollToSection(id) {
      const el = document.getElementById(id);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
    document.querySelectorAll('.nav-item[data-section]').forEach(btn => {
      btn.addEventListener('click', () => scrollToSection(btn.getAttribute('data-section')));
    });
    document.getElementById('heroJoinBtn')?.addEventListener('click', () => scrollToSection('community'));
    document.getElementById('heroBenefitsBtn')?.addEventListener('click', () => scrollToSection('benefits'));

    // Share (native)
    document.getElementById('shareBottomBtn')?.addEventListener('click', () => {
      if (navigator.share) navigator.share({ title: 'Xiaomi World', url: window.location.href }).catch(()=>{});
      else alert('Share this page: ' + window.location.href);
    });

    // Scroll progress (passive)
    const progressBar = document.getElementById('scrollProgress');
    window.addEventListener('scroll', () => {
      const winScroll = document.documentElement.scrollTop;
      const height = document.documentElement.scrollHeight - window.innerHeight;
      const scrolled = (winScroll / height) * 100;
      progressBar.style.width = scrolled + '%';
    }, { passive: true });

    // Reveal on scroll (IntersectionObserver)
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal-item').forEach(el => observer.observe(el));

    // Preloader simulation (remove after content ready)
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.body.classList.add('loaded');
      }, 100);
    });

    // Initial render
    renderDynamicContent(currentLang);
    startTyping(currentLang);
    updateLanguage(currentLang); // ensure i18n applied to static elements
  })();
</script>
</body>
</html>
