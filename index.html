<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Xiaomi Royale | أفخم وجهة لهواتف شاومي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Tajawal', sans-serif;
  background: #0a0a14;
  color: #ffffff;
  overflow-x: hidden;
  position: relative;
}

/* ===== GOLD ACCENTS & PREMIUM COLORS ===== */
:root {
  --gold: #d4af37;
  --gold-light: #f5e7a3;
  --gold-dark: #aa7c11;
  --royal-dark: #0a0a1a;
  --card-glass: rgba(20, 20, 40, 0.55);
  --border-glow: rgba(212, 175, 55, 0.5);
}

/* ===== LUXURY BACKGROUND ===== */
.bg-royal {
  position: fixed;
  inset: 0;
  z-index: -3;
  background: radial-gradient(circle at 10% 20%, #0c0c1a, #020208);
}
.bg-royal::before {
  content: '';
  position: absolute;
  width: 150%;
  height: 150%;
  top: -25%;
  left: -25%;
  background: radial-gradient(ellipse at 30% 40%, rgba(212, 175, 55, 0.12), transparent 70%);
  animation: royalBreath 8s ease-in-out infinite;
}
@keyframes royalBreath {
  0% { opacity: 0.4; transform: scale(1);}
  50% { opacity: 0.8; transform: scale(1.05);}
  100% { opacity: 0.4; transform: scale(1);}
}

/* === ORB EFFECTS (LUXURY) === */
.orb-lux {
  position: absolute;
  border-radius: 50%;
  filter: blur(140px);
  opacity: 0.5;
  animation: floatGold 18s infinite alternate;
}
.orb1-lux { width: 600px; height: 600px; background: #d4af37; top: -200px; left: -200px; animation-duration: 20s; }
.orb2-lux { width: 500px; height: 500px; background: #ff3366; bottom: -150px; right: -100px; animation-duration: 25s; }
.orb3-lux { width: 700px; height: 700px; background: #7a2be0; top: 40%; left: 20%; animation-duration: 30s; }

@keyframes floatGold {
  0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
  100% { transform: translate(80px, -60px) scale(1.2); opacity: 0.6; }
}

.grid-prestige {
  position: fixed;
  inset: 0;
  z-index: -2;
  background-image: 
    linear-gradient(rgba(212, 175, 55, 0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(212, 175, 55, 0.06) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(circle at 50% 50%, black 30%, transparent 90%);
}

/* ===== PARTICLES (LUXURY SPARKLE) ===== */
#sparkles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
}
.spark {
  position: absolute;
  background: radial-gradient(circle, #ffdd88, #d4af37);
  border-radius: 50%;
  filter: blur(1px);
  animation: glitter 4s linear infinite;
  opacity: 0;
}
@keyframes glitter {
  0% { transform: translateY(100vh) scale(0); opacity: 0; }
  20% { opacity: 0.7; }
  80% { opacity: 0.5; }
  100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
}

/* ===== MAIN CONTAINER ===== */
.container {
  max-width: 1300px;
  margin: 0 auto;
  padding: 1.2rem;
  position: relative;
  z-index: 5;
}

/* ===== TOP BAR ROYAL ===== */
.topbar-royal {
  backdrop-filter: blur(20px);
  background: rgba(0, 0, 0, 0.35);
  border: 1px solid rgba(212, 175, 55, 0.3);
  border-radius: 80px;
  padding: 0.8rem 1.8rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 15px 35px rgba(0,0,0,0.3), 0 0 0 1px rgba(212,175,55,0.1) inset;
}
.logo-icon {
  font-size: 1.6rem;
  background: linear-gradient(135deg, #fff, #d4af37);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  font-weight: 900;
}
.fps-badge {
  background: rgba(212,175,55,0.2);
  border-radius: 40px;
  padding: 0.3rem 1rem;
  font-family: monospace;
  font-size: 0.8rem;
  border: 1px solid rgba(212,175,55,0.5);
  color: #f5e7a3;
}
.royal-btn {
  background: rgba(212,175,55,0.15);
  border: 1px solid rgba(212,175,55,0.5);
  border-radius: 60px;
  width: 46px;
  height: 46px;
  color: #ffdf8c;
  transition: 0.3s;
  cursor: pointer;
}
.royal-btn:hover {
  background: #d4af37;
  color: #0a0a14;
  transform: scale(1.08);
  box-shadow: 0 0 18px #d4af37;
}

/* ===== HERO SECTION – LUXURY ===== */
.hero-lux {
  margin-top: 2rem;
  background: linear-gradient(135deg, rgba(10,10,25,0.7), rgba(30,20,40,0.6));
  backdrop-filter: blur(20px);
  border-radius: 60px;
  border: 1px solid rgba(212,175,55,0.4);
  padding: 3rem 2rem;
  text-align: center;
  box-shadow: 0 30px 50px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);
  position: relative;
  overflow: hidden;
}
.hero-lux::after {
  content: '';
  position: absolute;
  top: -50%;
  left: -20%;
  width: 140%;
  height: 200%;
  background: radial-gradient(ellipse, rgba(212,175,55,0.08), transparent 70%);
  pointer-events: none;
  animation: shineRotate 12s infinite;
}
@keyframes shineRotate {
  0% { transform: rotate(0deg);}
  100% { transform: rotate(360deg);}
}
.logo-upload-area {
  position: relative;
  display: inline-block;
}
.custom-logo-img {
  width: 100px;
  height: auto;
  filter: drop-shadow(0 0 25px rgba(212,175,55,0.8));
  animation: emblemGlow 3s ease-in-out infinite;
  cursor: pointer;
  transition: 0.2s;
  border-radius: 20px;
}
.custom-logo-img:hover {
  transform: scale(1.02);
  filter: drop-shadow(0 0 35px gold);
}
.change-logo-btn {
  position: absolute;
  bottom: -10px;
  right: -15px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  border-radius: 30px;
  padding: 6px 10px;
  font-size: 0.7rem;
  border: 1px solid #d4af37;
  color: #d4af37;
  cursor: pointer;
  transition: 0.2s;
  white-space: nowrap;
  /* يظهر فقط للمشرف - يتم التحكم به عبر JS */
  display: none;
}
.change-logo-btn.admin-visible {
  display: flex;
  align-items: center;
  gap: 4px;
}
.change-logo-btn:hover {
  background: #d4af37;
  color: black;
}
@keyframes emblemGlow {
  0%,100% { filter: drop-shadow(0 0 15px #d4af37); transform: scale(1);}
  50% { filter: drop-shadow(0 0 35px #ffcd4a); transform: scale(1.03);}
}
.hero-title {
  font-size: 3.8rem;
  font-weight: 900;
  background: linear-gradient(135deg, #ffffff 20%, #f5e7a3 60%, #d4af37);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin-top: 1rem;
  letter-spacing: -1px;
}
.hero-sub {
  font-size: 1.1rem;
  opacity: 0.75;
  margin-top: 0.7rem;
}
.prestige-badges {
  display: flex;
  gap: 1rem;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 1.5rem;
}
.p-badge {
  background: rgba(212,175,55,0.12);
  border-radius: 40px;
  padding: 0.5rem 1.3rem;
  font-weight: 500;
  border: 1px solid rgba(212,175,55,0.4);
  backdrop-filter: blur(5px);
}

/* ===== LINKS SECTION (ONLY LINKS - HIDDEN URLS) ===== */
.links-section {
  margin-top: 2rem;
  border-radius: 48px;
  background: rgba(0,0,0,0.25);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(212,175,55,0.3);
  padding: 1.8rem;
}
.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 1.5rem;
}
.header-icon {
  background: linear-gradient(135deg, #d4af37, #aa7c11);
  width: 48px;
  height: 48px;
  border-radius: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  box-shadow: 0 0 12px gold;
}
.links-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1.2rem;
}
.link-card-lux {
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(18px);
  border-radius: 36px;
  padding: 1rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 1.2rem;
  border: 1px solid rgba(212,175,55,0.25);
  transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  text-decoration: none;
  color: white;
  cursor: pointer;
}
.link-card-lux:hover {
  border-color: #d4af37;
  transform: translateY(-5px);
  background: rgba(212,175,55,0.1);
  box-shadow: 0 20px 35px rgba(0,0,0,0.4);
}
.link-icon-lux {
  width: 56px;
  height: 56px;
  border-radius: 28px;
  background: linear-gradient(145deg, #d4af37, #9e740e);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  flex-shrink: 0;
}
.link-text {
  flex: 1;
}
.link-text strong {
  font-size: 1.1rem;
  display: block;
}

/* ===== SCROLL TO TOP GOLD ===== */
.scroll-gold {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 55px;
  height: 55px;
  background: radial-gradient(circle, #d4af37, #a57c1c);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  opacity: 0;
  visibility: hidden;
  transition: 0.3s;
  z-index: 200;
  box-shadow: 0 0 20px rgba(212,175,55,0.6);
}
.scroll-gold.show {
  opacity: 1;
  visibility: visible;
}

/* ===== ADMIN PANEL (PREMIUM STYLE) ===== */
.admin-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(30px);
  z-index: 9998;
  display: none;
}
.admin-panel-lux {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: min(1000px, 94%);
  max-height: 85vh;
  overflow-y: auto;
  background: linear-gradient(145deg, #0f0f1f, #03030c);
  border: 1px solid #d4af37;
  border-radius: 56px;
  padding: 2rem;
  z-index: 9999;
  display: none;
  box-shadow: 0 40px 80px rgba(0,0,0,0.7);
}
.admin-header {
  display: flex;
  justify-content: space-between;
  border-bottom: 1px solid rgba(212,175,55,0.4);
  margin-bottom: 1.5rem;
  padding-bottom: 1rem;
}
.close-btn-gold {
  background: #d4af37;
  border: none;
  border-radius: 60px;
  width: 40px;
  height: 40px;
  cursor: pointer;
  font-weight: bold;
}
.copy-gold {
  background: linear-gradient(135deg, #d4af37, #aa7c11);
  border: none;
  padding: 0.7rem 1.4rem;
  border-radius: 40px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
  color: #0a0a14;
}
.copy-gold:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px gold;
}
@media (max-width: 700px) {
  .hero-title { font-size: 2.3rem; }
  .container { padding: 0.8rem; }
}
</style>
</head>
<body>

<div class="bg-royal"></div>
<div class="orb-lux orb1-lux"></div>
<div class="orb-lux orb2-lux"></div>
<div class="orb-lux orb3-lux"></div>
<div class="grid-prestige"></div>
<div id="sparkles"></div>

<div class="container">
  <div class="topbar-royal">
    <div class="logo-icon"><i class="fas fa-crown"></i> XIAOMI ROYALE</div>
    <div style="display: flex; gap: 12px;">
      <span class="fps-badge" id="fpsMeter">0 FPS</span>
      <button class="royal-btn" id="royalThemeBtn"><i class="fas fa-moon"></i></button>
      <button class="royal-btn" id="adminAccessBtn"><i class="fas fa-key"></i></button>
    </div>
  </div>

  <div class="hero-lux">
    <!-- منطقة الشعار - زر التبديل يظهر فقط للمشرف -->
    <div class="logo-upload-area">
      <img id="customLogoImg" class="custom-logo-img" src="https://upload.wikimedia.org/wikipedia/commons/a/ae/Xiaomi_logo_%282021-%29.svg" alt="شعار الموقع">
      <div id="changeLogoBtn" class="change-logo-btn"><i class="fas fa-camera"></i> تبديل</div>
      <input type="file" id="logoFileInput" accept="image/*" style="display: none;">
    </div>
    <h1 class="hero-title" id="dynamicTitle">Xiaomi Royale</h1>
    <p class="hero-sub">أفخم منصة لهواتف شاومي | روابط النخبة وثيمات حصرية</p>
    <div class="prestige-badges">
      <span class="p-badge"><i class="fas fa-gem"></i> حصري VIP</span>
      <span class="p-badge"><i class="fas fa-bolt"></i> أداء أسطوري</span>
      <span class="p-badge"><i class="fas fa-shield-alt"></i> روابط مميزة</span>
    </div>
  </div>

  <!-- قسم الروابط فقط -->
  <div class="links-section">
    <div class="section-header">
      <div class="header-icon"><i class="fas fa-link"></i></div>
      <h2 style="font-size: 1.7rem;">روابط النخبة <span style="color:#d4af37;">| GOLDEN LINKS</span></h2>
    </div>
    <div class="links-grid" id="premiumLinksGrid"></div>
  </div>
</div>

<button class="scroll-gold" id="goTopGold"><i class="fas fa-arrow-up"></i></button>

<div class="admin-overlay" id="adminOverlayLux"></div>
<div class="admin-panel-lux" id="adminPanelLux">
  <div class="admin-header">
    <h2><i class="fas fa-crown"></i> لوحة التحكم الملكية</h2>
    <button id="closeAdminLux" class="close-btn-gold">✕</button>
  </div>
  <div style="display:grid; gap:1.5rem; grid-template-columns:repeat(auto-fit,minmax(280px,1fr));">
    <div>
      <h3>➕ إضافة رابط مميز</h3>
      <input type="text" id="adminLinkName" placeholder="الاسم (مثال: قناة تليجرام)" style="background:#1e1e2e; width:100%; margin-bottom:10px; padding:12px; border-radius:30px; border:1px solid #d4af37; color:white;">
      <input type="text" id="adminLinkUrl" placeholder="الرابط (سيتم إخفاؤه)" style="background:#1e1e2e; width:100%; margin-bottom:10px; padding:12px; border-radius:30px; border:1px solid #d4af37; color:white;">
      <select id="adminLinkIcon" style="background:#1e1e2e; width:100%; margin-bottom:15px; padding:12px; border-radius:30px; color:white; border:1px solid #d4af37;">
        <option value="telegram">تيليجرام</option>
        <option value="whatsapp">واتساب</option>
        <option value="global">موقع عالمي</option>
      </select>
      <button id="addLinkAdminBtn" class="copy-gold" style="width:100%;">إضافة الرابط</button>
      <h3 style="margin-top: 20px;">📋 الروابط الحالية</h3>
      <div id="adminLinksList"></div>
    </div>
    <div>
      <h3>📊 إحصائيات فخرية</h3>
      <p>إجمالي الروابط: <span id="statLinksCount">0</span></p>
      <p>نقرات الروابط (اليوم): <span id="statClicksToday">0</span></p>
      <button id="resetStatsBtnGold" style="background:#333; border:none; padding:10px; border-radius:30px; margin-top:10px; width:100%; color:white; cursor:pointer;">إعادة ضبط الإحصائيات</button>
    </div>
  </div>
</div>

<script>
// === جسيمات ذهبية ===
const sparklesContainer = document.getElementById('sparkles');
for (let i=0;i<35;i++) {
  let s = document.createElement('div');
  s.classList.add('spark');
  let size = Math.random() * 3 + 2;
  s.style.width = size+'px';
  s.style.height = size+'px';
  s.style.left = Math.random()*100+'%';
  s.style.animationDuration = Math.random()*6+4+'s';
  s.style.animationDelay = Math.random()*8+'s';
  sparklesContainer.appendChild(s);
}

// FPS Meter
let frameCount=0;
function countFPS(){frameCount++; requestAnimationFrame(countFPS);}
countFPS();
setInterval(()=>{document.getElementById('fpsMeter').innerText=frameCount+' FPS'; frameCount=0;},1000);

// TOAST GOLD
function showToast(msg, icon='👑'){
  let t = document.createElement('div');
  t.innerText = icon + ' ' + msg;
  t.style.position='fixed'; t.style.bottom='20px'; t.style.left='50%'; t.style.transform='translateX(-50%)';
  t.style.background='rgba(0,0,0,0.85)'; t.style.backdropFilter='blur(20px)'; t.style.color='#ffdf8c';
  t.style.padding='12px 24px'; t.style.borderRadius='60px'; t.style.border='1px solid #d4af37'; t.style.zIndex='99999';
  t.style.fontWeight='bold'; t.style.whiteSpace='nowrap'; t.style.fontFamily='Tajawal'; document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2800);
}

// ===== وظائف المشرف (إظهار زر تبديل الشعار فقط للمشرف) =====
const changeLogoBtn = document.getElementById('changeLogoBtn');
const fileInput = document.getElementById('logoFileInput');
const logoImg = document.getElementById('customLogoImg');

function enableAdminMode() {
  // إظهار زر تبديل الشعار
  changeLogoBtn.classList.add('admin-visible');
  // حفظ حالة المشرف في sessionStorage
  sessionStorage.setItem('adminMode', 'true');
}

// التحقق من حالة المشرف عند تحميل الصفحة
if(sessionStorage.getItem('adminMode') === 'true') {
  enableAdminMode();
}

// رفع الصورة وحفظها
changeLogoBtn.addEventListener('click', () => {
  fileInput.click();
});
fileInput.addEventListener('change', (event) => {
  const file = event.target.files[0];
  if(file && file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const base64 = e.target.result;
      logoImg.src = base64;
      localStorage.setItem('royaleCustomLogo', base64);
      showToast('تم تغيير الشعار بنجاح!', '🖼️');
    };
    reader.readAsDataURL(file);
  } else {
    showToast('يرجى اختيار صورة صالحة', '⚠️');
  }
});
// تحميل الشعار المحفوظ مسبقاً
const savedLogo = localStorage.getItem('royaleCustomLogo');
if(savedLogo) {
  logoImg.src = savedLogo;
}

// ===== الروابط (بيانات افتراضية حسب الطلب) =====
const defaultLinks = [
  {name:"📡 قناة تليجرام اساسيه", url:"https://t.me/redmi3321", icon:"telegram"},
  {name:"💬 جروب الدردشه", url:"https://t.me/themes345", icon:"telegram"},
  {name:"📱 قناه الواتس", url:"https://whatsapp.com/channel/0029VbC2xVaD8SE4mfwh1H2H", icon:"whatsapp"}
];

let links = JSON.parse(localStorage.getItem('royaleLinks')) || defaultLinks;
let clickStat = JSON.parse(localStorage.getItem('royaleStats')) || {todayClicks:0, lastDate: new Date().toDateString()};

function saveData(){
  localStorage.setItem('royaleLinks', JSON.stringify(links));
  localStorage.setItem('royaleStats', JSON.stringify(clickStat));
}

function updateStatsUI(){
  document.getElementById('statLinksCount').innerText = links.length;
  document.getElementById('statClicksToday').innerText = clickStat.todayClicks;
}

function recordLinkClick(){
  let today = new Date().toDateString();
  if(clickStat.lastDate !== today){ clickStat.todayClicks = 0; clickStat.lastDate = today; }
  clickStat.todayClicks++;
  saveData();
  updateStatsUI();
}

const iconMap = {telegram:"fa-brands fa-telegram", whatsapp:"fa-brands fa-whatsapp", global:"fa-solid fa-globe"};
function renderLinks(){
  const container = document.getElementById('premiumLinksGrid');
  if(!container) return;
  container.innerHTML = links.map((l,idx)=>`
    <a href="${l.url}" target="_blank" class="link-card-lux" data-linkidx="${idx}">
      <div class="link-icon-lux"><i class="${iconMap[l.icon]||'fa-solid fa-link'}"></i></div>
      <div class="link-text"><strong>${l.name}</strong></div>
      <i class="fas fa-arrow-left" style="color:#d4af37;"></i>
    </a>
  `).join('');
  document.querySelectorAll('.link-card-lux').forEach(el=>{
    el.addEventListener('click',()=>recordLinkClick());
  });
}
renderLinks();

// Theme
document.getElementById('royalThemeBtn').onclick = ()=>{
  document.body.classList.toggle('light-royal');
  if(document.body.classList.contains('light-royal')){
    document.body.style.background = '#faf3e0';
    document.body.style.color = '#1a120b';
    showToast('الوضع الذهبي الفاتح', '✨');
  } else {
    document.body.style.background = '';
    document.body.style.color = '';
    showToast('الوضع الليلي الكلاسيكي', '🌙');
  }
};

// Scroll Top
const scrollBtn = document.getElementById('goTopGold');
window.addEventListener('scroll',()=>{
  if(window.scrollY>300) scrollBtn.classList.add('show');
  else scrollBtn.classList.remove('show');
});
scrollBtn.onclick = ()=>window.scrollTo({top:0,behavior:'smooth'});

// ADMIN PANEL (كلمة المرور 2010)
const adminOverlay = document.getElementById('adminOverlayLux');
const adminPanel = document.getElementById('adminPanelLux');
document.getElementById('adminAccessBtn').onclick = ()=>{
  let p = prompt('👑 كلمة السر الملكية:');
  if(p !== '2010'){ showToast('كلمة السر خاطئة', '❌'); return; }
  // تفعيل وضع المشرف (إظهار زر تبديل الشعار)
  enableAdminMode();
  adminOverlay.style.display = 'block';
  adminPanel.style.display = 'block';
  refreshAdminLists();
  updateStatsUI();
};
function closeAdmin(){ adminOverlay.style.display = 'none'; adminPanel.style.display = 'none'; }
document.getElementById('closeAdminLux').onclick = closeAdmin;
adminOverlay.onclick = closeAdmin;
function refreshAdminLists(){
  const linksContainer = document.getElementById('adminLinksList');
  if(linksContainer){
    linksContainer.innerHTML = links.map((l,i)=>`
      <div style="display:flex; justify-content:space-between; margin-bottom:12px; background:rgba(255,255,255,0.05); padding:8px 12px; border-radius:40px;">
        <span style="overflow:hidden; text-overflow:ellipsis;">${l.name}</span>
        <button class="delAdminBtn" data-linkidx="${i}" style="background:#aa2e00; border:none; padding:5px 15px; border-radius:30px; color:white; cursor:pointer;">حذف</button>
      </div>
    `).join('');
    document.querySelectorAll('.delAdminBtn').forEach(btn=>{
      btn.addEventListener('click',(e)=>{
        let idx = btn.getAttribute('data-linkidx');
        if(idx!==null) links.splice(parseInt(idx),1);
        saveData(); renderLinks(); refreshAdminLists(); updateStatsUI(); showToast('تم حذف الرابط', '🗑️');
      });
    });
  }
}
document.getElementById('addLinkAdminBtn').onclick = ()=>{
  let name = document.getElementById('adminLinkName').value.trim();
  let url = document.getElementById('adminLinkUrl').value.trim();
  let icon = document.getElementById('adminLinkIcon').value;
  if(!name || !url){ showToast('أدخل الاسم والرابط كاملين', '⚠️'); return; }
  links.push({name,url,icon});
  saveData(); renderLinks(); refreshAdminLists(); updateStatsUI(); showToast('تمت إضافة رابط فخم', '👑');
  document.getElementById('adminLinkName').value = '';
  document.getElementById('adminLinkUrl').value = '';
};
document.getElementById('resetStatsBtnGold').onclick = ()=>{
  clickStat = {todayClicks:0, lastDate: new Date().toDateString()};
  saveData(); updateStatsUI(); showToast('تمت إعادة ضبط الإحصائيات', '🔄');
};
updateStatsUI();

// Typewriter effect
const titleEl = document.getElementById('dynamicTitle');
const originalTitle = "Xiaomi Royale";
titleEl.innerHTML = '';
let idxChar = 0;
function typeWriterLux(){
  if(idxChar < originalTitle.length){
    titleEl.innerHTML += originalTitle.charAt(idxChar);
    idxChar++;
    setTimeout(typeWriterLux, 90);
  } else {
    titleEl.classList.add('glitch-text-lux');
    setTimeout(()=>titleEl.classList.remove('glitch-text-lux'),500);
  }
}
typeWriterLux();

// Flash premiere
const flashDiv = document.createElement('div');
flashDiv.style.position='fixed'; flashDiv.style.inset=0; flashDiv.style.background='radial-gradient(circle, #fff6cf, transparent)'; flashDiv.style.pointerEvents='none'; flashDiv.style.zIndex='99999'; flashDiv.style.opacity='0.6';
flashDiv.style.animation='flashFade 0.7s forwards';
document.body.appendChild(flashDiv);
setTimeout(()=>flashDiv.remove(),700);

const styleSheet = document.createElement('style');
styleSheet.innerText = `
  @keyframes flashFade{0%{opacity:0.8;}100%{opacity:0;visibility:hidden;}}
  .glitch-text-lux{animation:glitchKing 0.3s ease;}
  .light-royal .hero-lux, .light-royal .links-section{background:rgba(255,245,220,0.85);color:#1e1a10;border-color:#d4af37;}
  .light-royal .link-card-lux{background:rgba(255,255,255,0.7);color:#1e1a10;}
  .light-royal .topbar-royal{background:rgba(255,245,200,0.6);}
  .light-royal .p-badge{background:rgba(212,175,55,0.2);}
  @keyframes glitchKing{
    0%{text-shadow:-2px 0 #ff00c1,2px 0 #00fff9;}
    50%{text-shadow:2px 0 #ff00c1,-2px 0 #00fff9;}
    100%{text-shadow:none;}
  }
`;
document.head.appendChild(styleSheet);
</script>
